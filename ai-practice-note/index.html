function esc(s) {

// =====================
// Convex Hull (Andrew's monotone chain)
// =====================
function convexHull(pts) {
  if (pts.length < 3) return pts.slice();
  const s = [...pts].sort((a,b) => a.x !== b.x ? a.x-b.x : a.y-b.y);
  const cross = (o,a,b) => (a.x-o.x)*(b.y-o.y)-(a.y-o.y)*(b.x-o.x);
  const lo = [], hi = [];
  for (const p of s) {
    while (lo.length>=2 && cross(lo.at(-2),lo.at(-1),p)<=0) lo.pop();
    lo.push(p);
  }
  for (const p of [...s].reverse()) {
    while (hi.length>=2 && cross(hi.at(-2),hi.at(-1),p)<=0) hi.pop();
    hi.push(p);
  }
  lo.pop(); hi.pop();
  return [...lo,...hi];
}

// =====================
// Blob path in data coords
// =====================
function blobPath(pts, cx, cy, pad) {
  // Circle (bezier approximation) centered at (cx, cy) with radius r
  function circlePath(x, y, r) {
    const k = 0.5523;
    return [
      `M ${x},${y-r}`,
      `C ${x+k*r},${y-r} ${x+r},${y-k*r} ${x+r},${y}`,
      `C ${x+r},${y+k*r} ${x+k*r},${y+r} ${x},${y+r}`,
      `C ${x-k*r},${y+r} ${x-r},${y+k*r} ${x-r},${y}`,
      `C ${x-r},${y-k*r} ${x-k*r},${y-r} ${x},${y-r} Z`,
    ].join(' ');
  }

  if (pts.length === 1) return circlePath(cx, cy, pad);

  const hull = pts.length < 3 ? pts.slice() : convexHull(pts);

  // Expand hull points outward from centroid
  const exp = hull.map(p => {
    const dx = p.x-cx, dy = p.y-cy;
    const len = Math.hypot(dx,dy);
    if (len < 1e-9) return { x: cx+pad, y: cy };
    return { x: cx+(dx/len)*(len+pad), y: cy+(dy/len)*(len+pad) };
  });

  if (exp.length === 2) {
    // Stadium: circle around midpoint large enough to contain both
    const r = Math.hypot(exp[0].x-exp[1].x, exp[0].y-exp[1].y)/2 + pad*0.3;
    const mx = (exp[0].x+exp[1].x)/2, my = (exp[0].y+exp[1].y)/2;
    return circlePath(mx, my, r);
  }

  // Catmull-Rom spline through hull points → smooth closed path
  const n = exp.length;
  const parts = [`M ${exp[0].x},${exp[0].y}`];
  for (let i=0; i<n; i++) {
    const p0=exp[(i-1+n)%n], p1=exp[i], p2=exp[(i+1)%n], p3=exp[(i+2)%n];
    const cp1x=p1.x+(p2.x-p0.x)/6, cp1y=p1.y+(p2.y-p0.y)/6;
    const cp2x=p2.x-(p3.x-p1.x)/6, cp2y=p2.y-(p3.y-p1.y)/6;
    parts.push(`C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`);
  }
  parts.push('Z');
  return parts.join(' ');
}

fetch('./viz_data.json')
  .then(r => r.json())
  .then(d => renderDashboard(d))
  .catch(() => { console.warn('Using sample data'); renderDashboard(SAMPLE_DATA); });

// =====================
// Main render
// =====================
function renderDashboard(data) {
  _data = data;

  // Header
  document.getElementById('run-at').textContent =
    data.run_at ? new Date(data.run_at).toLocaleString('ja-JP') : '—';

  const bubblesA = (data.bubbles||[]).filter(b=>b.track==='en');
  const bubblesB = (data.bubbles||[]).filter(b=>b.track==='ja');
  const clustersA = (data.clusters||[]).filter(c=>c.track==='en');
  const clustersB = (data.clusters||[]).filter(c=>c.track==='ja');

  document.getElementById('count-a').textContent = bubblesA.length;
  document.getElementById('cluster-a').textContent = clustersA.length;
  document.getElementById('count-b').textContent = bubblesB.length;
  document.getElementById('cluster-b').textContent = clustersB.length;

  // Cluster list (all)
  renderClusterList(data.clusters || []);

  // Charts
  renderTrackChart('chart-a', 'en', bubblesA, clustersA);
  renderTrackChart('chart-b', 'ja', bubblesB, clustersB);

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.track;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.className = 'tab-btn';
        if (b.dataset.track === t) b.classList.add(t === 'en' ? 'active-a' : 'active-b');
      });
      document.getElementById('panel-a').classList.toggle('hidden', t !== 'en');
      document.getElementById('panel-b').classList.toggle('hidden', t !== 'ja');
      setTimeout(() => Plotly.Plots.resize(t === 'en' ? 'chart-a' : 'chart-b'), 50);
    });
  });
}

// =====================
// Track chart
// =====================
function renderTrackChart(divId, track, bubbles, clusters) {
  if (!bubbles.length) return;

  // Color map: assign palette index globally consistent across tracks
  // Build from clusters list
  const colorMap = {};
  clusters.forEach((c, i) => { colorMap[c.cluster_id] = PALETTE[i % PALETTE.length]; });

  // Group bubbles by cluster
  const byCluster = {};
  bubbles.forEach(b => {
    if (!byCluster[b.cluster_id]) byCluster[b.cluster_id] = [];
    byCluster[b.cluster_id].push(b);
  });

  // Data range for blob padding
  const xs = bubbles.map(b=>b.x), ys = bubbles.map(b=>b.y);
  const xRange = (Math.max(...xs)-Math.min(...xs)) || 2;
  const yRange = (Math.max(...ys)-Math.min(...ys)) || 2;
  const spread = Math.min(xRange, yRange);

  // Size scaling
  const sizes = bubbles.map(b=>b.size);
  const sMin = Math.min(...sizes), sDiff = (Math.max(...sizes)-sMin)||1;
  const scaleSize = s => 8 + ((s-sMin)/sDiff)*28;

  const shapes = [];
  const traces = [];
  const annotations = [];

  Object.entries(byCluster).forEach(([cid, pts]) => {
    const color = colorMap[cid] || '#888';
    const cx = mean(pts.map(p=>p.x));
    const cy = mean(pts.map(p=>p.y));

    // Size category
    const n = pts.length;
    const cat = n<=2 ? 'sm' : n<=5 ? 'md' : 'lg';
    const padFactor  = { sm:0.15, md:0.22, lg:0.32 }[cat];
    const fillOpac   = { sm:0.06, md:0.09, lg:0.13 }[cat];
    const lineOpac   = { sm:0.28, md:0.40, lg:0.55 }[cat];
    const lineWidth  = { sm:1.0,  md:1.5,  lg:2.0  }[cat];
    const pad = padFactor * spread;

    // Blob shape
    shapes.push({
      type: 'path',
      xref: 'x', yref: 'y',
      path: blobPath(pts, cx, cy, pad),
      fillcolor: hexRgba(color, fillOpac),
      line: { color: hexRgba(color, lineOpac), width: lineWidth },
    });

    // Connection lines: each post → centroid
    if (pts.length > 1) {
      const lx = [], ly = [];
      pts.forEach(p => { lx.push(p.x, cx, null); ly.push(p.y, cy, null); });
      traces.push({
        type:'scatter', mode:'lines',
        x: lx, y: ly,
        line: { color: hexRgba(color, 0.22), width: 1 },
        hoverinfo:'skip', showlegend:false,
      });
    }

    // Centroid marker
    const clLabel = clusters.find(c=>c.cluster_id===cid)?.label || cid;
    traces.push({
      type:'scatter', mode:'markers',
      x:[cx], y:[cy],
      marker:{
        size: 12,
        color: color,
        symbol: 'circle',
        opacity: 0.95,
        line: { width:2, color:'rgba(255,255,255,0.25)' },
      },
      hovertemplate: `<b>${esc(clLabel)}</b><br>${n}件<extra></extra>`,
      showlegend: false,
    });

    // Cluster label annotation
    annotations.push({
      x: cx, y: cy,
      text: clLabel,
      showarrow: false,
      yshift: 14,
      font: { size: 10, color: color, family:'-apple-system,sans-serif' },
      bgcolor: 'rgba(13,13,13,0.75)',
      borderpad: 2,
    });

    // Post scatter
    traces.push({
      type:'scatter', mode:'markers',
      name: clLabel,
      x: pts.map(p=>p.x),
      y: pts.map(p=>p.y),
      marker:{
        size: pts.map(p=>scaleSize(p.size)),
        color: color,
        symbol: 'circle',
        opacity: 0.88,
        line:{ width:1.5, color:'rgba(255,255,255,0.2)' },
      },
      customdata: pts.map(p=>[p.cluster_label,p.author,p.text,p.likes,p.retweets,p.cluster_id,p.track]),
      hovertemplate:[
        '<b>%{customdata[0]}</b>',
        '@%{customdata[1]}',
        '%{customdata[2]}',
        '♡ %{customdata[3]}  RT %{customdata[4]}',
        '<extra></extra>',
      ].join('<br>'),
      showlegend: false,
    });
  });

  const TRACK_COLOR = track==='en' ? '#4f9cf9' : '#a78bfa';

  const layout = {
    paper_bgcolor: '#0d0d0d',
    plot_bgcolor: '#0d0d0d',
    font: { color:'#e0e0e0', family:'-apple-system,sans-serif', size:11 },
    xaxis: { visible:false, fixedrange:false },
    yaxis: { visible:false, fixedrange:false, scaleanchor:'x', scaleratio:1 },
    shapes,
    annotations,
    margin: { l:16, r:16, t:16, b:16 },
    hoverlabel:{
      bgcolor:'#1a1a1a', bordercolor:'#3a3a3a',
      font:{ color:'#e0e0e0', size:12 }, align:'left',
    },
    uirevision: track,
  };

  const config = {
    responsive:true,
    displayModeBar:true,
    displaylogo:false,
    modeBarButtonsToRemove:['lasso2d','select2d','toImage'],
  };

  Plotly.react(divId, traces, layout, config);

  // Click → select cluster in side panel
  const div = document.getElementById(divId);
  try { div.removeAllListeners('plotly_click'); } catch(e){}
  div.on('plotly_click', evt => {
    const pt = evt.points?.[0];
    if (pt?.customdata?.[5]) selectCluster(pt.customdata[5]);
  });
}

// =====================
// Cluster list
// =====================
function renderClusterList(clusters) {
  const container = document.getElementById('cluster-list');
  container.innerHTML = '';
  clusters.forEach((c, i) => {
    const color = PALETTE[i % PALETTE.length];
    const el = document.createElement('div');
    el.className = 'cluster-item';
    el.dataset.cid = c.cluster_id;
    el.style.color = color;
    el.innerHTML = `
      <div class="c-dot" style="background:${color}"></div>
      <span class="c-track" style="color:${color}">${c.track==='en'?'海外':'国内'}</span>
      <span class="c-label" title="${esc(c.label)}">${esc(c.label)}</span>
      <span class="c-count">${c.post_count}件</span>
    `;
    el.addEventListener('click', () => selectCluster(c.cluster_id));
    container.appendChild(el);
  });
}

function selectCluster(cid) {
  _activeClusterId = cid;
  document.querySelectorAll('.cluster-item').forEach(el => {
    el.classList.toggle('active', el.dataset.cid === cid);
  });
  const posts = (_data?.bubbles||[]).filter(b=>b.cluster_id===cid);
  const cluster = (_data?.clusters||[]).find(c=>c.cluster_id===cid);
  renderPostList(posts, cluster?.track);

  // Scroll into view
  const el = document.querySelector(`.cluster-item[data-cid="${cid}"]`);
  el?.scrollIntoView({ block:'nearest' });
}

// =====================
// Post list
// =====================
function renderPostList(posts, track) {
  const container = document.getElementById('post-list');
  container.innerHTML = '';
  if (!posts.length) {
    container.innerHTML = '<div id="post-placeholder">ポストがありません</div>';
    return;
  }
  const authorClass = track==='B' ? 'post-author b' : 'post-author';
  [...posts]
    .sort((a,b)=>(b.likes+b.retweets*3)-(a.likes+a.retweets*3))
    .forEach(p => {
      const el = document.createElement('div');
      el.className = 'post-item';
      el.innerHTML = `
        <div class="post-meta">
          <span class="${authorClass}">@${esc(p.author)}</span>
          <span class="post-stats">♡ ${p.likes}  RT ${p.retweets}</span>
        </div>
        <div class="post-text">${esc(p.text_full||p.text)}</div>
        ${p.url?`<div class="post-url"><a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.url)}</a></div>`:''}
      `;
      container.appendChild(el);
    });
}
</script>
