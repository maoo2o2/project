<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ouchilab ヒアリング分析</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Helvetica Neue", sans-serif; background: #fff; color: #333; font-size: 14px; line-height: 1.5; }

/* ヘッダー */
.header { padding: 20px 24px 0; border-bottom: 1px solid #e8e8e8; }
.header-top { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
.header h1 { font-size: 18px; font-weight: 700; color: #1a1a1a; }
.header-meta { font-size: 12px; color: #999; }
.back-link { font-size: 12px; color: #888; text-decoration: none; margin-bottom: 8px; display: inline-block; }
.back-link:hover { color: #C8102E; }
.header-nav { display: flex; gap: 0; border-top: 1px solid #e8e8e8; margin-top: 12px; }
.nav-tab { padding: 8px 18px; font-size: 13px; color: #888; text-decoration: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.12s; }
.nav-tab:hover { color: #1a1a1a; }
.nav-tab.active { color: #C8102E; border-bottom-color: #C8102E; font-weight: 600; }

/* KPIバー */
.kpi-bar { display: flex; gap: 24px; padding: 12px 24px; background: #f9f9f7; border-bottom: 1px solid #e8e8e8; }
.kpi-item { display: flex; align-items: baseline; gap: 5px; }
.kpi-num { font-size: 22px; font-weight: 700; color: #1a1a1a; }
.kpi-label { font-size: 11px; color: #999; }

/* フィルタバー */
.filter-bar { display: flex; gap: 8px; padding: 12px 24px; border-bottom: 1px solid #e8e8e8; align-items: center; }
.filter-label { font-size: 11px; color: #aaa; margin-right: 4px; }
.chip { padding: 4px 12px; border-radius: 16px; border: 1.5px solid #ddd; background: #fff; cursor: pointer; font-size: 12px; color: #555; transition: all 0.12s; }
.chip:hover { border-color: #C8102E; color: #C8102E; }
.chip.active { border-color: #C8102E; color: #C8102E; font-weight: 700; background: #fff8f8; }

/* メインレイアウト */
.main { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 140px); }

/* 左ペイン */
.left-pane { overflow-y: auto; padding: 16px 20px; border-right: 1px solid #e8e8e8; }
.cluster-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

/* クラスタカード */
.cl-card {
  border: 1px solid #e0e0e0; border-radius: 10px; padding: 13px 14px;
  cursor: pointer; transition: border-color 0.12s, box-shadow 0.12s;
  background: #fff;
}
.cl-card:hover { border-color: #C8102E; box-shadow: 0 2px 8px rgba(200,16,46,0.1); }
.cl-card.selected { border-color: #C8102E; border-width: 2px; box-shadow: 0 2px 12px rgba(200,16,46,0.15); }
.cl-card.dim { opacity: 0.4; }

.cl-card-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.cl-id { font-size: 11px; color: #aaa; font-weight: 600; }
.cl-stars { color: #C8A84B; font-size: 12px; letter-spacing: -1px; }
.q-badge { padding: 1px 6px; border-radius: 6px; font-size: 10px; font-weight: 600; }
.q-tr { background: #FDECEA; color: #922B21; }
.q-tl { background: #EBF5FB; color: #1A5276; }
.q-bl { background: #f0f0f0; color: #888; }

.cl-name { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 5px; }
.cl-stat { font-size: 11px; color: #888; margin-bottom: 6px; }
.cl-bar-track { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 8px; }
.cl-bar-fill { height: 4px; border-radius: 2px; background: #C8102E; }
.cl-icl-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.icl-tag { font-size: 10px; padding: 1px 6px; border-radius: 6px; background: #EAF3FB; color: #185FA5; font-weight: 600; }
.needs-more-badge { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 8px; background: #FEF9E7; color: #7D6608; border: 1px solid #F9E79F; }

/* 右パネル */
.right-pane {
  overflow-y: auto; padding: 20px;
  background: #fafaf9;
}
.empty-state { height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: #ccc; }
.empty-icon { font-size: 32px; }
.empty-text { font-size: 13px; }

/* 詳細パネル内 */
.detail-header { margin-bottom: 16px; }
.detail-id-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.detail-id { font-size: 12px; color: #aaa; font-weight: 600; }
.detail-stars { color: #C8A84B; font-size: 14px; }
.detail-name { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
.detail-stat { font-size: 12px; color: #777; }

.section-block { margin-bottom: 20px; }
.section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: #aaa; margin-bottom: 8px;
  padding-bottom: 4px; border-bottom: 1px solid #eee;
}

/* インサイト */
.insight-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.icl-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.icl-id-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 6px; background: #185FA5; color: #fff; }
.icl-thickness { font-size: 10px; color: #888; }
.icl-label { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
.icl-desc { font-size: 12px; color: #555; line-height: 1.6; }

/* 代表発話 */
.quote-item { margin-bottom: 8px; padding: 10px 12px; background: #fff; border-left: 3px solid #C8102E; border-radius: 0 6px 6px 0; border: 1px solid #eee; border-left: 3px solid #C8102E; }
.quote-text { font-size: 12px; color: #333; line-height: 1.6; font-style: italic; }
.quote-attr { font-size: 10px; color: #aaa; margin-top: 4px; }
.quote-attr a { color: #aaa; text-decoration: none; }
.quote-attr a:hover { color: #C8102E; text-decoration: underline; }

/* 根拠カード */
.cards-toggle { width: 100%; text-align: left; background: #f5f5f3; border: none; border-radius: 4px; padding: 5px 10px; font-size: 11px; color: #777; cursor: pointer; margin-top: 8px; }
.cards-toggle:hover { background: #eee; }
.cards-inner { display: none; margin-top: 6px; display: flex; flex-direction: column; gap: 5px; }
.evidence-card { padding: 7px 10px; background: #f9f9f7; border-radius: 5px; border: 1px solid #eee; }
.ev-head { display: flex; gap: 6px; align-items: center; margin-bottom: 3px; }
.ev-id { font-size: 10px; color: #aaa; font-weight: 600; }
.ev-tier { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; color: #fff; }
.ev-persons { font-size: 10px; color: #999; }
.ev-text { font-size: 11px; color: #444; line-height: 1.6; }
.utter-list { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; border-top: 1px solid #eee; padding-top: 6px; }
.utter-quote { display: flex; gap: 6px; align-items: baseline; }
.utter-id { font-size: 9px; color: #bbb; font-weight: 600; flex-shrink: 0; }
.utter-text { font-size: 11px; color: #666; line-height: 1.5; font-style: italic; }
.ev-missing { font-size: 11px; color: #ccc; font-style: italic; }
.card-type-badge { font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 4px; }
.ctype-mot { background: #E8F8F0; color: #1E8449; }
.ctype-pat { background: #F4ECF7; color: #7D3C98; }
.ctype-ind { background: #FDFEFE; color: #999; border: 1px solid #ddd; }

/* 行動パターン */
.bp-item { margin-bottom: 8px; padding: 10px 12px; background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; }
.bp-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.bp-id { font-size: 10px; color: #aaa; }
.bp-name { font-size: 12px; font-weight: 700; color: #1a1a1a; }
.bp-n { font-size: 10px; color: #C8102E; font-weight: 600; }
.bp-jtbd { font-size: 12px; color: #185FA5; font-style: italic; line-height: 1.6; margin-top: 5px; background: #EAF3FB; border-radius: 4px; padding: 5px 8px; }

/* HMW */
.hmw-item { margin-bottom: 8px; padding: 10px 12px; background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; }
.hmw-item-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.hmw-num { font-size: 10px; color: #aaa; }
.tier-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 6px; color: #fff; }
.t2 { background: #185FA5; }
.t3 { background: #C8A84B; }
.hmw-n { font-size: 10px; color: #C8102E; font-weight: 600; }
.hmw-text { font-size: 12px; color: #1a1a1a; line-height: 1.6; }

.score-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.score-chip { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #f5f5f3; color: #555; }
.score-chip.high { background: #E8F7EF; color: #1E8449; }
.score-chip.mid { background: #FEF9E7; color: #7D6608; }
</style>
</head>

<div class="header">
  <a href="index.html" class="back-link">← ファイル一覧に戻る</a>
  <div class="header-top">

<div class="kpi-bar">

  <div class="kpi-item"><span class="kpi-num">12</span><span class="kpi-label">クラスタ</span></div>

</div>

<div class="filter-bar">
  <span class="filter-label">表示：</span>
  <button class="chip active" onclick="setFilter('all', this)">全て</button>
  <button class="chip" onclick="setFilter('要追加', this)">追加ヒアリング推奨</button>
</div>

<div class="main">
  <div class="left-pane">
    <div class="cluster-grid" id="clusterGrid"></div>
  </div>
  <div class="right-pane" id="rightPane">
    <div class="empty-state">
      <div class="empty-icon">←</div>
      <div class="empty-text">クラスタを選択してください</div>
    </div>
  </div>
</div>

<script>
// ========== データ ==========

const ICL = {
  'ICL-1': {
    label: '疲弊状態での強制調理',
    thickness: 'T2厚（9名以上の事実+インサイト双方に根拠。CL-B・CL-Cの核心インサイト）',
    n: 9, t2: 12,
    desc: '「仕事中は自律的な環境（集中・評価あり）→ 帰宅で一切のコントロールを失う」という環境変化が、 心理的急降下（スコア8→1）を生み出す。その直後に「料理だけはサボれない（P-005）」という義務感が発動し、 最低パフォーマンス状態で最大負荷タスクを義務的に遂行する構造が固定化している。 問題は「料理が嫌い」ではなく「疲弊時の強制」であることを、P-009の「朝・土日は苦にならない」発言が証明している。'
  },
  'ICL-2': {
    label: '朝の家族システム起動係',
    thickness: 'T2厚（CL-Aの10名全員に潜在。「代替を求めない沈黙」が内面化の証拠）',
    n: 8, t2: 9,
    desc: '朝の40〜60分という固定枠に「子供の支度抵抗×複数同時タスク」が重なり、 「早くして」を繰り返す摩擦が恒常化する。この状況を誰かに交代させるという選択肢が 語られないという「沈黙」は、親が「自分がやるべき役割」として朝の家族起動を内面化していることを示す。 摩擦に伴う罪悪感は二次消耗となって精神的余剰をさらに削る。'
  },
  'ICL-3': {
    label: '外注の罪悪感と教育的正当化',
    thickness: 'T2中厚（価格感度が外注罪悪感の代替表現という構造解釈。P-006の転換が証拠）',
    n: 7, t2: 9,
    desc: '「料理=母親の責任」という社会規範の内面化が、外部サービスの「価格が高い」という言語化の背後に潜んでいる。 価格感度は実は「外注への自己正当化コスト」の代替表現であり（INS-M-011）、 「時間をお金で買う」という言語化を完了した対象者（P-006）は継続意向が高く、 未完了の対象者（P-005, P-010）は価格に敏感なまま。 この心理的障壁を突破する鍵は「教育的価値の付加」であり（INS-M-017）、 「家事外注」ではなく「子供の学び場の提供」というフレームが罪悪感を中和する。'
  },
  'ICL-4': {
    label: 'サービス試行・離脱サイクル',
    thickness: 'T2中厚（離脱理由2系統が複数名で一致。成功条件もCL-Nから逆算可能）',
    n: 6, t2: 8,
    desc: '外部サービス利用経験者の多くが「試行→離脱→別手段」というサイクルを経験している。 離脱理由は2系統に収束：①担当者変更・供給不安定（P-003, P-009）、②親に前提作業が必要（P-008, P-012）。 いずれも「頼んだのに頼めない」という構造的矛盾であり、一度信頼が崩れると回復が難しい非対称性がある。 逆に、「完成品+柔軟性」（P-012のつくりおき.jp継続）や「相性マッチング」（P-009の2年継続）が 成功条件として機能することが確認されている。'
  },
  'ICL-5': {
    label: '子供の食拒否と調理徒労感',
    thickness: 'T2中（7名だが一部提示後。「子供と一緒に作れば食べる」仮説は要検証）',
    n: 7, t2: 6,
    desc: '子供が食べないという体験は「料理の手間が無意味化される」という感情的ダメージを与え、 調理意欲の低下とサービス離脱の両方を引き起こす。 にもかかわらず「子供に食べてもらうこと=愛情の証明」という動機が、 別調理を止められなくする執着を生む（P-012: 30分別調理の継続）。 「子供と一緒に作れば食べる」という仮説（P-007）は、この課題への解法として新サービスに組み込まれており、 サービス継続率に直結する重要な検証課題でもある。'
  },
  'ICL-6': {
    label: '配偶者不参加の内面化',
    thickness: 'T2厚（11名の共通構造。「夫を変えない」という能動的諦めが全員に共通）',
    n: 11, t2: 11,
    desc: '全12名中11名で配偶者の家事分担について「詳細が語られない」という共通の沈黙がある。 語る対象者（P-006: 9割本人・1割夫）でさえ改善要求を提示せず「やることボード」で自己対処する。 「夫を変える」という選択肢を放棄し、外部サービスを「隠れて導入する（P-003）」か 「自分の工夫で対処する」に帰結する消極的適応が蓄積している。 この「適応」は表面上は機能しているように見えるが、 一方的な負荷集中・精神的消耗として潜在的ペインとして蓄積し続けている。'
  },
  'ICL-7': {
    label: '食育・料理体験への意思と専門家委譲欲求',
    thickness: 'T2中厚（7名・意思は真正だが時間制約/感情制約が実行を阻む）',
    n: 7, t2: 9,
    desc: '「子供に料理・食育体験をさせたい」という意思を持ちながら、 時間制約（P-005: 仕事復帰後断念）または感情的余裕の欠如（P-004: ガミガミ怒ってしまう） によって実行できない状態が複数名に共通する。 入口は異なるが——P-005は「実践していたが失った」、P-004は「やりたいが感情的にできない」、 P-001・P-006・P-010は「子供の関心に応えられていない（平日は余裕がない）」—— いずれも「自分ではなく専門家に任せたい」という委譲欲求として着地している点が共通する。 P-001は「手伝ってもらうと余計時間がかかりイライラ（平日）、週末なら許容できる」という発話であり、 食育を否定しているのではなく時間制約型の実行不可能状態を示している。新サービスへの反応も「同感しかしない」と最強の共感。'
  },
  'ICL-8': {
    label: '献立決定の事前儀式化（ICL-1に統合済み）',
    thickness: 'T3中（ICL-1の補足。独立クラスタとしては薄い）',
    n: 4, t2: 4,
    desc: '帰宅後の心理的急降下（ICL-1）を予知しているため、移動中に「何を作るか」を決めておく行為が 「帰宅後の不確実性を事前に除去する心理的準備」として機能している。 「クックパッドタイム」という命名は、この行動が儀式化・習慣化されていることを示す。 単なる献立決定ではなく、帰宅後のコントロール感の先行投資という構造を持つ。'
  },
  'ICL-9': {
    label: '三者トレードオフの固定化',
    thickness: 'T2厚（就寝時間・自分時間・家事完遂の3目標が構造的に両立不可）',
    n: 7, t2: 8,
    desc: '親は「子供を早く寝かせたい（20:30目標）」「家事を完遂したい（義務感）」「自分の時間もほしい（飢餓感）」という 三つの相互排他的な目標を同時に持ち、どれかを諦める選択を回避している。 この回避が、フリータイムゼロ・就寝時間遅延・慢性疲労という三重の損失をもたらしている。 解決策への障壁は、「完璧な母親像（子供の健康×家事完遂）への執着」という規範的動機（INS-M-016）である。 外部からの指摘（P-001: 先生から発育への影響を指摘）という「第三者による優先順位の再設定」が トレードオフの固定化を解除する唯一のトリガーになりえる。'
  },
};

const ICL_CARDS = {
  'ICL-1': ['INS-P-003', 'INS-P-004', 'INS-P-005', 'INS-P-021', 'INS-009-002', 'INS-P005-001', 'INS-011-001', 'INS-011-003', 'INS-012-001', 'INS-M-003', 'INS-M-005', 'INS-M-007', 'INS-M-018', 'INS-P-007', 'INS-001-001', 'INS-009-005', 'INS-010-006', 'INS-011-005', 'INS-012-009'],
  'ICL-2': ['INS-P-001', 'INS-P-002', 'INS-001-001', 'INS-002-001', 'INS-003-001', 'INS-010-003', 'INS-012-001', 'INS-M-001', 'INS-M-002', 'INS-001-002', 'INS-002-002', 'INS-003-004', 'INS-004-001'],
  'ICL-3': ['INS-P-012', 'INS-P-019', 'INS-P005-003', 'INS-P006-001', 'INS-009-003', 'INS-P007-002', 'INS-M-011', 'INS-M-015', 'INS-M-017', 'INS-M-020', 'INS-P005-006', 'INS-P006-006', 'INS-011-005'],
  'ICL-4': ['INS-P-011', 'INS-P-016', 'INS-P-010', 'INS-P008-001', 'INS-009-001', 'INS-P006-001', 'INS-012-003', 'INS-M-009', 'INS-M-010', 'INS-P005-006', 'INS-P006-006', 'INS-P007-006', 'INS-009-004'],

  'INS-011-007': { text: '仕事の具体的な職種・職場環境・勤務形態（SE・プログラミングとの記述はあるが詳細不足）。 「パソコン作業で集中できる」と述べているが、その仕事の内容・やりがい・人間関係が不明。 →仕事での充足感の根拠が不明確。', tier: 'T3', persons: ['P-011'] },

  'INS-011-009': { text: '新サービスコンセプト（家事代行+子どもとの料理体験）への評価・反応が全く記録されていない。 P-009, P-010, P-012では新サービスへの肯定的反応が記録されているが、 P-011にはない。', tier: 'T3', persons: ['P-011'] },

  'INS-012-002': { text: '子どもが「好き嫌い激しく食べてくれず、食事準備の労力が活かされない」と述べながら、 同時に「毎日子ども用の食事を別調理（30分）」している。 →子どもが食べない悩みと、それに対する別調理投資の両立という矛盾。', tier: 'T2', persons: ['P-012'] },
  'INS-012-003': { text: 'つくりおき.jp を「価格は妥当」「味が美味しい」と高く評価して3ヶ月継続利用している一方で、 過去のタスカジ利用では「お金を払っているのに買い物まで自分でするのが納得いかなかった」と不満。 ヨイスケ（ミールキット）は「自分で作らないといけない、量が少ない」で離脱。 →サービス形態による満足度の違いが明確。', tier: 'T2', persons: ['P-012'] },
  'INS-012-004': { text: '子どもの家事手伝いについて「ほとんどしていない。自分でやった方が早い」と効率性を優先しながら、 新サービスで「子どもとミールキット調理」をコンセプトの一部として説明されている。 →親の効率性優先と、サービスが提供する「子ども参加」という価値が矛盾している可能性。', tier: 'T2', persons: ['P-012'] },
  'INS-012-005': { text: '配偶者（夫）の勤務形態・帰宅時間・家事参加度・意思決定への関与が明示されていない。 つくりおき.jp 利用時に「夫婦で判断」というシーン（P-012-018）が記録されているが、 通常の家事分担状況が不明。', tier: 'T3', persons: ['P-012'] },
  'INS-012-006': { text: '新サービスコンセプト（家事代行+家庭教師形式、保育園お迎え対応、子どもとミールキット調理）に対する 親の評価・反応・利用意向が全く記録されていない。', tier: 'T3', persons: ['P-012'] },
  'INS-012-007': { text: '朝の支度時間 40分の詳細なスケジュール・各タスクの所要時間が記録されていない。 「起床→朝食・弁当・支度→出発まで40分」という総時間のみで、 各フェーズの分解がない。', tier: 'T3', persons: ['P-012'] },
  'INS-012-008': { text: '月間食費 12万円についての詳細な内訳・買い物内容・削減可能性が記録されていない。 「つくりおき.jp利用」「毎日子ども別調理」「衝動買い」などの要素がどの程度食費を構成しているのか不明。', tier: 'T3', persons: ['P-012'] },
  'INS-012-009': { text: '親自身のフリータイム・自分時間・精神的充足についての言及が最小限。 モチベーション 2/10 という状態は「疲れているだけ」なのか「気力がない」のか「やりがい喪失」なのか不明。', tier: 'T3', persons: ['P-012'] },
  'INS-M-001': { text: '朝の時間的切迫で「早くして」と繰り返す行動の裏にある動機は「子供への罪悪感の回避」ではなく 「家族の一日を安定的に起動することへの責任感」である。 朝の怒涛・戦争状態を受け入れながらも毎日繰り返しているのは、 「自分がやらなければ誰もやらない」という使命感が基盤にある。 これは「やりたくてやっている」ではなく「自分が家族のシステム起動係である」という役割の内面化を示す。', tier: 'T2', persons: ['P-001', 'P-010', 'P-012'] },
  'INS-M-002': { text: '「早くして」を繰り返す行動の深層にある動機は「子供への怒り」ではなく「自分の時間管理への不安」である。 子供を急かすのは「子供が遅い」という認識からではなく、 「出発に遅れたときの会社・保育園・周囲への影響」という外部からの評価恐怖が実際のドライバーである可能性が高い。 つまり、問題の矛先が「子供」に向いているが、根本原因は「親自身の社会的役割（会社員・親）の両立への不安」にある。', tier: 'T3', persons: ['P-001', 'P-006', 'P-012'] },
  'INS-M-003': { text: '帰宅後の心理的急降下の動機は「仕事環境」と「家事・育児環境」の「自律性の非対称性」にある。 仕事では「自分でペースを決められる（P-011: パソコン作業で集中できる）」「通勤は一人（P-011: ハッピー）」「評価がある」。 帰宅後は「子供のペースに完全に従属」「評価がない（子供は食べない）」「自己決定不可能」。 この「自律性剥奪」が帰宅直後の急落をもたらしており、疲労そのものではなく「コントロール喪失感」が本質的な苦痛源である。', tier: 'T2', persons: ['P-009', 'P-011'] },
  'INS-M-004': { text: '「通勤時間を『ハッピー』と評価する（P-011）」「毎朝5時起床で子供が起きる前に1.5時間確保する（P-003）」 という行動の動機は「自分時間への強い飢餓感」である。 帰宅後フリータイムがゼロになった結果、「本来は自分時間でない時間（通勤・早朝）」が 唯一の心理的充電機会として機能し始めており、その価値が過剰に高まっている。 この行動は「時間を取り戻すための戦略」ではなく「時間を無から生み出す苦肉の策」である。', tier: 'T2', persons: ['P-011', 'P-003'] },
  'INS-M-005': { text: '「料理が最も嫌いだが、料理だけはサボれない（P-005）」という言明の動機は 「料理=母親の責任」という社会的規範の内面化にある。 嫌悪感が9/10に達しながらも外注を選ばない理由は「コスト」だけでなく、 「料理を他者に任せること = 母親としての役割放棄」という罪悪感が心理的障壁として機能している。 これは「料理が嫌い」という感情の問題ではなく「料理をやめてはいけない」という規範の問題である。', tier: 'T2', persons: ['P-005', 'P-001', 'P-009', 'P-004'] },
  'INS-M-006': { text: 'P-007が「マック・カップラーメンで対処しながら申し訳なさを感じる」行動の動機は 「配偶者の評価への依存」だけでなく、 「食事の質=親としての愛情表現」という価値観の内面化にある。 配偶者がカップラーメンを歓迎しないことへの「申し訳なさ」は、 単なる夫婦間摩擦ではなく「自分が家族に十分な食事を提供できなかった」という 自己評価の失敗感を示している。', tier: 'T2', persons: ['P-007', 'P-001'] },
  'INS-M-007': { text: '「電車内でクックパッドを見る（P-001）」「電車でSNSで献立を調べる（P-005）」という行動の動機は、 単なる「献立決定」ではなく「帰宅後の精神的準備」にある。 帰宅直後の心理的負担（CL-Bで確認）を予見しているため、「何を作るか決めておく」という事前認知作業が 帰宅後の「コントロール感」を確保するための心理的先行投資として機能している。 「クックパッドタイム」という命名（UC-005）は、この行動が単なる検索ではなく「儀式化・習慣化」されていることを示す。', tier: 'T2', persons: ['P-001', 'P-005'] },
  'INS-M-008': { text: '「子供が食べない経験が調理意欲を低下させる（P-004）」「食べてくれないのに別調理を毎日30分続ける（P-012）」 という行動対立の動機は「子供の食事への過度な責任感」にある。 P-012は「食べてくれない→食事準備の労力が活かされない」と述べながら、 毎日30分の別調理を継続しているという行動の矛盾は、 「子供に食べてもらうこと=愛情の証明」という強い動機によって説明できる。 徒労感を感じながらも別調理を止められないのは、「止めること=子供を諦める」という等式が成立しているから。', tier: 'T2', persons: ['P-004', 'P-012', 'P-009'] },
  'INS-M-009': { text: '「外部サービスから離脱した経験」と「良いサービスを継続利用している経験（P-012: つくりおき.jp）」が 同一対象者群に並立している動機の核心は「信頼と安定への強い要求」にある。 P-009が「相性の良い元シェフとの2年継続→予約争奪戦で離脱」、P-012が「タスカジ・ヨイスケ離脱→つくりおき.jp継続」 という経験から、「サービスの品質・安定性への期待が一度裏切られると回復が難しい」 という信頼の非対称性（構築は時間がかかるが、破壊は一瞬）が動機の根底にある。', tier: 'T2', persons: ['P-003', 'P-009', 'P-008', 'P-012'] },
  'INS-M-010': { text: '「掃除・子守代行は5年継続したが料理代行は2回で中止（P-008）」という行動の動機は、 「料理は家族の健康・食の安全に直結する責任感」が外注を心理的に困難にしているためである可能性がある。 掃除は「誰がやっても結果が同じ（綺麗な状態）」だが、 料理は「誰が何を使って作るか」という過程と素材への信頼が結果の評価に直結する。 この「料理の属人性・過程への信頼要求」が、料理代行サービスへの高いハードルを生み出している。', tier: 'T3', persons: ['P-008', 'P-003'] },
  'INS-M-011': { text: '「価格評価がフレームによって逆転する（P-005）」という行動の動機は、 「外部サービス利用の正当化に対する心理的コスト」が高いことにある。 P-005が「9,500円+教育で良い」→「習い事フレームで月4万円は高い」と評価を変えるのは、 「食事の外注=母親の怠け」という規範への不安が、 「価格の高低」という客観的基準に置き換えられて表出しているためである可能性がある。 つまり「高いから払えない」ではなく「払うことへの自己正当化コストが高い」という動機が本質にある。', tier: 'T2', persons: ['P-005', 'P-007'] },
  'INS-M-012': { text: '「家事9割本人・1割夫という不公平を認識しながら、改善要求ではなく自分で工夫で対処する（P-006）」 という行動の動機は「配偶者への要求を放棄した合理的適応」にある。 夫を変えることへの期待と心理的コストが均衡した結果、 「自分がやった方が早い・確実」という判断が「不満の内向き処理」として定着している。 P-003が「夫に内緒でタスカジを利用した」（UC-080）という行動も、 配偶者への要求・交渉を回避した結果の「隠れた自律対処」として同一構造を持つ。', tier: 'T2', persons: ['P-003', 'P-006'] },
  'INS-M-013': { text: '「子供の料理参加に価値を感じているが現在は実行できていない（P-005, P-010, P-011）」という行動の動機は、 「理想の親像（子供と一緒に料理・家事をする）」が内面化され、現状との不一致が罪悪感を生じさせていることにある。 P-005のみが「育休中にモンテッソーリ的台所育児を実践 → フルタイム復帰後は困難」という明確な参照点（育休）を持つ。 P-010は「娘が料理に強い興味を持っているが対応できていない」という現在形の不一致。 P-011は「お料理ごっこはやっているが実際の料理はほとんどさせていない」という代替行動。 いずれも「こうしたい」という意図と「できない」という現状のギャップが教育委譲欲求を生んでいる。', tier: 'T2', persons: ['P-005', 'P-010', 'P-011'] },
  'INS-M-014': { text: '「子供に手伝いをさせたいが、手伝わせると余計時間がかかりイライラする（UC-020）」 という行動の動機の深層には「子供の成長を『待てない』という親の時間的焦り」だけでなく、 「子供の失敗・非効率を受け入れる許容空間の喪失」がある。 手伝いを拒否しているのは「時間がない」という表層理由だが、 本質的には「子供の不完全な行為を受け入れる心理的・時間的余裕がゼロになっている」状態を示す。 これは子育てにおける「関係性の質」の問題であり、時間短縮だけでは解決しない。', tier: 'T3', persons: ['P-001', 'P-010', 'P-011', 'P-002'] },
  'INS-M-015': { text: '「時間をお金で買う（P-006）」という言明の動機は、 単なる経済合理性ではなく「時間を金銭に変換することへの自己許諾」という心理的変化を示す。 この言明が発生するまでに「外注=怠け」という社会規範との葛藤があったと推測され、 「時間をお金で買う」という言語化は「外注の正当化」という認知再構成の完了を意味する。 この言語化をすでに行った対象者（P-006）はサービス継続意向が高く、 まだ行っていない対象者（P-005, P-010）は価格感度が高い状態に留まっている。', tier: 'T2', persons: ['P-001', 'P-006', 'P-004', 'P-009'] },
  'INS-M-016': { text: '「子供を早く寝かせたいが、家事を諦められない（UC-077）」という行動の動機は、 「完璧な母親像（子供の健康を守りながら家事も完遂する）」への執着にある。 どちらかを選べばいいはずなのに選べないのは、「子供の就寝時間 = 親の責任」と「家事の完遂 = 家族への貢献」という 二つの義務が同等の重みを持っているためである。 P-001が「先生から発育への影響を指摘された（UC-012）」後にサービスを導入したという事実は、 「外部からの客観的な指摘」が「義務の優先順位を変える」トリガーになることを示す。', tier: 'T2', persons: ['P-001', 'P-003', 'P-012'] },
  'INS-M-017': { text: '「家事代行に教育価値を求める（複数名）」という行動の動機は、 「外注への罪悪感を教育的正当化で中和する」メカニズムにある。 単なる「楽したい」では外注の心理的コストが高いが、 「子供が学ぶ」という教育価値が付加されることで「親としての責任を果たしながら外注する」という 自己正当化の論理が成立する。 P-009が「家事スキル習得を優先」と述べ、P-007が「単なる外注でなく学びが溜まる」と評価するのは、 この「教育的正当化による外注抵抗感の軽減」として理解できる。', tier: 'T2', persons: ['P-009', 'P-007', 'P-006', 'P-005'] },
  'INS-M-017b': { text: '教育的正当化（INS-M-017）は「外注の罪悪感」を中和するが、 価格評価においては逆効果を生む二重バインド構造がある。 「教育」フレームにすると比較対象がピアノ・公文（月5千〜1万円）にシフトし、 月4万円が「高すぎる習い事」として認知される。 一方「家事代行」フレームでは比較対象がつくりおき.jp（約1万円/週）となり、 「同額で教育も付く」と肯定的に評価される。 つまり罪悪感突破と価格納得は別の心理メカニズムで動いており、 訴求には二段構造が必要: (1) 罪悪感の突破 = 「子供の学びになる」（教育フレーム） (2) 価格の納得 = 「食費+家事代行費の置き換え」（コスト削減フレーム）', tier: 'T2', persons: ['P-005'] },
  'INS-M-018': { text: '「朝・夜の時間的切迫（CL-A）」「帰宅後の集中過負荷（CL-B）」「夕食調理負担（CL-C）」の3クラスタに 複数クラスタ所属する境界カード対象者（P-005, P-008, P-009）の共通動機は、 「1日全体の時間構造の最適化への渇望」ではなく「今夜の危機を乗り越えること」に収束している。 朝に「作り置き戦略」を考え（P-005）、昼休みに帰宅して夕食準備をする（P-012）行動は、 「長期計画」ではなく「目前の危機への短期対処」としての構造を持つ。 この「短期最適化志向」が外部サービスの「長期利用継続」を阻む心理的障壁の一つになっている可能性がある。', tier: 'T2', persons: ['P-005', 'P-008', 'P-009', 'P-004'] },
  'INS-M-019': { text: '「洗い物への嫌悪（CL-F）」と「配偶者の家事参加不足（CL-J）」の境界カード（UC-071, 072）が存在することは、 「洗い物嫌悪」の本質が「作業そのものへの嫌悪」だけでなく 「不公平な分担への怒り」の転嫁として機能している可能性を示す。 P-003「夫は料理するが後片付けしない（UC-071）」という状況での洗い物嫌悪は、 「洗い物という作業 + 夫が残した後始末をする役割への怒り」という二重の感情が混在している。 つまり、「洗い物をなくせば解決する」のではなく「不公平な家事分担への怒り」が残る可能性が高い。', tier: 'T3', persons: ['P-003', 'P-006', 'P-007', 'P-012'] },
  'INS-M-020': { text: '「疲弊状態を自覚しながらも外部サービスを「まだ必要ではない」と判断し続ける」という行動の深層動機は、 「サービスに頼ること=自分の限界を認めること」という自己イメージへの脅威にある可能性がある。 P-010が「ギリギリだが何とか回せている」と述べ、外部サービスを「テレワークが崩れた時の保険」と位置づけるのは、 「今は自力で対処できている自己」という自己評価を保持するための心理的防衛機制として機能している。 この「限界を認めたくない」という動機が、外部サービス導入の「閾値を高く維持する」一因となっている。', tier: 'T3', persons: ['P-005', 'P-009', 'P-012', 'P-011'] },
  'INS-P-001': { text: '「朝の40〜60分」を「怒涛」「戦争」と表現するパターンが7名に出現。 出発枠の短さに対して「子供の支度抵抗（準備しない・ご飯を食べない・遊び始める）」が重なり、 親が「早くして」を繰り返す→親子摩擦が生じる→精神的消耗が積み重なる、という三段構造の行動チェーンが共通する。 起床直後のモチベーションスコアは2〜5/10（複数名が2〜3と最低水準）で一致している。', tier: 'T2', persons: ['P-001', 'P-005', 'P-006', 'P-007', 'P-010', 'P-011', 'P-012'] },
  'INS-P-002': { text: '朝の時間的切迫が直接「親子関係の摩擦」を生む行動パターンが5名で確認される。 「早くして」の繰り返し（P-001）、子供の準備抵抗に対するイライラ（P-006, P-010, P-012）。 この摩擦は「子供へのネガティブな声かけ」として顕在化するが、 それ自体に罪悪感を抱く親も存在し（UC-002）、精神的二次消耗が発生する。', tier: 'T2', persons: ['P-001', 'P-005', 'P-006', 'P-010', 'P-012'] },
  'INS-P-003': { text: '「帰宅直後の心理状態の急降下」パターンが5名で一致する。 仕事中のモチベーションスコア（8〜10/10）から、帰宅直後に1〜3/10に急落する。 P-009は「仕事中は元気8/10→帰宅後1/10」、P-011は「帰宅時にドーンと落ちる」、 P-012は「仕事終了後〜就寝まで2/10」と表現。 この急降下の後、料理・入浴・宿題・寝かしつけが連続するため、 最もパフォーマンスの低い状態で最大負荷のタスクに向き合う構造となっている。', tier: 'T2', persons: ['P-004', 'P-009', 'P-011', 'P-012', 'P-003'] },
  'INS-P-004': { text: '帰宅後から就寝まで「自分の時間がゼロ」になるパターンが4名で一致。 P-011は「フリータイムなし→22:30に寝落ち」、P-003は「毎朝5時に起床して子供が起きる前1.5時間だけが自分時間」、 P-012は「仕事終了後〜就寝まで2/10」。 自分時間を確保するために「早朝起床」や「通勤時間」を活用するパターン（P-003: 5時起床、P-011: 通勤を「ハッピー」と表現）が、 帰宅後フリータイムゼロの裏返しとして存在する。', tier: 'T2', persons: ['P-011', 'P-003', 'P-009', 'P-012'] },
  'INS-P-005': { text: '「夕食調理が最大の家事負荷」として6名が一致して言語化するパターン。 「料理全工程が嫌い（P-005: 9/10）」「疲労困憊でストレス最大（P-009）」「1日で最も大変（P-004）」という表現が並立する。 同時に「料理だけはサボれない（P-005-010）」という義務認識が全員に共通しており、 嫌悪感と義務感が共存した「選択不可能なタスク」として調理が位置づけられている。', tier: 'T2', persons: ['P-005', 'P-009', 'P-004', 'P-001', 'P-007', 'P-008'] },
  'INS-P-006': { text: '「調理の手抜き・簡略化」を自発的に採択するパターンが5名で確認される。 前日の作り置きを温める（P-005）、ローストビーフ・マック・カップラーメン（P-007）、 コープ宅配の半調理食材（P-011）、子ども用別調理の簡略化（P-012）。 これらは「理想の食事」への妥協ではなく、「与えられた時間・体力の中での合理的選択」であるが、 配偶者や子供からの評価・食べてもらえないことで罪悪感が生じる例（P-007）もある。', tier: 'T2', persons: ['P-001', 'P-005', 'P-007', 'P-011', 'P-012'] },
  'INS-P-007': { text: '「通勤・帰宅移動のスキマ時間を献立決定に使う」パターンが4名で出現。 P-001は「クックパッドタイム（帰りの電車）」、P-005は「電車内でSNS検索」、 P-009は「帰宅前に考える」。 料理を「実行する場」（キッチン）ではなく「計画する場」（移動中）で処理しようとするメタ戦略が共通しており、 調理という義務を「事前の認知作業」に分解することで負荷を分散している。', tier: 'T2', persons: ['P-001', 'P-005', 'P-002', 'P-009'] },
  'INS-P-008': { text: '「作っても食べてくれない」という経験が7名で共通し、調理意欲の低下・サービス離脱・食材ロスの三連鎖を生むパターン。 P-004は「料理好きだったが偏食で作る意欲が減少」、P-012は「別調理を毎日30分追加」、 P-007は「作り置き.jpを試したが子供が食べず離脱」、P-009は「つくりおき.jp初回で子供が食べず」。 親の努力が「食べない」という一言で無効化される体験が積み重なることで、 外部サービス選択においても「子供が食べるか」が最重要評価軸になっている。', tier: 'T2', persons: ['P-004', 'P-012', 'P-007', 'P-009', 'P-008', 'P-002', 'P-005'] },
  'INS-P-009': { text: '「洗い物・後片付けを調理と不可分な最大嫌悪家事として位置づける」パターンが4名で出現。 P-003は「最も消したい家事は洗い物（油汚れ・カレー後）」、P-007は「洗い物が嫌い」、P-012は「洗い物が大変」。 特筆すべきは「調理した配偶者が後片付けをしない」（UC-071: 夫が料理するが後片付けせず）というパターンで、 「調理は担当しなくていい代わりに後片付けは担当する」という暗黙の役割分担が崩れている事例が含まれる。', tier: 'T2', persons: ['P-003', 'P-006', 'P-007', 'P-012'] },
  'INS-P-010': { text: '「外部サービスを使っても維持できない（リバウンド）」パターンが2名で確認される。 UC-041（P-002「タスカジ月2回利用しても3日でリバウンド」）という記述は、 片付けの問題が「一時的な作業量」ではなく「習慣・構造の問題」であることを示している。 整理された状態を「作る」コストより「維持する」コストの方が問題の本質であり、 外部サービスが「持続的な解決」にならないという重要な気づきを含む。', tier: 'T2', persons: ['P-002', 'P-003'] },
  'INS-P-011': { text: '「外部サービスを試したが離脱した」経験を持つパターンが5名以上で共通し、 離脱理由が「担当者変更・供給不安定」と「利用側の前提作業」の2系統に収束している。 P-003は「担当者が変わって新しい人を探すのが疲れる」（人的マッチング問題）、 P-009は「人気料理人の予約争奪戦になった」（供給不安定）、 P-008は「事前の食材準備が煩雑で2回で中止」（前提作業負荷）、 P-012は「タスカジで自分で買い物もしないといけないのが納得いかない」（同）。 つまり「誰かに頼みたいのに、頼むための準備が必要」という構造的矛盾が共通している。', tier: 'T2', persons: ['P-003', 'P-009', 'P-008', 'P-012', 'P-001', 'P-002'] },
  'INS-P-012': { text: '「外部食事サービスのコストを複数の参照点で相対評価するパターン」が5名で確認される。 P-005は「現在の食費（月3万円）との比較」「習い事フレームで月4万円→高い」と参照点を変えて評価。 P-007は「教育費（バレー・公文）に全振りしているため経済的に難しい」。 P-010は「ギリギリだが何とか回せている」という家計限界認識。 価格感度が高い層では「教育費が優先 → 食事サービスは後回し」という明確な優先順位体系が形成されている。', tier: 'T2', persons: ['P-005', 'P-007', 'P-010', 'P-009', 'P-001'] },
  'INS-P-013': { text: '配偶者の家事参加が「形式的には存在するが、実質的には母親の負荷軽減に貢献していない」パターンが4名で出現。 P-003「夫は料理するが後片付けしない」、P-006「家事9割本人・1割夫（週末の掃除機・お風呂のみ）」、 P-002「夫は子供関連の家事にほぼ手をつけない」、P-007「配偶者がカップラーメン非承認→評価者だが実行者でない」。 「評価者は存在するが実行者でない」（P-007の夫）という非対称性が最も鋭い表現。', tier: 'T2', persons: ['P-003', 'P-006', 'P-002', 'P-007'] },
  'INS-P-014': { text: '「子供に手伝いをさせたい気持ちはあるが、平日は時間がかかりすぎてできない」というジレンマが5名で一致する。 UC-020（P-001「手伝ってもらうと余計時間がかかりイライラ」）、P-005-008（「フルタイム復帰で台所育児が困難に」）、 P-010-005（「学校のお手伝い週間以外は日常的に実施せず」）、P-011-007（「時間がないためお料理ごっこで代替」）。 「週末なら子供の参加が可能」という例も3名に存在し（P-001, P-003, P-011）、 「時間的ゆとりが確保されれば子供参加が実現できる」という条件が浮かび上がる。', tier: 'T2', persons: ['P-001', 'P-005', 'P-010', 'P-011', 'P-003'] },
  'INS-P-015': { text: '「子供の家事・料理参加に価値を感じているが、現在は時間がなく実現できていない」という喪失・ジレンマパターンが5名で確認される。 P-005（「育休中はモンテッソーリ的な台所育児を実践 → フルタイム復帰後は困難」）は育休という明確な転換点を持つ唯一の事例。 P-006（「子供が料理番組をよく見ている → 友人からミールキットを勧められて外部委譲を検討」）、 P-010（「娘が料理に強い興味があるが対応できていない → お菓子作り教室で補完」）は育休の言及はないが同様の機会喪失を示す。 「子供の教育機会への意思と実行不可能状態」という共通構造は5名に共通するが、「育休→復帰」という転換点を持つのはP-005のみ。', tier: 'T2', persons: ['P-005', 'P-006', 'P-007', 'P-008', 'P-010'] },
  'INS-P-016': { text: '外部食事サービス（作り置き.jp / つくりおき.jp）の利用で「就寝時間の改善・フリータイム創出・家族の雰囲気改善」という 具体的な生活変容を経験するパターンが5名で確認される。 P-001「就寝時間が22:00→21:00に1時間早まった」、P-004「夜のフリータイムでも食事できるようになった」、 P-006「時間をお金で買う価値観に転換」、P-012「味が美味しく価格妥当で3ヶ月継続」。 利用開始後の「良くなった」という具体的な変化の記述が複数あることが、このクラスタの特徴。', tier: 'T2', persons: ['P-001', 'P-006', 'P-004', 'P-009', 'P-012'] },
  'INS-P-017': { text: '「帰宅後に自分の時間がゼロ → 早朝・通勤を唯一の自分時間として高く評価する」パターンが3名で共通。 P-003「毎朝5時起床で1.5時間確保」、P-011「通勤時間を『ハッピー』と評価」、P-001「すっぴんで送った後5分で化粧」。 帰宅後フリータイムの喪失が「逆説的に隙間時間への高い価値づけ」を生み出しており、 「普通は自分時間でない時間（通勤・早朝）を自分時間として流用する自己補完行動」として構造化できる。', tier: 'T2', persons: ['P-011', 'P-003', 'P-001'] },
  'INS-P-018': { text: '「子供を早く寝かせたい × 家事を終わらせたい」という相互排他的なトレードオフが3名で一致。 P-001は「就寝の遅さを先生から発育上の問題として指摘された」（外部から切迫感を付与される）、 P-003は「理想は20:00〜20:30に布団に入れたいが、家事を諦められない」（理想の明示）、 P-012は「保育園昼寝なし→夜ぐずりやすく21時までに寝かせる必要」（生理的制約）。 このトレードオフが解消されると「就寝改善 → 子供の発育・体調改善」という 具体的な成果につながることをP-001が実証している（作り置き利用後、就寝が1時間早まった）。', tier: 'T2', persons: ['P-001', 'P-003', 'P-012'] },
  'INS-P-019': { text: '「単なる家事代行ではなく、子供が学ぶ体験として機能する外部サービス」への価値評価が5名で一致。 P-007「単なる外注ではなく子供の中で学びが溜まっていく価値」、 P-008「買い物に行く体験も含められると理想」、 P-006「理科や算数など探究的な学び」への魅力、 P-009「子どもに料理・片付けスキルを教えてもらえる点が魅力」。 「家事代行」という機能的価値に加えて「子供の教育」という意味的価値が評価軸として追加されることで、 支払い意欲・継続意向が高まる構造が確認できる。', tier: 'T2', persons: ['P-007', 'P-008', 'P-006', 'P-009', 'P-005'] },
  'INS-P-020': { text: '「子供の成長に関わる体験（台所育児・手伝い）の実践機会が喪失し、代わりに外部サービスへの教育委譲を望む」 というパターンが4名で確認される。 ただし転換の契機は対象者ごとに異なる： P-005のみが「育休中の実践 → フルタイム復帰後断念」という明確なライフサイクルを持つ。 P-006は「子供が料理番組をよく見ている / 友人にミールキットを勧められて気づいた」という現在形の機会喪失。 P-010は「娘が料理に強い興味を持つが対応できていない → お菓子教室で補完」という代替行動。 P-011は「お料理ごっこをやっているが実際の調理は時間不足でほとんどさせていない」という状態。 4名共通の構造は「子供の教育機会への意思と実行不可能状態の並立」であり、「育休→復帰」という転換点はP-005にのみ確認できる。', tier: 'T2', persons: ['P-005', 'P-006', 'P-010', 'P-011'] },
  'INS-P-021': { text: '「嫌悪感を言語化しながらも義務として継続し、同時に部分的な工夫（作り置き・半調理食材・簡略化）で補完する」 という「不満のある適応」パターンが4名で確認される。 P-005（「料理が最も嫌い9/10」「だが料理だけはサボれない」）が最も鮮明。 P-009（「疲労困憊でストレス最大 / でも土日は苦にならない」）、 P-011（「複数の時短施策を実施しているが根本的問題は未解決」）、 P-012（「モチベーション2/10で昼休みに帰宅して夕食準備」）。 「完全に解決できないが、完全に放棄もできない」という中間状態が固定化しており、 外部サービス導入を「選択肢として考え始める」ための心理的閾値が高い状態。', tier: 'T2', persons: ['P-005', 'P-009', 'P-011', 'P-012'] },
  'INS-P005-001': { text: '嫌悪感と受容のズレ： P-005は「料理が最も嫌い（9/10）」という強い嫌悪と「必須義務」という認識を持ちながら、 実際の行動は「作り置き」「事後的献立決定」といった「要件を満たす最小限の対処」へシフトしている。 不満を言語化しながらも、その不満を完全には解消しようとしていない。 本来なら「タスカジ」「ミールキット」といった完全代行を選ぶべき水準の嫌悪度だが、 価格・家計・心理的ハードルで「部分対処（作り置き）」に留まっている。', tier: 'T2', persons: ['P-005'] },
  'INS-P005-003': { text: '価格評価の唯一の矛盾： 「9,500円で教育付きなら良い」と肯定する一方で、 「習い事フレーム（月4万円）では高い」と否定する点は、 フレーミング効果による評価の不安定性を示す。 ただしこれは「矛盾」というより「意思決定の論理性を失った状態」であり、 P-005自身が「フレームで印象が変わる」ことを自覚している（P-005-016）。 つまり矛盾ではなく「自分の判断が不安定であることへの認識」と言える。 購買判断は「価格」「家計基準」という外部制約に委ねられている状態。', tier: 'T2', persons: ['P-005'] },
  'INS-P005-005': { text: '子供のライフステージによる需要仮説が検証不可能： P-005は「子供の非認知能力育成」「台所育児」を価値観に挙げており、 育休中はモンテッソーリ実践をしていたという。 だが、現在の子供が何歳か、保育園にいるのか小学生か中学生かが全く明示されていない。 こうした情報は「台所育児が適切か否か」「どのサービス設計が有効か」を 判断する上で極めて重要だが、カード内に痕跡がない。', tier: 'T3', persons: ['P-005'] },
  'INS-P006-001': { text: '価値観の言語化と継続の矛盾： P-006は「時間をお金で買う」という明確な価値観を持ち、 作り置き.jpを月額32,000-42,000円で継続している。 だが同時に「味が濃い」「冷凍庫を占領」「毎週は多い」という複数の不満を抱え、 「やめようと思っている」と述べている。 この状態は「値段に見合わない」「期待と実績のズレ」を示唆する。 つまり、「時間をお金で買う」という価値観は「正しい認識」だが、 実際の作り置き.jpは「その価値を十分に提供していない」ということ。 一見「矛盾」に見えるが、実は「サービス選択の基準（時間価値）は正しい。 ただしサービス品質がそれに追いついていない」という消費者不満の表現。', tier: 'T2', persons: ['P-006'] },
  'INS-P006-003': { text: '家事分担不公平の「受容」は矛盾ではなく戦略的適応： P-006は「家事は本人が9割、夫は週末に掃除機やお風呂掃除を手伝う程度（1割）」と 述べており、これは明らかに不均等である。 だが、この状況に対して「改善せよ」という訴求がなく、 代わりに「朝6時にやることボード作成」「洗濯と仕事の多重処理」という 「自分で対処する」アプローチを採択している。 つまり、不公平を「夫を変えるべき課題」ではなく 「自分が工夫で対処すべき課題」として内面化している。 これは「矛盾」ではなく「現状に対する戦略的適応」 （セルフ・マネジメントによる対処）を示す。', tier: 'T2', persons: ['P-006'] },
  'INS-P006-005': { text: '子供の自発的関心の成因が不透明： P-006-013で「上の子が料理に興味があり、料理番組や教育テレビをよく見ている」 と述べるが、この関心がどこから来たのかが記述されていない。 これは3つの可能性を示唆する： 1. 子供が本来的に料理に興味があった（本人の素質） 2. 親（特に母）の家事を見ていて関心を持った（モデリング） 3. 友人や学校の料理実習で関心を持った（外部刺激） P-006-014で「友人からミールキットの方が子供と一緒にできて楽しいと聞いた」 という情報があるが、これが「上の子の既存の関心」に働きかけたのか、 それとも「この情報で初めて親が気づいた」のかが不明。 つまり、親の教育価値観シフト（チェーン2）が「子供の自発的関心」に基づくのか、 それとも「友人情報」がトリガーかが不明確。', tier: 'T3', persons: ['P-006'] },
  'INS-P007-001': { text: '実行行動と心理的葛藤の不一致： P-007は「出社日の帰宅が6時台で、時間がないため簡易食で対処」という 実際の行動パターンがある。 だが同時に「配偶者がカップラーメンを歓迎しないため申し訳なく感じている」 と述べており、この行動に対する「親としての罪悪感」を抱えている。 この状態は以下を示唆する： 1. 実際の生活では「簡易食せざるを得ない」という客観的制約がある 2. しかし心理的には「きちんと食事を作るべき」という規範を内面化している 3. 配偶者（おそらく夫）がその規範の代理者となっている つまり「実行可能な対処」と「心理的に望ましい行動」のズレが、 P-007に継続的なストレスをもたらしている可能性が高い。', tier: 'T2', persons: ['P-007'] },
  'INS-P007-003': { text: '配偶者の家事分担が不可視化されている矛盾： P-007は朝7-8時を「子供を起こす、朝ごはん準備・食べさせる、髪の毛セット、 水筒やお菓子の準備、食器洗い、送り出し」と述べており、 全てが本人による対応と読める。 また帰宅後も「ご飯を食べさせる → 入浴 → 歯磨き → 宿題丸付け」とあり、 配偶者の関与が出現しない。 だが「配偶者がカップラーメンを歓迎しない」という言及があるため、 配偶者は存在し、食事に対して価値観を持っている。 つまり「評価者は存在するが、実行者ではない」という、 P-006（9割本人・1割夫）と同様の不公平パターンが疑われる。 なぜP-007はこのテーマを明確に述べないのか？ あるいは聞き手がこの質問をしなかったのか？', tier: 'T2', persons: ['P-007'] },
  'INS-P007-005': { text: '偏食対応の親の戦略が不可視化： P-007-009で「子供の偏食傾向あり（ナゲット・ポテト好む）」と述べられているが、 その後、親がこの偏食にどう対処しているかが全く記述されていない。 考えられる対処戦略： 1. 「ナゲット・ポテトを提供する（子供の嗜好優先）」 2. 「栄養バランスを考えて別メニューも用意する（親の価値観優先）」 3. 「ナゲット・ポテトを基本に、追加で野菜を混ぜる（折衷）」 4. 「一切対処せず、食べたいものだけ食べさせる」 5. 「作り置きサービスを試した際に、子供が食べてくれなかった」（P-007-007） P-007-007で「作り置き.jp試したが、子供が食べてくれなかった」という 経験があるため、P-007は「偏食への対処の困難さ」を既に経験している。 なのに、「現在どうしているか」が言及されていない。 これは新サービス設計における重要な「制約条件」（子供の嗜好対応）なのに、 聞き手が「偏食対応の現状」を探索しなかった可能性がある。', tier: 'T3', persons: ['P-007'] },
  'INS-P008-001': { text: '外注経験豊富なのに、サービス形式による使い分けが明確： P-008は「掃除・子守を兼ねる家事代行を週1で5年間利用」という、 長期継続的な外注利用経験を持つ。 この経験は「外注へのハードルが低い」ことを示唆する。 だが「料理代行」に限定すると「事前準備の煩雑さで2回で中止」という 明確な負の評価をしている。 これは「矛盾」ではなく「サービス形式による使い分け」を示す： - 掃除・子守：業者が裁量で実施可能 → 長期継続 - 料理代行：事前準備（食材・献立指示）が親に必須 → 継続困難 つまり、P-008は「フリクションが少ないサービス」を求める傾向が強い。 新サービスが「ミールキット + 子供参加」という形式の場合、 事前準備がどの程度か、親の負荷がどうか、という点が 「選択」「継続」の重要な分岐点になる。', tier: 'T2', persons: ['P-008'] },
  'INS-P008-003': { text: 'サービス需要の時間軸的限定性の理性的認識： P-008は新サービスを「月1回でも需要がありそう」と評価し、 同時に「4年生以降は受験対策に比重が移り優先度が下がる」と述べている。 これは「矛盾」ではなく「ライフステージによる需要変化の理性的予見」である。 つまり、P-008は以下を認識している： - 現在（下の子10歳で小4以下と推測）：料理学習の体験は価値がある - 将来（4年生以降）：受験対応で学習優先度が上がる 新サービスの「ターゲット年代（小1-2年）」を理解し、 その限定性を受け入れている。 これは「見積責任感」「現実的な判断」を示す。 むしろ「このサービスは誰向けか」を理解している証拠。', tier: 'T2', persons: ['P-008'] },
  'INS-P008-005': { text: '配偶者の家事分担が不可視化 → 本人による「全責任引き受け」の可能性： P-008は「朝6-7時に起床して4食準備」「帰宅後に買い物→調理→食事」 「洗濯は就寝後に実施」と述べており、全て一人称で語られている。 配偶者の存在・行動が全く出現しない。 これは3つの可能性を示唆する： 1. 配偶者が実際に家事を担当していない（本人に全責任） 2. 配偶者は担当しているが、P-008が「自分の責任」と考えている 3. 聞き手が配偶者に関する質問をしなかった 特に重要なのは「受験対応」という、家族全体に影響する決定が 「P-008個人による対応」に落とし込まれている可能性である。 本来なら「受験生の子供を優先するため、他の家事は夫が担当」 という家族戦略があるべき。 その記述がないことは、P-008が「受験対応 + 全家事」という 二重負荷を抱えている可能性を示唆する。', tier: 'T3', persons: ['P-008'] },
};

// ========== UI ==========

let currentFilter = 'all';
let selectedId = null;

function qClass(q) {
  if (q === '右上') return 'q-tr';
  if (q === '左上') return 'q-tl';
  return 'q-bl';
}

function cardTypeLabel(id) {
  if (/^INS-M-/.test(id))           return { label: '動機推論', cls: 'ctype-mot' };
  if (/^INS-P-\d/.test(id))         return { label: 'パターン', cls: 'ctype-pat' };
  if (/^INS-P\d{3}-/.test(id))      return { label: '個人分析', cls: 'ctype-ind' };
  if (/^INS-\d{3}-/.test(id))       return { label: '個人分析', cls: 'ctype-ind' };
  return { label: '分析', cls: 'ctype-ind' };
}

function scoreClass(v) {
  if (v === '高') return 'high';
  if (v === '中') return 'mid';
  return '';
}

function renderGrid() {
  const grid = document.getElementById('clusterGrid');
  grid.innerHTML = CLUSTERS.map(c => {
    const needsMore = c.n <= 3;
    const show = currentFilter === 'all' || (currentFilter === '要追加' && needsMore);
    const sel = c.id === selectedId;
    return `
      <div class="cl-card ${sel ? 'selected' : ''} ${!show ? 'dim' : ''}"
           onclick="selectCluster('${c.id}')">
        <div class="cl-card-head">
          <span class="cl-id">${c.id}</span>
          ${needsMore ? '<span class="needs-more-badge">追加ヒアリング推奨</span>' : ''}
        </div>
        <div class="cl-name">${c.label}</div>
        <div class="cl-stat">${c.n}名 / 12名</div>
        <div class="cl-icl-tags">${c.icl.map(i => `<span class="icl-tag">${i}</span>`).join('')}</div>
      </div>`;
  }).join('');
}

function selectCluster(id) {
  selectedId = id;
  renderGrid();
  renderDetail(id);
}

function renderDetail(id) {
  const c = CLUSTERS.find(x => x.id === id);
  const hmws = HMW_DATA.filter(h => h.cluster === id || (h.cluster && h.cluster.split(/[・,]/).map(s=>s.trim()).includes(id)));
  const pane = document.getElementById('rightPane');

  const iclHtml = c.icl.map(iid => {
    const icl = ICL[iid];
    if (!icl) return '';
    const cardIds = ICL_CARDS[iid] || [];
    const cardsHtml = cardIds.map(cid => {
      const card = INSIGHT_CARDS[cid];
      if (!card) return '';
      const isMissing = card.text.includes('存在しないID') || card.text.includes('未収録');
      if (isMissing) return '';
      const sourceIds = CARD_SOURCES[cid] || [];
      const utterHtml = sourceIds.map(sid => {
        const q = UTTERANCE_QUOTES[sid];
        return q ? `<div class="utter-quote"><span class="utter-id">${sid}</span><span class="utter-text">${q}</span></div>` : '';
      }).filter(Boolean).join('');
      const ct = cardTypeLabel(cid);
      return `<div class="evidence-card">
        <div class="ev-head">
          <span class="ev-id">${cid}</span>
          <span class="ev-tier ${card.tier === 'T2' ? 't2' : 't3'}">${card.tier}</span>
          <span class="card-type-badge ${ct.cls}">${ct.label}</span>
          <span class="ev-persons">${card.persons.join(' · ')}</span>
        </div>
        <div class="ev-text">${card.text}</div>
        ${utterHtml ? `<div class="utter-list">${utterHtml}</div>` : ''}
      </div>`;
    }).filter(Boolean).join('');
    const visibleCount = cardIds.filter(cid => {
      const card = INSIGHT_CARDS[cid];
      return card && !card.text.includes('存在しないID') && !card.text.includes('未収録');
    }).length;
    return `
      <div class="insight-card">
        <div class="icl-header">
          <span class="icl-id-badge">${iid}</span>
          <span class="icl-thickness">根拠：${icl.thickness} | ${icl.n}名 / T2×${icl.t2}枚</span>
        </div>
        <div class="icl-label">${icl.label}</div>
        <div class="icl-desc">${icl.desc}</div>
        ${cardsHtml ? `<button class="cards-toggle" onclick="toggleCards(this)">▶ 根拠カード ${visibleCount}件を見る</button>
        <div class="cards-inner" style="display:none">${cardsHtml}</div>` : ''}
      </div>`;
  }).join('');

  const quotesHtml = c.quotes.map(q => {
    const pidMatch = q.attr.match(/P-(\d+)/);
    const pid = pidMatch ? 'P-' + pidMatch[1].padStart(3,'0') : null;
    const attrHtml = pid
      ? `<a href="participants.html?p=${pid}">${q.attr}</a>`
      : q.attr;
    return `<div class="quote-item">
      <div class="quote-text">「${q.text}」</div>
      <div class="quote-attr">${attrHtml}</div>
    </div>`;
  }).join('');

  const bps = BP_DATA.filter(b => b.cluster === id || (b.cluster && b.cluster.split(/[・,]/).map(s=>s.trim()).includes(id)));
  const bpHtml = bps.length ? bps.map(b => `
    <div class="bp-item">
      <div class="bp-head">
        <span class="bp-id">${b.id}</span>
        <span class="bp-name">${b.name}</span>
        <span class="bp-n">${b.n}名</span>
      </div>
      <div class="bp-jtbd">「${b.jtbd}」</div>
    </div>`).join('') : '';

  const themeInsight = THEME_INSIGHT[id];

  const hmwHtml = hmws.length ? hmws.map(h => `
    <div class="hmw-item">
      <div class="hmw-item-head">
        <span class="hmw-num">${h.id}</span>
        <span class="tier-badge ${h.tier === 'T2' ? 't2' : 't3'}">${h.tier}</span>
        <span class="hmw-n">${h.n}名</span>
      </div>
      <div class="hmw-text">${h.text}</div>
    </div>`).join('') : '<div style="font-size:12px;color:#aaa;">このクラスタ単独のHMWはありません</div>';

  const needsMore = c.n <= 3;
  pane.innerHTML = `
    <div class="detail-header">
      <div class="detail-id-row">
        <span class="detail-id">${c.id}</span>
        ${needsMore ? '<span class="needs-more-badge">追加ヒアリング推奨</span>' : ''}
      </div>
      <div class="detail-name">${c.label}</div>
      <div class="detail-stat">${c.n}名 / 12名</div>
      <div class="score-row">
        <span class="score-chip">確認：${c.n}名 / ${c.freq}%</span>
        <span class="score-chip ${scoreClass(c.scores.depth)}">課題の深さ：${c.scores.depth}</span>
        <span class="score-chip ${scoreClass(c.scores.unmet)}">未充足度：${c.scores.unmet}</span>
      </div>
    </div>

    ${themeInsight ? `<div style="background:#FDECEA;border-left:3px solid #C8102E;padding:8px 12px;border-radius:0 6px 6px 0;font-size:12px;color:#7B241C;margin-bottom:16px;line-height:1.6;">${themeInsight}</div>` : ''}

    <div class="section-block">
      <div class="section-title">代表発話</div>
      ${quotesHtml}
    </div>

    <div class="section-block">
      <div class="section-title">インサイト</div>
      ${iclHtml}
    </div>

    ${bpHtml ? `<div class="section-block">
      <div class="section-title">行動パターン / JTBD</div>
      ${bpHtml}
    </div>` : ''}

    <div class="section-block">
      <div class="section-title">HMW候補</div>
      ${hmwHtml}
    </div>
  `;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-bar .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function toggleCards(btn) {
  const inner = btn.nextElementSibling;
  const open = inner.style.display !== 'none';
  inner.style.display = open ? 'none' : 'flex';
  btn.textContent = open
    ? btn.textContent.replace('▼', '▶')
    : btn.textContent.replace('▶', '▼');
}

renderGrid();
</script>
