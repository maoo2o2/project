<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペット事業 ユーザーヒアリング横断分析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #FFFFFF;
    color: #333333;
    font-size: 14px;
    line-height: 1.5;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

  /* Header */
  .header { margin-bottom: 24px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; }
  .header p { font-size: 13px; color: #777; margin-top: 4px; }

  /* KPI Cards */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .kpi-card {
    background: #f5f5f3;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .kpi-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .kpi-value { font-size: 26px; font-weight: 700; color: #1a1a1a; line-height: 1.1; }
  .kpi-sub { font-size: 11px; color: #999; margin-top: 4px; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 2px solid #e8e8e8; margin-bottom: 20px; gap: 0; }
  .tab-btn {
    background: none; border: none; cursor: pointer;
    padding: 10px 20px;
    font-size: 14px; color: #777;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    font-weight: 500;
    transition: color 0.15s;
  }
  .tab-btn:hover { color: #333; }
  .tab-btn.active { color: #C8102E; border-bottom-color: #C8102E; font-weight: 700; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* --- Tab 1: Participants --- */
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .chip {
    padding: 5px 12px; border-radius: 20px;
    border: 1.5px solid #ddd; background: #fff;
    cursor: pointer; font-size: 13px; color: #555;
    transition: all 0.15s;
  }
  .chip:hover { border-color: #C8102E; color: #C8102E; }
  .chip.active { border-color: #C8102E; color: #C8102E; font-weight: 700; }

  .detail-panel { border: 1px solid #e8e8e8; border-radius: 8px; overflow: hidden; }
  .detail-header {
    background: #f9f9f7; padding: 14px 18px;
    border-bottom: 1px solid #e8e8e8;
    display: flex; align-items: center; gap: 12px;
  }
  .detail-name { font-size: 16px; font-weight: 700; }
  .detail-pet { font-size: 13px; color: #777; }
  .type-badge {
    padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
    margin-left: auto;
  }
  .type-explore { background: #EAF3FB; color: #185FA5; }
  .type-verify { background: #FFF3E0; color: #854F0B; }

  .cards-list { padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; }
  .utterance-card {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    background: #fafafa;
    border: 1px solid #eee;
    border-radius: 6px;
  }
  .cred-badge {
    flex-shrink: 0; width: 22px; height: 22px;
    border-radius: 4px; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; color: #fff;
  }
  .cred-A { background: #27AE60; }
  .cred-B { background: #185FA5; }
  .cred-C { background: #E67E22; }
  .cred-D { background: #C8102E; }
  .card-body { flex: 1; }
  .card-cluster { font-size: 11px; color: #999; margin-bottom: 2px; }
  .card-text { font-size: 13px; color: #333; }
  .verification-badge {
    margin-left: 8px;
    padding: 1px 7px; border-radius: 10px;
    background: #eee; color: #888; font-size: 10px;
  }

  /* --- Tab 2: Bubble Chart --- */
  .bubble-wrap { position: relative; }
  .bubble-canvas-container { position: relative; height: 450px; }
  .bubble-legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-top: 12px; font-size: 12px; color: #555;
    align-items: center;
  }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%;
    display: inline-block; margin-right: 4px; vertical-align: middle;
  }
  .legend-dash {
    width: 20px; height: 2px; border-top: 2px dashed #C8102E;
    display: inline-block; margin-right: 4px; vertical-align: middle;
  }
  .bubble-tooltip {
    position: fixed;
    background: #fff; border: 1px solid #ddd; border-radius: 8px;
    padding: 14px 16px; max-width: 280px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    font-size: 12px; line-height: 1.6;
    pointer-events: none; z-index: 999; display: none;
  }
  .bubble-tooltip h4 { font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #1a1a1a; }
  .bubble-tooltip .tt-row { color: #555; }
  .bubble-tooltip .tt-quote {
    margin-top: 8px; padding: 6px 8px;
    background: #fafafa; border-left: 3px solid #C8102E;
    font-style: italic; border-radius: 0 4px 4px 0; color: #444;
  }

  /* --- Tab 3: Heatmap --- */
  .heatmap-wrap { overflow-x: auto; }
  .heatmap-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  .heatmap-table th, .heatmap-table td {
    padding: 7px 10px; border: 1px solid #e8e8e8; text-align: center;
  }
  .heatmap-table th { background: #f5f5f3; font-weight: 600; }
  .col-header { min-width: 100px; }
  .col-header .tier-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 4px; vertical-align: middle;
  }
  .hypothesis-badge {
    display: inline-block; margin-left: 4px;
    padding: 1px 5px; border-radius: 8px;
    background: #FDECEA; color: #C8102E; font-size: 10px; font-weight: 700;
  }
  .row-label { text-align: left; white-space: nowrap; font-weight: 600; }
  .row-verify { border-left: 3px solid #854F0B !important; }
  .hm-cell { cursor: default; transition: opacity 0.15s; }
  .hm-cell:hover { opacity: 0.75; }
  .heatmap-footer td { background: #f9f9f7; font-size: 11px; color: #666; font-weight: 600; }

  .hm-tooltip {
    position: fixed;
    background: #1a1a1a; color: #fff;
    border-radius: 6px; padding: 8px 12px;
    font-size: 11px; max-width: 240px; line-height: 1.5;
    pointer-events: none; z-index: 999; display: none;
  }

  /* --- Tab 4: Clusters --- */
  .cluster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .cluster-card {
    border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden;
  }
  .cluster-card.hypothesis-card { border: 2px dashed #C8102E; }
  .cluster-card-header {
    padding: 12px 14px; border-bottom: 1px solid #eee;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .tier-badge {
    padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 700; color: #fff;
  }
  .tier-T1 { background: #27AE60; }
  .tier-T2 { background: #185FA5; }
  .tier-T3 { background: #C8A84B; }
  .sc-id { font-size: 11px; color: #999; }
  .cluster-name { font-size: 14px; font-weight: 700; flex: 1; }
  .hypo-badge {
    padding: 2px 7px; border-radius: 10px;
    background: #FDECEA; color: #C8102E; font-size: 10px; font-weight: 700;
  }
  .verif-pct-badge {
    margin-left: auto; padding: 2px 8px; border-radius: 10px;
    background: #FFF3E0; color: #854F0B; font-size: 10px; font-weight: 600;
  }
  .cluster-card-body { padding: 12px 14px; }
  .mention-bar-wrap { margin-bottom: 10px; }
  .mention-bar-label { font-size: 11px; color: #777; margin-bottom: 4px; }
  .mention-bar-track { height: 6px; background: #eee; border-radius: 3px; }
  .mention-bar-fill { height: 6px; border-radius: 3px; }
  .mini-chart-wrap { height: 50px; margin-bottom: 10px; }
  .rep-quote {
    border-left: 3px solid #C8102E; padding: 6px 10px;
    font-style: italic; color: #555; font-size: 12px;
    background: #fdfbfb; border-radius: 0 4px 4px 0;
    margin-bottom: 8px;
  }
  .rep-quote-attr { font-size: 10px; color: #aaa; margin-top: 3px; font-style: normal; }
  .cluster-desc { font-size: 12px; color: #555; margin-bottom: 8px; }
  .hmw-box {
    background: #EAF3FB; border-radius: 6px; padding: 8px 10px;
    font-size: 11px; color: #185FA5; margin-bottom: 10px;
  }
  .hmw-box strong { display: block; margin-bottom: 2px; }
  .expand-btn {
    width: 100%; padding: 6px; border: 1px solid #ddd;
    background: #fafafa; border-radius: 6px; cursor: pointer;
    font-size: 11px; color: #777; text-align: center;
    transition: background 0.15s;
  }
  .expand-btn:hover { background: #f0f0f0; }
  .card-list-inner { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .mini-card {
    padding: 6px 8px; background: #f9f9f7;
    border: 1px solid #eee; border-radius: 5px;
    display: flex; align-items: flex-start; gap: 7px;
  }
  .mini-cred {
    flex-shrink: 0; width: 18px; height: 18px; border-radius: 3px;
    font-size: 10px; font-weight: 700; color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .mini-card-text { font-size: 11px; color: #444; flex: 1; }
  .mini-card-by { font-size: 10px; color: #aaa; margin-top: 2px; }

  /* --- Stability Badge --- */
  .stab-badge {
    padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700;
  }
  .stab-3 { background: #E8F7EF; color: #27AE60; border: 1px solid #27AE60; }
  .stab-2 { background: #EAF3FB; color: #185FA5; border: 1px solid #185FA5; }
  .stab-1 { background: #FEF9E7; color: #C8A84B; border: 1px solid #C8A84B; }
  .stab-0 { background: #FDECEA; color: #C8102E; border: 1px solid #C8102E; }

  /* --- Behavior Patterns Section (Cluster Cards) --- */
  .bp-section {
    margin: 10px 0; padding: 10px 12px;
    background: #f9f9f7; border-radius: 6px;
    border: 1px solid #eee;
  }
  .bp-section-title {
    font-size: 10px; font-weight: 700; color: #888;
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .bp-row { margin-bottom: 7px; }
  .bp-label { font-size: 10px; color: #aaa; margin-bottom: 2px; }
  .bp-behaviors { list-style: none; padding: 0; margin: 0; }
  .bp-behaviors li { font-size: 11px; color: #444; padding: 1px 0; }
  .bp-behaviors li::before { content: "• "; color: #bbb; }
  .bp-jtbd {
    font-style: italic; color: #185FA5;
    background: #EAF3FB; border-radius: 4px;
    padding: 4px 8px; font-size: 11px; display: block;
  }
  .bp-opportunity {
    background: #E8F7EF; border-radius: 4px;
    padding: 4px 8px; font-size: 11px; color: #1E8449; display: block;
  }

  /* --- Tab 5: Summary --- */
  .sm-section { margin-bottom: 32px; }
  .sm-section-title {
    font-size: 16px; font-weight: 700; color: #1a1a1a;
    margin-bottom: 16px; padding-bottom: 8px;
    border-bottom: 2px solid #e8e8e8;
  }
  .sm-kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .sm-kpi-card { background: #f5f5f3; border-radius: 8px; padding: 14px 16px; }
  .sm-kpi-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .sm-kpi-value { font-size: 22px; font-weight: 700; color: #1a1a1a; line-height: 1.1; }
  .sm-kpi-sub { font-size: 11px; color: #999; margin-top: 4px; }
  .sm-conclusion {
    padding: 14px 16px; background: #FDECEA;
    border-left: 4px solid #C8102E; border-radius: 0 6px 6px 0;
    font-size: 13px; color: #444; line-height: 1.7;
  }
  .sm-hmw-list { display: flex; flex-direction: column; gap: 10px; }
  .sm-hmw-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px; border: 1px solid #e8e8e8;
    border-radius: 8px; background: #fff;
  }
  .sm-hmw-num {
    flex-shrink: 0; width: 24px; height: 24px;
    border-radius: 50%; background: #333; color: #fff;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .sm-hmw-body { flex: 1; }
  .sm-hmw-text { font-size: 13px; color: #222; margin-bottom: 5px; }
  .sm-hmw-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .sm-hmw-cluster { font-size: 10px; color: #888; background: #f5f5f3; padding: 1px 6px; border-radius: 8px; }
  .sm-hmw-n { font-size: 10px; color: #999; }
  .sm-action-list { display: flex; flex-direction: column; gap: 10px; }
  .sm-action-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; border: 1px solid #e8e8e8;
    border-radius: 8px;
  }
  .sm-priority-badge {
    flex-shrink: 0; padding: 3px 9px; border-radius: 12px;
    font-size: 11px; font-weight: 700; white-space: nowrap;
  }
  .sm-pri-high { background: #E8F7EF; color: #27AE60; border: 1px solid #27AE60; }
  .sm-pri-mid  { background: #EAF3FB; color: #185FA5; border: 1px solid #185FA5; }
  .sm-action-body { flex: 1; }
  .sm-action-title { font-size: 13px; font-weight: 600; color: #222; margin-bottom: 3px; }
  .sm-action-basis { font-size: 11px; color: #888; margin-bottom: 2px; }
  .sm-action-how { font-size: 11px; color: #555; }
  .sm-hearing-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
  .sm-hearing-table th {
    background: #f5f5f3; padding: 8px 10px;
    border: 1px solid #e8e8e8; font-weight: 600; text-align: left;
  }
  .sm-hearing-table td { padding: 8px 10px; border: 1px solid #e8e8e8; vertical-align: top; }
  .sm-hearing-table tr:hover td { background: #fafafa; }
  .sm-empty {
    padding: 24px; text-align: center;
    color: #aaa; font-size: 13px;
    border: 1px dashed #ddd; border-radius: 8px;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>ペット事業 ユーザーヒアリング横断分析</h1>
    <p>飼い主12名 / 全22件ヒアリング / 2025-11〜2026-03</p>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Interviews</div>
      <div class="kpi-value">12</div>
      <div class="kpi-sub">分析対象飼い主（DB全量22件中）<br>探索型: 8 / 検証型: 4</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Utterance cards</div>
      <div class="kpi-value">78</div>
      <div class="kpi-sub">A:60 B:10 C:4 D:5</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Clusters</div>
      <div class="kpi-value">6</div>
      <div class="kpi-sub">T1:2 / T2:3 / T3:1</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Top theme</div>
      <div class="kpi-value" style="font-size:18px; margin-top:2px;">予防投資の実在</div>
      <div class="kpi-sub">Rank 1 / 6</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('participants')">Participants</button>
    <button class="tab-btn" onclick="switchTab('bubble')">Bubble chart</button>
    <button class="tab-btn" onclick="switchTab('heatmap')">Heatmap</button>
    <button class="tab-btn" onclick="switchTab('clusters')">Clusters</button>
  </div>

  <!-- Tab: Participants -->
  <div id="tab-participants" class="tab-content active">
    <div class="chip-row" id="participant-chips"></div>
    <div class="detail-panel">
      <div class="detail-header" id="detail-header"></div>
      <div class="cards-list" id="detail-cards"></div>
    </div>
  </div>

  <!-- Tab: Bubble Chart -->
  <div id="tab-bubble" class="tab-content">
    <div class="bubble-wrap">
      <div class="bubble-canvas-container">
        <canvas id="bubbleChart"></canvas>
      </div>
      <div class="bubble-legend">
        <span><span class="legend-dot" style="background:#27AE60"></span>T1 — 実証済み課題</span>
        <span><span class="legend-dot" style="background:#185FA5"></span>T2 — 有効課題</span>
        <span><span class="legend-dot" style="background:#C8A84B"></span>T3 — 調査中</span>
        <span><span class="legend-dash"></span>事前仮説テーマ (SC-1)</span>
      </div>
    </div>
    <div id="bubbleTooltip" class="bubble-tooltip"></div>
  </div>

  <!-- Tab: Heatmap -->
  <div id="tab-heatmap" class="tab-content">
    <div class="heatmap-wrap">
      <table class="heatmap-table" id="heatmapTable"></table>
    </div>
    <div id="hmTooltip" class="hm-tooltip"></div>
  </div>

  <!-- Tab: Clusters -->
  <div id="tab-clusters" class="tab-content">
    <div class="cluster-grid" id="clusterGrid"></div>
  </div>


</div>

<script>
// ==================== DATA ====================
const DATA = {
  summary: {
    totalInterviews: 12,
    exploreCount: 8,
    verifyCount: 4,
    dbTotal: 22,
    totalCards: 78,
    credDist: { A: 60, B: 10, C: 4, D: 5 },
    clusterCount: 6,
    t1Count: 2,
    t2Count: 3,
    t3Count: 1,
    topTheme: "予防投資の実在",
    hypothesisEval: {
      rank: "6 / 6",
      stability: "2 / 3",
      biasLevel: "高",
      conclusion: "飼い主の<strong>自発的な関節課題言及はゼロ</strong>。価値評価の大半はC評価（誘導後同意）。「既に予防投資をしている層」への追加サービスとしては成立しうるが、新規市場を掘り起こすエビデンスは不足している。P13（黒沼さん）が2回目で明示的に「利用意向なし」と回答（D評価）。唯一の自発的言及は先代犬トラウマを持つP14のみ。"
    },
    hmws: [
      {id:1, text:"どうすれば飼い主が愛犬に喜びと健康を同時に届けられる食事を選べるか？", clusters:"SC-3 + SC-4", tier:"T1", n:9},
      {id:2, text:"どうすれば飼い主が行っているケアの効果を実感・確認できるか？", clusters:"SC-2", tier:"T2", n:6},
      {id:3, text:"どうすれば飼い主が愛犬の個体に合った食事の正解を見つけられるか？", clusters:"SC-6 + SC-2", tier:"T2", n:6},
      {id:4, text:"どうすれば飼い主が信頼できる情報源をもとに愛犬のケアを自己決定できるか？", clusters:"SC-5", tier:"T2", n:5},
      {id:5, text:"どうすれば飼い主が日常の中で愛犬の関節変化に気づけるか？", clusters:"SC-1", tier:"T3", n:4}
    ],
    nextActions: {
      high: [
        {title:"機能性フード・トッピングのニーズ深掘り", basis:"SC-3 + SC-4 T1交差点", how:"商品コンセプトテスト（P5, P12 が候補）"},
        {title:"「効果の可視化」価値提案の再設計", basis:"SC-2 の普遍性（関節限定でない）", how:"価値提案文の選好調査"}
      ],
      mid: [
        {title:"関節可視化の Ah-ha 体験プロトタイプ", basis:"P2 でデモが有効だった証拠", how:"プロトタイプ作成・Ah-ha体験テスト"},
        {title:"食事 × 健康モニタリングの連動サービス", basis:"SC-2 + SC-6 の重複ニーズ", how:"サービス設計・プロトタイプ検討"}
      ],
      hearings: [
        {target:"関節サプリ未使用者（P1, P10）", question:"購買障壁の詳細。何があれば始めるか"},
        {target:"既存サプリ使用者（P4, P5）", question:"効果実感の有無。解約・継続の判断基準"},
        {target:"食育士・手作りユーザー（P10, P3）", question:"理想の食事サービス像"}
      ]
    }
  },

  participants: [
    { id:"P1",  name:"ぱじさん",      segment:"飼い主", type:"Verify",  pet:"パグ5歳",
      cards:[

const TIER_COLOR = { T1: "#27AE60", T2: "#185FA5", T3: "#C8A84B" };
const CRED_COLOR = { A: "#27AE60", B: "#185FA5", C: "#E67E22", D: "#C8102E" };

function clusterById(id) { return DATA.clusters.find(c => c.id === id); }
function participantById(id) { return DATA.participants.find(p => p.id === id); }

// Build heatmap matrix: participant -> cluster -> cards[]
function buildMatrix() {
  const clusterIds = DATA.clusters.map(c => c.id);
  const matrix = {};
  DATA.participants.forEach(p => {
    matrix[p.id] = {};
    clusterIds.forEach(cid => { matrix[p.id][cid] = []; });
    p.cards.forEach(card => {
      if (matrix[p.id][card.cluster] !== undefined) {
        matrix[p.id][card.cluster].push(card);
      }
    });
  });
  return matrix;
}

let activeTab = 'participants';

let clusterChartInstances = {};

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const names = ['participants','bubble','heatmap','clusters'];
    btn.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  activeTab = name;

  if (name === 'bubble') initBubbleChart();
  if (name === 'heatmap') initHeatmap();
  if (name === 'clusters') initClusters();
}

// ==================== TAB 1: PARTICIPANTS ====================
let selectedParticipant = 'P1';

function renderParticipants() {
  const chipsEl = document.getElementById('participant-chips');
  chipsEl.innerHTML = '';
  DATA.participants.forEach(p => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (p.id === selectedParticipant ? ' active' : '');
    chip.textContent = p.id + ' ' + p.name;
    chip.onclick = () => { selectedParticipant = p.id; renderParticipants(); };
    chipsEl.appendChild(chip);
  });
  renderParticipantDetail();
}

function renderParticipantDetail() {
  const p = participantById(selectedParticipant);
  if (!p) return;

  const headerEl = document.getElementById('detail-header');
  const typeClass = p.type === 'Verify' ? 'type-verify' : 'type-explore';
  const typeLabel = p.type === 'Verify' ? '検証型' : '探索型';
  headerEl.innerHTML = `
    <div>
      <div class="detail-name">${p.name}</div>
      <div class="detail-pet">${p.pet}</div>
    </div>
    <span class="type-badge ${typeClass}">${typeLabel}</span>
  `;

  const cardsEl = document.getElementById('detail-cards');
  cardsEl.innerHTML = '';
  p.cards.forEach(card => {
    const div = document.createElement('div');
    div.className = 'utterance-card';
    const verifBadge = card.verificationDerived
      ? `<span class="verification-badge">verification</span>` : '';
    div.innerHTML = `
      <span class="cred-badge cred-${card.credibility}">${card.credibility}</span>
      <div class="card-body">
        <div class="card-cluster">${card.clusterLabel} (${card.cluster})</div>
        <div class="card-text">${card.text}${verifBadge}</div>
      </div>
    `;
    cardsEl.appendChild(div);
  });
}

// ==================== TAB 2: BUBBLE CHART ====================
function initBubbleChart() {
  if (bubbleChartInstance) {
    bubbleChartInstance.destroy();
    bubbleChartInstance = null;
  }

  const ctx = document.getElementById('bubbleChart').getContext('2d');
  const ttEl = document.getElementById('bubbleTooltip');

  // Build datasets per tier
  const tierGroups = { T1: [], T2: [], T3: [] };
  DATA.bubbles.forEach(b => {
    const clusterInfo = clusterById(b.id);
    tierGroups[b.tier].push({
      x: b.x,
      y: b.y,
      r: b.r,
      _label: b.label,
      _id: b.id,
      _isHypothesis: b.isHypothesis,
      _cluster: clusterInfo
    });
  });

  const datasets = Object.entries(tierGroups).map(([tier, points]) => ({
    label: tier,
    data: points,
    backgroundColor: TIER_COLOR[tier] + 'CC',
    borderColor: TIER_COLOR[tier],
    borderWidth: 1.5
  }));

  // Plugin: draw dashed border around SC-1 bubble + labels
  const afterDrawPlugin = {
    id: 'customDraw',
    afterDraw(chart) {
      const ctx2 = chart.ctx;
      chart.data.datasets.forEach((ds, di) => {
        ds.data.forEach((pt, pi) => {
          const meta = chart.getDatasetMeta(di);
          if (!meta.data[pi]) return;
          const el = meta.data[pi];
          const x = el.x, y = el.y;
          const r = el.options.radius || el.radius || 10;

          // Label
          ctx2.save();
          ctx2.textAlign = 'center';
          ctx2.textBaseline = 'middle';
          ctx2.fillStyle = '#fff';
          ctx2.font = 'bold 10px system-ui';
          const lines = pt._label.split('');
          // Draw label as two lines if long
          const half = Math.ceil(pt._label.length / 2);
          const l1 = pt._label.slice(0, half);
          const l2 = pt._label.slice(half);
          if (r > 12) {
            ctx2.fillText(l1, x, y - 6);
            ctx2.fillText(l2, x, y + 7);
          } else {
            ctx2.font = 'bold 8px system-ui';
            ctx2.fillText(pt._label.slice(0,4), x, y);
          }
          ctx2.restore();

          // Dashed border for hypothesis
          if (pt._isHypothesis) {
            ctx2.save();
            ctx2.setLineDash([4, 3]);
            ctx2.strokeStyle = '#C8102E';
            ctx2.lineWidth = 2.5;
            ctx2.beginPath();
            ctx2.arc(x, y, r + 3, 0, Math.PI * 2);
            ctx2.stroke();
            ctx2.restore();
          }
        });
      });
    }
  };

  bubbleChartInstance = new Chart(ctx, {
    type: 'bubble',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false }
      },
      scales: {
        x: {
          title: { display: true, text: '出現頻度 (%)', font: { size: 12 } },
          min: 0, max: 100,
          grid: { color: '#f0f0f0' }
        },
        y: {
          title: { display: true, text: '行動変容率 (%)', font: { size: 12 } },
          min: 0, max: 100,
          grid: { color: '#f0f0f0' }
        }
      },
      onHover(evt, elements) {
        if (elements.length === 0) {
          ttEl.style.display = 'none';
          return;
        }
        const el = elements[0];
        const pt = bubbleChartInstance.data.datasets[el.datasetIndex].data[el.index];
        const cl = pt._cluster;
        if (!cl) return;

        const totalCred = cl.credibility.A + cl.credibility.B + cl.credibility.C + cl.credibility.D;
        const verifPct = cl.fromVerification && cl.n ? Math.round(cl.fromVerification / cl.n * 100) : 0;
        ttEl.innerHTML = `
          <h4>${cl.id} ${cl.label}</h4>
          <div class="tt-row">Tier: <strong>${cl.tier}</strong></div>
          <div class="tt-row">言及者: <strong>${cl.n}名</strong></div>
          <div class="tt-row">行動変容率: <strong>${cl.depth}%</strong></div>
          <div class="tt-row">未充足度: <strong>${cl.unmet}%</strong></div>
          <div class="tt-quote">"${cl.representativeQuote.text}"<br><small>— ${cl.representativeQuote.participant}</small></div>
        `;

        const rect = ctx.canvas.getBoundingClientRect();
        const ex = evt.native.clientX;
        const ey = evt.native.clientY;
        const ttW = 280;
        let left = ex + 16;
        if (left + ttW > window.innerWidth - 10) left = ex - ttW - 16;
        ttEl.style.left = left + 'px';
        ttEl.style.top = Math.min(ey - 20, window.innerHeight - 200) + 'px';
        ttEl.style.display = 'block';
      }
    },
    plugins: [afterDrawPlugin]
  });

  ctx.canvas.addEventListener('mouseleave', () => { ttEl.style.display = 'none'; });
}

// ==================== TAB 3: HEATMAP ====================
function initHeatmap() {
  const table = document.getElementById('heatmapTable');
  table.innerHTML = '';
  const matrix = buildMatrix();
  const clusters = DATA.clusters;
  const participants = DATA.participants;

  // Header row
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  const thEmpty = document.createElement('th');
  thEmpty.textContent = '';
  hrow.appendChild(thEmpty);

  clusters.forEach(cl => {
    const th = document.createElement('th');
    th.className = 'col-header';
    const dotColor = TIER_COLOR[cl.tier];
    let hypoHtml = cl.isHypothesis ? `<span class="hypothesis-badge">★仮説</span>` : '';
    th.innerHTML = `<span class="tier-dot" style="background:${dotColor}"></span>${cl.label}${hypoHtml}`;
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  // Body rows
  const tbody = document.createElement('tbody');
  const hmTt = document.getElementById('hmTooltip');

  participants.forEach(p => {
    const row = document.createElement('tr');
    const tdLabel = document.createElement('td');
    tdLabel.className = 'row-label' + (p.type === 'Verify' ? ' row-verify' : '');
    tdLabel.textContent = `${p.id} ${p.name}`;
    row.appendChild(tdLabel);

    clusters.forEach(cl => {
      const cards = matrix[p.id][cl.id] || [];
      const count = cards.length;
      const td = document.createElement('td');
      td.className = 'hm-cell';

      let bg = 'transparent';
      let textColor = '#333';
      if (count === 1) bg = '#E6F1FB';
      else if (count === 2) bg = '#85B7EB';
      else if (count >= 3) { bg = '#185FA5'; textColor = '#fff'; }

      td.style.background = bg;
      td.style.color = textColor;
      td.style.fontWeight = count > 0 ? '600' : '400';
      td.textContent = count > 0 ? count : '';

      if (count > 0) {
        td.addEventListener('mouseenter', (e) => {
          const lines = cards.map(c => `[${c.credibility}] ${c.text}`).join('\n');
          hmTt.textContent = lines;
          hmTt.style.display = 'block';
          positionHmTt(e);
        });
        td.addEventListener('mousemove', positionHmTt);
        td.addEventListener('mouseleave', () => { hmTt.style.display = 'none'; });
      }

      row.appendChild(td);
    });
    tbody.appendChild(row);
  });

  // Footer row
  const footerRow = document.createElement('tr');
  footerRow.className = 'heatmap-footer';
  const tdFLabel = document.createElement('td');
  tdFLabel.textContent = '言及者数';
  tdFLabel.style.textAlign = 'left';
  footerRow.appendChild(tdFLabel);

  clusters.forEach(cl => {
    const td = document.createElement('td');
    td.textContent = `${cl.n}/12`;
    footerRow.appendChild(td);
  });
  tbody.appendChild(footerRow);
  table.appendChild(tbody);

  function positionHmTt(e) {
    const ttW = 240;
    let left = e.clientX + 12;
    if (left + ttW > window.innerWidth - 10) left = e.clientX - ttW - 12;
    hmTt.style.left = left + 'px';
    hmTt.style.top = Math.min(e.clientY - 10, window.innerHeight - 120) + 'px';
  }
}

// ==================== TAB 4: CLUSTERS ====================
function initClusters() {
  // Destroy existing mini charts
  Object.values(clusterChartInstances).forEach(c => c.destroy());
  clusterChartInstances = {};

  const grid = document.getElementById('clusterGrid');
  grid.innerHTML = '';

  DATA.clusters.forEach(cl => {
    const card = document.createElement('div');
    card.className = 'cluster-card' + (cl.isHypothesis ? ' hypothesis-card' : '');

    const totalCards = cl.credibility.A + cl.credibility.B + cl.credibility.C + cl.credibility.D;
    const verifPct = cl.n > 0 ? Math.round(cl.fromVerification / cl.n * 100) : 0;
    const hypoHtml = cl.isHypothesis
      ? `<span class="hypo-badge">★ 事前仮説テーマ</span>` : '';

    const mentionPct = Math.round(cl.n / 12 * 100);
    const barColor = TIER_COLOR[cl.tier];

    // Stability badge
    const stabHtml = (() => {
      if (!cl.stability) return '';
      const {count, total} = cl.stability;
      const cls = `stab-${count}`;
      return `<span class="stab-badge ${cls}" title="クラスタリング安定性">${count}/${total} 安定</span>`;
    })();

    // Behavior patterns section (T1/T2 only)
    const bpHtml = (() => {
      if (!cl.behaviorPatterns) return '<div class="sm-empty">行動パターン: 分析未完了</div>';
      const bp = cl.behaviorPatterns;
      const liItems = bp.behaviors.map(b => `<li>${b}</li>`).join('');
      return `
        <div class="bp-section">
          <div class="bp-section-title">行動パターン</div>
          <div class="bp-row">
            <div class="bp-label">行動特徴</div>
            <ul class="bp-behaviors">${liItems}</ul>
          </div>
          <div class="bp-row">
            <div class="bp-label">推定 JTBD</div>
            <span class="bp-jtbd">${bp.jtbd}</span>
          </div>
          <div class="bp-row" style="margin-bottom:0">
            <div class="bp-label">事業機会（VPC右側）</div>
            <span class="bp-opportunity">${bp.opportunity}</span>
          </div>
        </div>`;
    })();

    card.innerHTML = `
      <div class="cluster-card-header">
        <span class="tier-badge tier-${cl.tier}">${cl.tier}</span>
        <span class="sc-id">${cl.id}</span>
        <span class="cluster-name">${cl.label}</span>
        ${hypoHtml}
        ${stabHtml}
        <span class="verif-pct-badge">検証由来 ${verifPct}%</span>
      </div>
      <div class="cluster-card-body">
        <div class="mention-bar-wrap">
          <div class="mention-bar-label">言及者 ${cl.n}/12名 (${mentionPct}%)</div>
          <div class="mention-bar-track">
            <div class="mention-bar-fill" style="width:${mentionPct}%; background:${barColor}"></div>
          </div>
        </div>
        <div class="mini-chart-wrap">
          <canvas id="chart-${cl.id}" height="50"></canvas>
        </div>
        <div class="rep-quote">
          "${cl.representativeQuote.text}"
          <div class="rep-quote-attr">— ${cl.representativeQuote.participant}</div>
        </div>
        <div class="cluster-desc">${cl.desc}</div>
        ${bpHtml}
        <div class="hmw-box">
          <strong>HMW</strong>${cl.hmw}
        </div>
        <button class="expand-btn" onclick="toggleCardList('${cl.id}', this)">▼ カード一覧を展開</button>
        <div id="cardlist-${cl.id}" style="display:none" class="card-list-inner"></div>
      </div>
    `;
    grid.appendChild(card);
  });

  // Init mini charts after DOM is ready
  requestAnimationFrame(() => {
    DATA.clusters.forEach(cl => {
      const canvas = document.getElementById(`chart-${cl.id}`);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const c = cl.credibility;
      const chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['A', 'B', 'C', 'D'],
          datasets: [{
            data: [c.A, c.B, c.C, c.D],
            backgroundColor: [CRED_COLOR.A, CRED_COLOR.B, CRED_COLOR.C, CRED_COLOR.D],
            borderRadius: 2
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: { legend: { display: false }, tooltip: { enabled: true } },
          scales: {
            x: { display: false, beginAtZero: true },
            y: { display: true, ticks: { font: { size: 10 } } }
          }
        }
      });
      clusterChartInstances[cl.id] = chartInstance;
    });
  });
}

function toggleCardList(clusterId, btn) {
  const el = document.getElementById(`cardlist-${clusterId}`);
  const isOpen = el.style.display !== 'none';
  if (isOpen) {
    el.style.display = 'none';
    btn.textContent = '▼ カード一覧を展開';
    return;
  }

  // Build card list
  el.innerHTML = '';
  DATA.participants.forEach(p => {
    p.cards.filter(c => c.cluster === clusterId).forEach(card => {
      const div = document.createElement('div');
      div.className = 'mini-card';
      div.innerHTML = `
        <span class="mini-cred cred-${card.credibility}">${card.credibility}</span>
        <div class="mini-card-text">
          ${card.text}
          <div class="mini-card-by">${p.name} (${p.id})</div>
        </div>
      `;
      el.appendChild(div);
    });
  });

  el.style.display = 'flex';
  btn.textContent = '▲ カード一覧を閉じる';
}

        </div>

      </div>
