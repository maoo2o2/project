<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペットヒアリング分析 v3</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Helvetica Neue", sans-serif; background: #fff; color: #333; font-size: 14px; line-height: 1.5; }

/* ヘッダー */
.header { padding: 20px 24px 0; border-bottom: 1px solid #e8e8e8; }
.header-top { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
.header h1 { font-size: 18px; font-weight: 700; color: #1a1a1a; }
.header-meta { font-size: 12px; color: #999; }
.back-link { font-size: 12px; color: #888; text-decoration: none; margin-bottom: 8px; display: inline-block; }
.back-link:hover { color: #C8102E; }
.header-nav { display: flex; gap: 0; border-top: 1px solid #e8e8e8; margin-top: 12px; }
.nav-tab { padding: 8px 18px; font-size: 13px; color: #888; text-decoration: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.12s; }
.nav-tab:hover { color: #1a1a1a; }
.nav-tab.active { color: #C8102E; border-bottom-color: #C8102E; font-weight: 600; }

/* KPIバー */
.kpi-bar { display: flex; gap: 24px; padding: 12px 24px; background: #f9f9f7; border-bottom: 1px solid #e8e8e8; }
.kpi-item { display: flex; align-items: baseline; gap: 5px; }
.kpi-num { font-size: 22px; font-weight: 700; color: #1a1a1a; }
.kpi-label { font-size: 11px; color: #999; }

/* フィルタバー */
.filter-bar { display: flex; gap: 8px; padding: 12px 24px; border-bottom: 1px solid #e8e8e8; align-items: center; }
.filter-label { font-size: 11px; color: #aaa; margin-right: 4px; }
.chip { padding: 4px 12px; border-radius: 16px; border: 1.5px solid #ddd; background: #fff; cursor: pointer; font-size: 12px; color: #555; transition: all 0.12s; }
.chip:hover { border-color: #C8102E; color: #C8102E; }
.chip.active { border-color: #C8102E; color: #C8102E; font-weight: 700; background: #fff8f8; }

/* メインレイアウト */
.main { display: grid; grid-template-columns: 1fr 400px; height: calc(100vh - 140px); }

/* 左ペイン */
.left-pane { overflow-y: auto; padding: 16px 20px; border-right: 1px solid #e8e8e8; }
.cluster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

/* クラスタカード */
.cl-card {
  border: 1px solid #e0e0e0; border-radius: 10px; padding: 13px 14px;
  cursor: pointer; transition: border-color 0.12s, box-shadow 0.12s;
  background: #fff;
}
.cl-card:hover { border-color: #C8102E; box-shadow: 0 2px 8px rgba(200,16,46,0.1); }
.cl-card.selected { border-color: #C8102E; border-width: 2px; box-shadow: 0 2px 12px rgba(200,16,46,0.15); }
.cl-card.dim { opacity: 0.4; }

.cl-card-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.cl-id { font-size: 11px; color: #aaa; font-weight: 600; }
.cl-stars { color: #C8A84B; font-size: 12px; letter-spacing: -1px; }
.q-badge { padding: 1px 6px; border-radius: 6px; font-size: 10px; font-weight: 600; }
.q-tr { background: #FDECEA; color: #922B21; }
.q-tl { background: #EBF5FB; color: #1A5276; }
.q-bl { background: #f0f0f0; color: #888; }

.cl-name { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 5px; }
.cl-stat { font-size: 11px; color: #888; margin-bottom: 6px; }
.cl-bar-track { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 8px; }
.cl-bar-fill { height: 4px; border-radius: 2px; background: #C8102E; }
.cl-icl-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.icl-tag { font-size: 10px; padding: 1px 6px; border-radius: 6px; background: #EAF3FB; color: #185FA5; font-weight: 600; }

/* 右パネル */
.right-pane {
  overflow-y: auto; padding: 20px;
  background: #fafaf9;
}
.empty-state { height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: #ccc; }
.empty-icon { font-size: 32px; }
.empty-text { font-size: 13px; }

/* 詳細パネル内 */
.detail-header { margin-bottom: 16px; }
.detail-id-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.detail-id { font-size: 12px; color: #aaa; font-weight: 600; }
.detail-stars { color: #C8A84B; font-size: 14px; }
.detail-name { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
.detail-stat { font-size: 12px; color: #777; }

.section-block { margin-bottom: 20px; }
.section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: #aaa; margin-bottom: 8px;
  padding-bottom: 4px; border-bottom: 1px solid #eee;
}

/* インサイト */
.insight-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.icl-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.icl-id-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 6px; background: #185FA5; color: #fff; }
.icl-thickness { font-size: 10px; color: #888; }
.icl-label { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
.icl-desc { font-size: 12px; color: #555; line-height: 1.6; }

/* 代表発話 */
.quote-item { margin-bottom: 8px; padding: 10px 12px; background: #fff; border-left: 3px solid #C8102E; border-radius: 0 6px 6px 0; border: 1px solid #eee; border-left: 3px solid #C8102E; }
.quote-text { font-size: 12px; color: #333; line-height: 1.6; font-style: italic; }
.quote-attr { font-size: 10px; color: #aaa; margin-top: 4px; }
.quote-attr a { color: #aaa; text-decoration: none; }
.quote-attr a:hover { color: #C8102E; text-decoration: underline; }

/* 根拠カード */
.cards-toggle { width: 100%; text-align: left; background: #f5f5f3; border: none; border-radius: 4px; padding: 5px 10px; font-size: 11px; color: #777; cursor: pointer; margin-top: 8px; }
.cards-toggle:hover { background: #eee; }
.cards-inner { display: none; margin-top: 6px; display: flex; flex-direction: column; gap: 5px; }
.evidence-card { padding: 7px 10px; background: #f9f9f7; border-radius: 5px; border: 1px solid #eee; }
.ev-head { display: flex; gap: 6px; align-items: center; margin-bottom: 3px; }
.ev-id { font-size: 10px; color: #aaa; font-weight: 600; }
.ev-tier { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; color: #fff; }
.ev-persons { font-size: 10px; color: #999; }
.ev-text { font-size: 11px; color: #444; line-height: 1.6; }
.utter-list { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; border-top: 1px solid #eee; padding-top: 6px; }
.utter-quote { display: flex; gap: 6px; align-items: baseline; }
.utter-id { font-size: 9px; color: #bbb; font-weight: 600; flex-shrink: 0; }
.utter-text { font-size: 11px; color: #666; line-height: 1.5; font-style: italic; }
.ev-missing { font-size: 11px; color: #ccc; font-style: italic; }

/* 行動パターン */
.bp-item { margin-bottom: 8px; padding: 10px 12px; background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; }
.bp-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.bp-id { font-size: 10px; color: #aaa; }
.bp-name { font-size: 12px; font-weight: 700; color: #1a1a1a; }
.bp-n { font-size: 10px; color: #C8102E; font-weight: 600; }
.bp-jtbd { font-size: 12px; color: #185FA5; font-style: italic; line-height: 1.6; margin-top: 5px; background: #EAF3FB; border-radius: 4px; padding: 5px 8px; }

/* HMW */
.hmw-item { margin-bottom: 8px; padding: 10px 12px; background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; }
.hmw-item-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.hmw-num { font-size: 10px; color: #aaa; }
.tier-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 6px; color: #fff; }
.t2 { background: #185FA5; }
.t3 { background: #C8A84B; }
.hmw-n { font-size: 10px; color: #C8102E; font-weight: 600; }
.hmw-text { font-size: 12px; color: #1a1a1a; line-height: 1.6; }

.score-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.score-chip { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #f5f5f3; color: #555; }
.score-chip.high { background: #E8F7EF; color: #1E8449; }
.score-chip.mid { background: #FEF9E7; color: #7D6608; }
</style>
</head>

  <div class="header-top">
    <h1>ペット事業 ヒアリング横断分析 v3</h1>

  <button class="chip" onclick="setFilter('左上', this)">左上・追加ヒアリング (4)</button>
  <button class="chip" onclick="setFilter('左下', this)">左下・優先度低 (2)</button>
</div>

<div class="main">

  <div class="right-pane" id="rightPane">

<script>
// ========== データ ==========

const ICL = {
  'ICL-1': {
    label: 'やっている感の空回り構造',
    thickness: '厚い',
    n: 6, t2: 7,
    desc: '飼い主たちは複数の対処行動を実施しているにもかかわらず、「これが効いているのか」を判定する手段を持たない。効果が見えないため継続・中断の合理的判断ができず、「やめて悪化したら怖い」という恐怖が不確実な対処行動を惰性的に継続させる。さらに、専門家から「やっていることは合っている」と確認されることが効果エビデンスの代替として機能しており、客観的指標ではなく他者承認が行動の根拠になっている。'
  },
  'ICL-2': {
    label: '症状駆動型反応モード',
    thickness: '厚い',
    n: 6, t2: 7,
    desc: '飼い主の多くが「症状が出たら対処する」という反応的な判断モードを基本の行動様式としており、症状がない段階での予防的投資を「必要性が分からない・無駄かもしれない」と感じて踏み出せない。関節ケアを「最重視」と言いながらサプリを与えないという矛盾は、この反応的モードが価値観よりも優先されていることを示す。ただし、提示方法（フードへの組み込み・個別化アドバイス）が変わると行動が変容することも示されており、フレーミング次第で予防行動への移行が可能なポイントが存在する。'
  },
  'ICL-3': {
    label: '肉眼・主観の限界と個体別基準不在による二重の判断不能',
    thickness: '厚い',
    n: 5, t2: 8,
    desc: '飼い主は「毎日観察している」という自信を持っているが、実際には散歩動画で初めて足の異常に気づくなど、肉眼・主観による日常観察には構造的な限界がある。さらに、「この子の正常がどこなのか」という個体別基準の不在が重なり、「異常のサインなのか個性なのか」の判断ができない二重の困難を生んでいる。この二つの問題が重なった結果、飼い主は「見ているが気づけない」という心理的に消耗する状況に置かれ、動画診断・定期検診・記録ツールという外部の客観的手段への強い需要が生まれている。'
  },
  'ICL-4': {
    label: '獣医不信が透明性・根拠・個別化需要として再定義される',
    thickness: '厚い',
    n: 7, t2: 8,
    desc: '獣医への不信の本質は「医師個人への嫌悪」ではなく、「透明性とエビデンスの欠如」にある。先代犬のがん告知遅延（P-014）のような強烈な体験を持つ場合も、「第三者機関の客観的資料があれば判断できる」という姿勢を示しており、情報の質と透明性が担保されれば行動できる構造になっている。この不信は代替として「ブリーダーの犬種特化知識」「製造工程が見える製品」「AI・デジタル手段」への信頼形成へと転換されており、透明性と個別化がそろえば、従来の獣医師役割を代替・補完するサービスへの強い受容が生まれる可能性を示す。'
  },
  'ICL-5': {
    label: '知っている・やりたい・しかし続かない行動ギャップ',
    thickness: '厚い',
    n: 6, t2: 8,
    desc: '飼い主たちは健康管理の重要性を理解し、やろうとする意思を持っているが、日常のルーティンに組み込む「仕組み」がなければ継続できない。エクササイズは「思い出した時だけ」になり、記録ツールはUIが悪くても使い続けるという強い継続意欲を示しながら、その仕組みが最適化されていない現状がある。重要なのは「知識・動機の不足」ではなく「実行の仕組み化」であり、チェックリスト・リマインダー・直感的な記録ツールという外的足場が行動継続の決定的な要件となっている。'
  },
  'ICL-6': {
    label: '食事はケアを超えたペットとの関係性の表現',
    thickness: '厚い',
    n: 7, t2: 11,
    desc: '食事管理への高い関心は、栄養バランスへの不安だけでなく、「ペットと同じものを食べたい」「喜ぶ顔が見たい」という情緒的動機によって強く支えられている。料理教室への参加・資格取得という学習投資も、知識習得の枠を超えた「家族の一員として一緒に食事するという関係性の実践」として機能している。一方で、この情緒的動機は「罪悪感（同じものばかり）」とも表裏一体であり、実際には多くの対処を実施しているにもかかわらず、「十分にできていない」という自己評価が残存するという特有の難しさを持つ。'
  },
  'ICL-7': {
    label: '理想の食事製品が市場に存在しない',
    thickness: '厚い',
    n: 5, t2: 11,
    desc: '飼い主たちは「添加物が少なく」「栄養バランスが良く」「食いつきが良く」「継続可能な価格」という複数条件を同時に満たす製品を求めているが、現在の市場にそれが存在しない。この未解決状態が、市販ドライフードをベースに手作り食・トッピングで補完する「ハイブリッド対処」への収束を促している。重要なのは、この対処が「満足した解」ではなく「次善策」であり、探索行動が継続するという点。機能性が明確なら価格は許容し、利便性が改善されれば投資も増える可能性が示されており、製品設計の条件が具体的に見えてきている。'
  },
  'ICL-8': {
    label: '喪失・後悔体験が後悔の先払い構造を形成する',
    thickness: '中',
    n: 5, t2: 8,
    desc: '先代犬のがん死・若い犬の喪失・散歩動画での初めての気づきという「間に合わなかった」体験が、現在の愛犬に対する予防的な健康管理行動の最も強力な動機として機能している。定期検診・体重管理・記録ツール導入などの行動が「今度は絶対に同じ後悔をしない」という後悔の先払いとして実行されている。この動機は反応的モード（ICL-2）の対極にある強固な行動エンジンであり、喪失経験者には予防的サービスへの受容性が高い。ただし、喪失体験の感情的プロセスは語られにくく、次のヒアリングでの深掘りが必要。'
  },
};

const ICL_CARDS = {
  'ICL-1': ['INS-P002-005','INS-P004-003','INS-P005-002','INS-P009-004','INS-PAT-015','INS-PAT-016','INS-PAT-017','INS-MOT-004','INS-MOT-019','INS-ABS-P004-002'],

  'ICL-5': ['INS-P004-001','INS-P004-005','INS-P010-004','INS-P013-004','INS-PAT-021','INS-PAT-022','INS-PAT-026','INS-MOT-003','INS-MOT-023','INS-MOT-024','INS-ABS-P004-004'],
  'ICL-6': ['INS-P003-001','INS-P009-001','INS-P009-002','INS-P010-001','INS-P010-002','INS-P010-004','INS-P011-003','INS-P012-001','INS-PAT-008','INS-PAT-009','INS-PAT-010','INS-MOT-012','INS-MOT-029'],
  'ICL-7': ['INS-P005-001','INS-P005-003','INS-P005-004','INS-P011-001','INS-P011-002','INS-P012-002','INS-P012-006','INS-PAT-006','INS-PAT-007','INS-MOT-010','INS-MOT-011','INS-MOT-013','INS-ABS-P012-001'],
  'ICL-8': ['INS-P006-010','INS-P009-005','INS-P013-003','INS-P001-011','INS-P014-004','INS-PAT-018','INS-PAT-023','INS-MOT-009','INS-MOT-020','INS-MOT-027','INS-ABS-P009-006'],
};

const INSIGHT_CARDS = {
  'INS-P002-003': { text: 'P-002は日常的な観察を実施していると述べているが、散歩動画で初めて「右後ろ足をかばっている」ことに気づく経験をしている。「観察している」という自信と「観察が不十分だった」という現実の矛盾。', tier: 'T2', persons: ['P-002'] },
  'INS-P002-005': { text: '涙やけに対して「効くと言われる食べ物」を継続的に与えているにもかかわらず、その効果を全く測定・確認できていない状態が続いている。「やっている」と「分からない」が並存する不安定な状態。', tier: 'T2', persons: ['P-002'] },
  'INS-P003-001': { text: '栄養バランスのため手作り食を与えているが「タンパク質が不足する懸念があるため市販ドライフードと組み合わせている」。手作り食の栄養充足性に対する確信の不完全さを示唆。', tier: 'T2', persons: ['P-003'] },
  'INS-P004-001': { text: '関節健康の重要性を理解し整体師から推奨されたエクササイズの重要性を認識しているにもかかわらず、実際には「思い出した時にたまに実施」という行動に留まっている。前のめり姿勢・ガニ股などの複数の姿勢問題が未解決のまま残存。', tier: 'T2', persons: ['P-004'] },
  'INS-P004-003': { text: '「納豆・豆乳ヨーグルト・ビフィズス菌が本当に効果あるのか疑問」「劇的改善がない」と複数カードで効果疑問を表明しながら実施を継続している。「疑問を持ちながら続ける」という判断停止状態。', tier: 'T2', persons: ['P-004'] },
  'INS-P004-005': { text: '専門家から「やっていることが合っている」と言われると安心につながる価値観を持つ一方で、推奨されたエクササイズは思い出した時にたまに実施するだけ。「専門家の指導を受けることへの満足」と「実際の行動実行」が分離。', tier: 'T3', persons: ['P-004'] },
  'INS-P004-006': { text: '複数の専門家（整体師・獣医師・トレーナー）に対して領域別の優先度を明確化しているが、姿勢と消化器など複合的症状はどの専門家に相談するか判断がつかず、結果的に対処が進まない可能性がある。', tier: 'T3', persons: ['P-004'] },
  'INS-P005-001': { text: 'フード選定にアレルギー回避・グレインフリー・シングルプロテインという厳格な基準を持ち複数ブランドをローテーション使用するほど関心が高いのに、健康における食事の重要度は「4割程度」と評価している。', tier: 'T2', persons: ['P-005'] },
  'INS-P005-002': { text: 'グルコサミンとイミダゾールペプチドのサプリメントを1年以上継続使用し複数の予防対処を実行しているが、サプリメント効果への確実性を感じていない可能性。多数の対処を行っているのに対処満足度が「妥協」に留まっている。', tier: 'T2', persons: ['P-005'] },
  'INS-P005-003': { text: 'ウェットフードを「扱いにくさ、価格の高さ」を理由に使用していないのに、トッピング製品に対しては「栄養素の不足を補える形で提供されるなら魅力的」と評価。利便性が改善されれば栄養補完への投資に積極的になる可能性。', tier: 'T2', persons: ['P-005'] },
  'INS-P005-004': { text: 'トッピング製品に「関心を示す」一方で「単なる味変のためのトッピングでは必要性を感じない」と明確に拒否。機能性（特に関節ケア）が前提条件となっており、嗜好性向上のみの製品には価値を認めていない。', tier: 'T2', persons: ['P-005'] },
  'INS-P005-005': { text: '「食欲、排泄物の状態、行動の変化」を健康判断基準として確立しているが、ヘルニアのような内部疾患では同じ指標では発見困難の可能性が高く、外部指標への依存が持つ限界が示唆されている。', tier: 'T2', persons: ['P-005'] },
  'INS-P009-001': { text: 'ペットを家族としてヒューマングレード食を与えたいという価値観に対し、実際の行動は限定的。6匹中1匹には国産牛肉のみという個別対応をしているが他の5匹は基本的に同じドライフード。価値観は高いが実装は限定的という乖離。', tier: 'T2', persons: ['P-009'] },
  'INS-P009-002': { text: '高齢犬（10歳超チン）に対して細かい食事配慮をしている一方で、当の高齢犬は「国産牛肉しか食べない」という非常に限定的な食材選好を持っている。飼い主の工夫が対象犬の嗜好によって制限されている構造的な困難。', tier: 'T2', persons: ['P-009'] },
  'INS-P009-003': { text: '複数の高齢犬（6匹、10歳以上複数）を飼育しながら個別対応が限定的。複数の高齢犬・多犬種飼育という複雑な状況に対して、対応の個別度に差がある。', tier: 'T2', persons: ['P-009'] },
  'INS-P009-004': { text: '若い犬がガンで亡くなった喪失経験から定期検診を開始したにもかかわらず、別の健康リスク（フローリングによる関節損傷）については対処法が限定的（カーペット敷設のみ）で根本的な解決に至っていない。予防意識と実装のギャップ。', tier: 'T2', persons: ['P-009'] },
  'INS-P010-001': { text: '塩分制限の必要性と「同じものを食べたい」という願望が相反している。心臓病の制約条件と家族との共食願望が相容れない状態。', tier: 'T2', persons: ['P-010'] },
  'INS-P010-002': { text: '安全食材への強い関心を表明しながら、実際の食事管理はシンプルなささみトッピングで完結している。ペット食育士資格取得・料理教室参加といった学習行動と実際の食事実践に高度な乖離がある。', tier: 'T2', persons: ['P-010'] },
  'INS-P010-004': { text: '食事管理への学習投資（資格取得・料理教室）と実際の食事実践の間に実装ギャップがある。資格を取得・料理教室に参加するなど高い学習意欲を示しているが実際の食事は「ドライフード+ささみトッピング」という入門的レベル。', tier: 'T2', persons: ['P-010'] },
  'INS-P011-001': { text: 'コスト意識と実際の購買行動が不一致。「安すぎる商品は栄養面で不安」と述べながら、フード選択の優先順位に「コスト」を含めず高級ブランドへの変更を検討している。品質・食いつき・粒サイズが実際の優先軸。', tier: 'T2', persons: ['P-011'] },
  'INS-P011-002': { text: '「食べ物への興味が全般的にあまりない（珍しい）」という自己認識と「チキン系に良く反応」「チュールに非常に反応が良い」という高い食いつき事例が共存。実は「食欲が低い」のではなく「食材・形態による嗜好の差が大きい」可能性が高い。', tier: 'T2', persons: ['P-011'] },
  'INS-P011-003': { text: '手作りフードの障壁として「手間・量・栄養バランスの難しさ」という構造的な課題を挙げているのに対し、行動変容のきっかけは「犬が喜んで食べる」という食いつきに限定。栄養バランスの不安は解決されないまま感情的な報酬によってのみ動機づけられる可能性。', tier: 'T2', persons: ['P-011'] },
  'INS-P012-001': { text: '「同じドライフードばかり与えているという罪悪感」を感じているにもかかわらず、実際には複数の対処（トッピング・手作り食・手作りおやつ）を積極的に実行している。罪悪感と行動が合致していない。', tier: 'T2', persons: ['P-012'] },
  'INS-P012-002': { text: '「理想のウェットフード（総合栄養食・食いつき良好・継続可能価格）が見つからない」という現在の課題がありながら、新規提案に好意的で高い価格帯でも許容できるという態度を示している。', tier: 'T2', persons: ['P-012'] },
  'INS-P012-006': { text: '「新しいフードは試食パックで試してから購入する」という慎重なプロセスを実践しているにもかかわらず、「理想のウェットフードが見つからない」という課題がある。試用プロセスは実装されているが継続使用への移行が起こっていない。', tier: 'T2', persons: ['P-012'] },
  'INS-P013-002': { text: '「便の状態を最大の健康指標」と明確に位置づけ記録を獣医師相談に活用しているにもかかわらず、下痢が続くと元気がなくしょぼんとする傾向を観察した際の対処行動が明記されていない。指標の重視と対処の実装にギャップがある可能性。', tier: 'T2', persons: ['P-013'] },
  'INS-P013-003': { text: '過去2年間で複数のフードを試して合うものを探し続けているという能動的な探索態度が表現されているのに対し、選定理由や関心度の記述が薄い。同一テーマにおける態度の記録レベルにばらつきがある。', tier: 'T2', persons: ['P-013'] },
  'INS-P013-004': { text: 'Microsoft Formsを使って記録を獣医師相談に活用しているが満足度は「妥協」で、UIの改善やより使いやすいアプリを望んでいるという改善ニーズが表現されている。', tier: 'T2', persons: ['P-013'] },
  'INS-P014-001': { text: '関節ケアを「最重視」と言いながら、症状がないために関節ケアサプリの給与行動に至っていない。価値観と実際の行動優先度にズレがある。', tier: 'T2', persons: ['P-014'] },
  'INS-P014-003': { text: '獣医療システムに対して根本的な不信を抱きながら、同時に「第三者機関から与えられた客観的資料をもとに判断したい」と科学的根拠への依存を示している。不信の対象と解決策の間の矛盾。', tier: 'T2', persons: ['P-014'] },
  'INS-P014-004': { text: '給餌量の個別最適化を強く求めながら、月4万円の既存投資を継続している。「3〜5kg犬は○グラム」のような曖昧な指示しかなく困っているが他に選択肢がないため継続している状態。', tier: 'T2', persons: ['P-014'] },
  'INS-P014-007': { text: '獣医師に「どの先生を信じていいんだよ」と判断基準が曖昧で困っているが、「個体に合わせたアドバイスがあれば絶対行動する」「アプリ利用ハードルが全くない」と、個別化・デジタル化されれば強い決定力を示す。', tier: 'T2', persons: ['P-014'] },
  'INS-PAT-002': { text: '関節ケアへの高い関心・動機づけと、実際の行動優先度が症状の有無で決まるという「症状駆動型優先度設定」の構造。症状がない段階では、理解・懸念はあっても具体的な予防行動に踏み出せない。', tier: 'T2', persons: ['P-004','P-005','P-009','P-014'] },
  'INS-PAT-003': { text: '関節・骨格問題の発見が「外部ツールや第三者の視点」によって初めて可能になるという発見困難の構造。日常的な観察では気づけず、動画・専門家・施術などの介入があって初めて異常が顕在化する。', tier: 'T2', persons: ['P-002','P-009','P-005'] },
  'INS-PAT-006': { text: '食事内容への不安が「漠然とした不安→基準確立→行動化」というプロセスで機能するが、理想を満たす製品が市場にないため不安が払拭されないまま残存するという未解決サイクル。', tier: 'T2', persons: ['P-003','P-005','P-011','P-012'] },
  'INS-PAT-007': { text: '市販フードの栄養バランスへの懸念を、市販フードを基盤としながらトッピング・手作り食を補完的に加えるという「ハイブリッド対処」で解決しようとする構造。現実的な折衷策を選択。', tier: 'T2', persons: ['P-003','P-005','P-011','P-012'] },
  'INS-PAT-008': { text: '手作り食への関心が「ペットを家族・同等の存在として扱いたい」という価値観に根ざし、料理教室参加・資格取得などの学習投資へと昇華するという価値観駆動型学習拡大の構造。', tier: 'T2', persons: ['P-003','P-010','P-009'] },
  'INS-PAT-009': { text: '手作り食への高い関心・学習投資と、実際の実践レベルのギャップ。知識習得や関心は深いが、実装は「ドライフード＋トッピング」という入門的なレベルに留まり、手作り食への移行障壁が解消されていない。', tier: 'T2', persons: ['P-010','P-003','P-011'] },
  'INS-PAT-010': { text: 'トッピング・手作り食の実践が、栄養補完への不安ではなく「喜ぶ顔が見たい」「同じものを食べたい」という感情的動機から持続されるという感情報酬駆動型の継続構造。', tier: 'T2', persons: ['P-009','P-012','P-011'] },
  'INS-PAT-011': { text: '日常的な観察・ケアを実施していると認識しているが、ペットの性格特性（おとなしい・痛みを隠す）により異常が顕在化しにくいため、観察者の自信と実際の発見能力の間にギャップが生じる。', tier: 'T3', persons: ['P-002','P-006'] },
  'INS-PAT-012': { text: '獣医への不信・不満を持ちながら、代替として求める情報源の質が「第三者性・科学的根拠・透明性」という客観性基準で定義される構造。単に「獣医以外」ではなく、判断の根拠となる情報の質を求めている。', tier: 'T2', persons: ['P-001','P-004','P-014','P-011'] },
  'INS-PAT-013': { text: '従来の獣医診察では得られなかった情報・視点を、動画解析・デジタルツールという新しい手段が提供できるという体験により、専門家への不信がデジタルサービスへの強い期待へと転換するという代替信頼の形成。', tier: 'T3', persons: ['P-002','P-014'] },
  'INS-PAT-014': { text: '消化器症状の発生後、原因が特定できないまま対処を開始・継続するという「原因不明の対処継続」構造。症状は改善されないか曖昧な状態が続き、何が効いているのか・何が悪化要因なのかが判断できない状態が長期化する。', tier: 'T2', persons: ['P-004','P-013','P-012'] },
  'INS-PAT-015': { text: '消化器ケアの対処が「悪化していないから続ける」という消去法的根拠で継続される構造。積極的な効果確認なしに継続し、やめることも変えることもできないジレンマ状態。', tier: 'T3', persons: ['P-004','P-013'] },
  'INS-PAT-016': { text: 'ケア・対処行動を実施しながら、その効果が確認できないため「やっている感の空回り」が継続するという効果不可視の構造。効果測定手段の欠如が、行動の継続・変更・中断の判断基準を喪失させている。', tier: 'T2', persons: ['P-002','P-004','P-014'] },
  'INS-PAT-017': { text: '専門家による「今やっていることは正しい」という確認・承認が、効果不確実性を解消する主要な手段として求められるという構造。客観的エビデンスよりも、信頼できる専門家の承認が行動継続の心理的根拠として機能している。', tier: 'T2', persons: ['P-004','P-002','P-014'] },
  'INS-PAT-018': { text: '定期検診・予防的健康管理の習慣が、過去のペット喪失経験や重篤疾患発症という危機経験によってトリガーされるという「事後予防への転換」パターン。危機以前には予防的管理がなく、喪失・疾患発症後に初めて予防行動が体系化される。', tier: 'T2', persons: ['P-009','P-006','P-005'] },
  'INS-PAT-019': { text: '日常的な排便・食欲・体重などの指標を健康判断の主要センサーとして活用し、それを獣医師との相談に持ち込む、あるいは異常のシグナルとして扱うという「日常観察の指標化・構造化」パターン。', tier: 'T2', persons: ['P-013','P-006','P-003','P-005'] },
  'INS-PAT-020': { text: '健康状態の「正常」判定困難が、絶対値基準ではなく個体の時系列変化を追跡することで対処しようとする構造。「この子に合った正常値」への探求が共通している。', tier: 'T3', persons: ['P-001','P-002'] },
  'INS-PAT-021': { text: '健康管理行動の継続困難が、知識・動機の欠如ではなく、日常生活への組み込みやすさ・リマインダー・チェックリストなど「実行支援の仕組み」の欠如から生じるという構造。やりたい・やるべきだと分かっているが続かないという行動実行ギャップ。', tier: 'T2', persons: ['P-001','P-004','P-013'] },
  'INS-PAT-022': { text: '推奨された健康管理行動を実行しながらも、外部の「仕組み・ツール・記録システム」がなければ継続できないという外的足場依存の構造。自律的な継続ではなく、外部補助によって初めて行動が維持される。', tier: 'T2', persons: ['P-004','P-013','P-001'] },
  'INS-PAT-023': { text: '加齢とともに複数の慢性疾患・リスクが同時進行し、疾患別の専用フード・管理方法の切り替えが必要になるという「多疾患同時管理の負荷増大」パターン。各疾患への対処が個別に行われ、統合的な管理が困難になっている。', tier: 'T2', persons: ['P-006','P-010','P-009'] },
  'INS-PAT-024': { text: '複数頭・複数疾患の管理において、理想の個別化対応と実際の運用の間でトレードオフが発生し、一部の個体への対応に偏りが生じるという「個別化の限界」パターン。', tier: 'T3', persons: ['P-009','P-006'] },
  'INS-PAT-026': { text: '健康管理行動を記録・可視化する強い動機があるにもかかわらず、既存ツールでは不十分（使いにくい・個体別分析ができない）という利用ギャップ。記録行動を実践しているがそのデータが意思決定に直結していない。', tier: 'T2', persons: ['P-002','P-013','P-001'] },
  'INS-MOT-003': { text: '毎日エクササイズを推奨されたがたまにしか実施できない。「やるべきと分かっている」という知識と「日常に組み込めない」という実行コストの乖離。「思い出した時」という実行パターンは、リマインダーが外から来ないと行動できないという依存構造を示す。', tier: 'T2', persons: ['P-004'] },
  'INS-MOT-004': { text: '納豆・豆乳ヨーグルト・ビフィズス菌を「効果があるのか疑問」と思いながら継続している動機は「やめることへの恐れ」。消去法的な不安駆動行動。', tier: 'T2', persons: ['P-004'] },
  'INS-MOT-005': { text: '関節ケアサプリを「症状がないため」与えていない動機の本質は「見えないリスクへの投資は正当化しにくい」というバイアス。月4万円の健康投資を行っており金銭的余裕が理由ではない。', tier: 'T2', persons: ['P-014'] },
  'INS-MOT-006': { text: 'フローリング対策・環境改造行動の動機は「後悔したくない」という損失回避。関節疾患は一度発症したら取り返しがつかないという不可逆性の認識が、コストをかけた予防行動を正当化している。', tier: 'T2', persons: ['P-002','P-005'] },
  'INS-MOT-007': { text: '「関節ケアとがん予防」を健康管理の最重視項目に位置づける動機は、先代犬のがん経験から来た「予防できたはずの後悔」の再現防止。次の犬では同じ喪失を繰り返さないという強い意思。', tier: 'T2', persons: ['P-014'] },
  'INS-MOT-008': { text: '体重管理を「最重視」し間食を厳格に制限する動機は、過去に体重増加→血尿・皮膚荒れという疾患直結の失敗体験が刷り込んだ「体重変化＝健康状態のシグナル」という強力な学習。', tier: 'T2', persons: ['P-001'] },
  'INS-MOT-009': { text: '食欲の有無を「異常のサイン」として毎月体重測定するモニタリング行動の動機は、「犬は痛みを言葉で伝えられない」という構造的制約への代償行動。言葉に代わる客観的指標として体重・食欲変化を使うことで「気づかなかった」という後悔を防ごうとしている。', tier: 'T2', persons: ['P-006'] },
  'INS-MOT-010': { text: '「手作り食だけでは栄養不足」という課題を持ちながら行動し続ける動機は、市販フードへの不完全な信頼と手作り食への不完全な自信の間で「最善を尽くしたい」という責任感。', tier: 'T2', persons: ['P-003','P-005'] },

// ========== UI ==========

let currentFilter = 'all';
let selectedId = null;

function qClass(q) {
  if (q === '右上') return 'q-tr';
  if (q === '左上') return 'q-tl';
  return 'q-bl';
}

function scoreClass(v) {
  if (v === '高') return 'high';
  if (v === '中') return 'mid';
  return '';
}

function renderGrid() {
  const grid = document.getElementById('clusterGrid');
  grid.innerHTML = CLUSTERS.map(c => {
    const show = currentFilter === 'all' || c.q === currentFilter;
    const sel = c.id === selectedId;
    return `
      <div class="cl-card ${sel ? 'selected' : ''} ${!show ? 'dim' : ''}"
           onclick="selectCluster('${c.id}')">
        <div class="cl-card-head">
          <span class="cl-id">${c.id}</span>
          <span class="cl-stars">${'★'.repeat(c.stars)}${'☆'.repeat(3-c.stars)}</span>
          <span class="q-badge ${qClass(c.q)}">${c.q}</span>
        </div>
        <div class="cl-name">${c.label}</div>
        <div class="cl-stat">${c.n}名 / 出現率 ${c.freq}%</div>
        <div class="cl-bar-track"><div class="cl-bar-fill" style="width:${c.freq}%"></div></div>
        <div class="cl-icl-tags">${c.icl.map(i => `<span class="icl-tag">${i}</span>`).join('')}</div>
      </div>`;
  }).join('');
}

function selectCluster(id) {
  selectedId = id;
  renderGrid();
  renderDetail(id);
}

function renderDetail(id) {
  const c = CLUSTERS.find(x => x.id === id);
  const hmws = HMW_DATA.filter(h => h.cluster === id);
  const pane = document.getElementById('rightPane');

  const iclHtml = c.icl.map(iid => {
    const icl = ICL[iid];
    if (!icl) return '';
    const cardIds = ICL_CARDS[iid] || [];
    const cardsHtml = cardIds.map(cid => {
      const card = INSIGHT_CARDS[cid];
      if (!card) return '';
      const isMissing = card.text.includes('存在しないID') || card.text.includes('未収録');
      if (isMissing) return '';
      const sourceIds = CARD_SOURCES[cid] || [];
      const utterHtml = sourceIds.map(sid => {
        const q = UTTERANCE_QUOTES[sid];
        return q ? `<div class="utter-quote"><span class="utter-id">${sid}</span><span class="utter-text">${q}</span></div>` : '';
      }).filter(Boolean).join('');
      return `<div class="evidence-card">
        <div class="ev-head">
          <span class="ev-id">${cid}</span>
          <span class="ev-tier ${card.tier === 'T2' ? 't2' : 't3'}">${card.tier}</span>
          <span class="ev-persons">${card.persons.join(' · ')}</span>
        </div>
        <div class="ev-text">${card.text}</div>
        ${utterHtml ? `<div class="utter-list">${utterHtml}</div>` : ''}
      </div>`;
    }).filter(Boolean).join('');
    const visibleCount = cardIds.filter(cid => {
      const card = INSIGHT_CARDS[cid];
      return card && !card.text.includes('存在しないID') && !card.text.includes('未収録');
    }).length;
    return `
      <div class="insight-card">
        <div class="icl-header">
          <span class="icl-id-badge">${iid}</span>
          <span class="icl-thickness">根拠：${icl.thickness} | ${icl.n}名 / T2×${icl.t2}枚</span>
        </div>
        <div class="icl-label">${icl.label}</div>
        <div class="icl-desc">${icl.desc}</div>
        ${cardsHtml ? `<button class="cards-toggle" onclick="toggleCards(this)">▶ 根拠カード ${visibleCount}件を見る</button>
        <div class="cards-inner" style="display:none">${cardsHtml}</div>` : ''}
      </div>`;
  }).join('');

  const quotesHtml = c.quotes.map(q => {
    const pidMatch = q.attr.match(/P-(\d+)/);
    const pid = pidMatch ? 'P-' + pidMatch[1].padStart(3,'0') : null;
    const attrHtml = pid
      ? `<a href="participants.html?p=${pid}">${q.attr}</a>`
      : q.attr;
    return `<div class="quote-item">
      <div class="quote-text">「${q.text}」</div>
      <div class="quote-attr">${attrHtml}</div>
    </div>`;
  }).join('');

  const bps = BP_DATA.filter(b => b.cluster === id);
  const bpHtml = bps.length ? bps.map(b => `
    <div class="bp-item">
      <div class="bp-head">
        <span class="bp-id">${b.id}</span>
        <span class="bp-name">${b.name}</span>
        <span class="bp-n">${b.n}名</span>
      </div>
      <div class="bp-jtbd">「${b.jtbd}」</div>
    </div>`).join('') : '';

  const themeInsight = THEME_INSIGHT[id];

  const hmwHtml = hmws.length ? hmws.map(h => `
    <div class="hmw-item">
      <div class="hmw-item-head">
        <span class="hmw-num">${h.id}</span>
        <span class="tier-badge ${h.tier === 'T2' ? 't2' : 't3'}">${h.tier}</span>
        <span class="hmw-n">${h.n}名</span>
      </div>
      <div class="hmw-text">${h.text}</div>
    </div>`).join('') : '<div style="font-size:12px;color:#aaa;">このクラスタ単独のHMWはありません</div>';

  pane.innerHTML = `
    <div class="detail-header">
      <div class="detail-id-row">
        <span class="detail-id">${c.id}</span>
        <span class="detail-stars">${'★'.repeat(c.stars)}${'☆'.repeat(3-c.stars)}</span>
        <span class="q-badge ${qClass(c.q)}">${c.q}</span>
      </div>
      <div class="detail-name">${c.label}</div>
      <div class="detail-stat">${c.n}名 / 出現率 ${c.freq}%</div>
      <div class="score-row">
        <span class="score-chip ${scoreClass(c.scores.freq)}">出現頻度：${c.scores.freq}</span>
        <span class="score-chip ${scoreClass(c.scores.depth)}">課題の深さ：${c.scores.depth}</span>
        <span class="score-chip ${scoreClass(c.scores.unmet)}">未充足度：${c.scores.unmet}</span>
      </div>
    </div>

    ${themeInsight ? `<div style="background:#FDECEA;border-left:3px solid #C8102E;padding:8px 12px;border-radius:0 6px 6px 0;font-size:12px;color:#7B241C;margin-bottom:16px;line-height:1.6;">${themeInsight}</div>` : ''}

    <div class="section-block">
      <div class="section-title">代表発話</div>
      ${quotesHtml}
    </div>

    <div class="section-block">
      <div class="section-title">インサイト</div>
      ${iclHtml}
    </div>

    ${bpHtml ? `<div class="section-block">
      <div class="section-title">行動パターン / JTBD</div>
      ${bpHtml}
    </div>` : ''}

    <div class="section-block">
      <div class="section-title">HMW候補</div>
      ${hmwHtml}
    </div>
  `;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-bar .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function toggleCards(btn) {
  const inner = btn.nextElementSibling;
  const open = inner.style.display !== 'none';
  inner.style.display = open ? 'none' : 'flex';
  btn.textContent = open
    ? btn.textContent.replace('▼', '▶')
    : btn.textContent.replace('▶', '▼');
}

renderGrid();
</script>
