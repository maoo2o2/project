<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペットヒアリング分析 v3</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Helvetica Neue", sans-serif; background: #fff; color: #333; font-size: 14px; line-height: 1.5; }

/* ヘッダー */
.header { padding: 20px 24px 0; border-bottom: 1px solid #e8e8e8; }
.header-top { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
.header h1 { font-size: 18px; font-weight: 700; color: #1a1a1a; }
.header-meta { font-size: 12px; color: #999; }
.back-link { font-size: 12px; color: #888; text-decoration: none; margin-bottom: 8px; display: inline-block; }
.back-link:hover { color: #C8102E; }
.header-nav { display: flex; gap: 0; border-top: 1px solid #e8e8e8; margin-top: 12px; }
.nav-tab { padding: 8px 18px; font-size: 13px; color: #888; text-decoration: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.12s; }
.nav-tab:hover { color: #1a1a1a; }
.nav-tab.active { color: #C8102E; border-bottom-color: #C8102E; font-weight: 600; }

/* KPIバー */
.kpi-bar { display: flex; gap: 24px; padding: 12px 24px; background: #f9f9f7; border-bottom: 1px solid #e8e8e8; }
.kpi-item { display: flex; align-items: baseline; gap: 5px; }
.kpi-num { font-size: 22px; font-weight: 700; color: #1a1a1a; }
.kpi-label { font-size: 11px; color: #999; }

/* フィルタバー */
.filter-bar { display: flex; gap: 8px; padding: 12px 24px; border-bottom: 1px solid #e8e8e8; align-items: center; }
.filter-label { font-size: 11px; color: #aaa; margin-right: 4px; }
.chip { padding: 4px 12px; border-radius: 16px; border: 1.5px solid #ddd; background: #fff; cursor: pointer; font-size: 12px; color: #555; transition: all 0.12s; }
.chip:hover { border-color: #C8102E; color: #C8102E; }
.chip.active { border-color: #C8102E; color: #C8102E; font-weight: 700; background: #fff8f8; }

/* メインレイアウト */
.main { display: grid; grid-template-columns: 1fr 400px; height: calc(100vh - 140px); }

/* 左ペイン */
.left-pane { overflow-y: auto; padding: 16px 20px; border-right: 1px solid #e8e8e8; }
.cluster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

/* クラスタカード */
.cl-card {
  border: 1px solid #e0e0e0; border-radius: 10px; padding: 13px 14px;
  cursor: pointer; transition: border-color 0.12s, box-shadow 0.12s;
  background: #fff;
}
.cl-card:hover { border-color: #C8102E; box-shadow: 0 2px 8px rgba(200,16,46,0.1); }
.cl-card.selected { border-color: #C8102E; border-width: 2px; box-shadow: 0 2px 12px rgba(200,16,46,0.15); }
.cl-card.dim { opacity: 0.4; }

.cl-card-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.cl-id { font-size: 11px; color: #aaa; font-weight: 600; }
.cl-stars { color: #C8A84B; font-size: 12px; letter-spacing: -1px; }
.q-badge { padding: 1px 6px; border-radius: 6px; font-size: 10px; font-weight: 600; }
.q-tr { background: #FDECEA; color: #922B21; }
.q-tl { background: #EBF5FB; color: #1A5276; }
.q-bl { background: #f0f0f0; color: #888; }

.cl-name { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 5px; }
.cl-stat { font-size: 11px; color: #888; margin-bottom: 6px; }
.cl-bar-track { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 8px; }
.cl-bar-fill { height: 4px; border-radius: 2px; background: #C8102E; }
.cl-icl-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.icl-tag { font-size: 10px; padding: 1px 6px; border-radius: 6px; background: #EAF3FB; color: #185FA5; font-weight: 600; }
.needs-more-badge { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 8px; background: #FEF9E7; color: #7D6608; border: 1px solid #F9E79F; }

/* 右パネル */
.right-pane {
  overflow-y: auto; padding: 20px;
  background: #fafaf9;
}
.empty-state { height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: #ccc; }
.empty-icon { font-size: 32px; }
.empty-text { font-size: 13px; }

/* 詳細パネル内 */
.detail-header { margin-bottom: 16px; }
.detail-id-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.detail-id { font-size: 12px; color: #aaa; font-weight: 600; }
.detail-stars { color: #C8A84B; font-size: 14px; }
.detail-name { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
.detail-stat { font-size: 12px; color: #777; }

.section-block { margin-bottom: 20px; }
.section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: #aaa; margin-bottom: 8px;
  padding-bottom: 4px; border-bottom: 1px solid #eee;
}

/* インサイト */
.insight-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.icl-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.icl-id-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 6px; background: #185FA5; color: #fff; }
.icl-thickness { font-size: 10px; color: #888; }
.icl-label { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
.icl-desc { font-size: 12px; color: #555; line-height: 1.6; }

/* 代表発話 */
.quote-item { margin-bottom: 8px; padding: 10px 12px; background: #fff; border-left: 3px solid #C8102E; border-radius: 0 6px 6px 0; border: 1px solid #eee; border-left: 3px solid #C8102E; }
.quote-text { font-size: 12px; color: #333; line-height: 1.6; font-style: italic; }
.quote-attr { font-size: 10px; color: #aaa; margin-top: 4px; }
.quote-attr a { color: #aaa; text-decoration: none; }
.quote-attr a:hover { color: #C8102E; text-decoration: underline; }

/* 根拠カード */
.cards-toggle { width: 100%; text-align: left; background: #f5f5f3; border: none; border-radius: 4px; padding: 5px 10px; font-size: 11px; color: #777; cursor: pointer; margin-top: 8px; }
.cards-toggle:hover { background: #eee; }
.cards-inner { display: none; margin-top: 6px; display: flex; flex-direction: column; gap: 5px; }
.evidence-card { padding: 7px 10px; background: #f9f9f7; border-radius: 5px; border: 1px solid #eee; }
.ev-head { display: flex; gap: 6px; align-items: center; margin-bottom: 3px; }
.ev-id { font-size: 10px; color: #aaa; font-weight: 600; }
.ev-tier { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; color: #fff; }
.ev-persons { font-size: 10px; color: #999; }
.ev-text { font-size: 11px; color: #444; line-height: 1.6; }
.utter-list { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; border-top: 1px solid #eee; padding-top: 6px; }
.utter-quote { display: flex; gap: 6px; align-items: baseline; }
.utter-id { font-size: 9px; color: #bbb; font-weight: 600; flex-shrink: 0; }
.utter-text { font-size: 11px; color: #666; line-height: 1.5; font-style: italic; }
.ev-missing { font-size: 11px; color: #ccc; font-style: italic; }

/* 行動パターン */
.bp-item { margin-bottom: 8px; padding: 10px 12px; background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; }
.bp-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.bp-id { font-size: 10px; color: #aaa; }
.bp-name { font-size: 12px; font-weight: 700; color: #1a1a1a; }
.bp-n { font-size: 10px; color: #C8102E; font-weight: 600; }
.bp-jtbd { font-size: 12px; color: #185FA5; font-style: italic; line-height: 1.6; margin-top: 5px; background: #EAF3FB; border-radius: 4px; padding: 5px 8px; }

/* HMW */
.hmw-item { margin-bottom: 8px; padding: 10px 12px; background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; }
.hmw-item-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.hmw-num { font-size: 10px; color: #aaa; }
.tier-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 6px; color: #fff; }
.t2 { background: #185FA5; }
.t3 { background: #C8A84B; }
.hmw-n { font-size: 10px; color: #C8102E; font-weight: 600; }
.hmw-text { font-size: 12px; color: #1a1a1a; line-height: 1.6; }

.score-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.score-chip { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #f5f5f3; color: #555; }
.score-chip.high { background: #E8F7EF; color: #1E8449; }
.score-chip.mid { background: #FEF9E7; color: #7D6608; }
</style>
</head>

<div class="main">

  <div class="right-pane" id="rightPane">

<script>
// ========== データ ==========

const ICL = {
  'ICL-1': {
    label: 'やっている感の空回り構造',
    thickness: '厚い',
    n: 6, t2: 7,
    desc: '飼い主たちは複数の対処行動を実施しているにもかかわらず、「これが効いているのか」を 判定する手段を持たない。効果が見えないため継続・中断の合理的判断ができず、 「やめて悪化したら怖い」という恐怖が不確実な対処行動を惰性的に継続させる。 さらに、専門家から「やっていることは合っている」と確認されることが 効果エビデンスの代替として機能しており、客観的指標ではなく他者承認が行動の根拠になっている。'
  },
  'ICL-2': {
    label: '症状駆動型反応モード',
    thickness: '厚い',
    n: 6, t2: 7,
    desc: '飼い主の多くが「症状が出たら対処する」という反応的な判断モードを基本の行動様式としており、 症状がない段階での予防的投資を「必要性が分からない・無駄かもしれない」と感じて踏み出せない。 関節ケアを「最重視」と言いながらサプリを与えないという矛盾は、 この反応的モードが価値観よりも優先されていることを示す。 ただし、提示方法（フードへの組み込み・個別化アドバイス）が変わると行動が変容することも示されており、 フレーミング次第で予防行動への移行が可能なポイントが存在する。'
  },
  'ICL-3': {
    label: '肉眼・主観の限界と個体別基準不在による二重の判断不能',
    thickness: '厚い',
    n: 5, t2: 8,
    desc: '飼い主は「毎日観察している」という自信を持っているが、実際には散歩動画で初めて足の異常に 気づくなど、肉眼・主観による日常観察には構造的な限界がある。 さらに、「この子の正常がどこなのか」という個体別基準の不在が重なり、 「異常のサインなのか個性なのか」の判断ができない二重の困難を生んでいる。 この二つの問題が重なった結果、飼い主は「見ているが気づけない」という 心理的に消耗する状況に置かれ、動画診断・定期検診・記録ツールという 外部の客観的手段への強い需要が生まれている。'
  },
  'ICL-4': {
    label: '獣医不信が透明性・根拠・個別化需要として再定義される',
    thickness: '厚い',
    n: 7, t2: 8,
    desc: '獣医への不信の本質は「医師個人への嫌悪」ではなく、「透明性とエビデンスの欠如」にある。 先代犬のがん告知遅延（P-014）のような強烈な体験を持つ場合も、 「第三者機関の客観的資料があれば判断できる」という姿勢を示しており、 情報の質と透明性が担保されれば行動できる構造になっている。 この不信は代替として「ブリーダーの予防・犬種特化知識」「製造工程が見える製品」 「動画診断・AIというデジタル手段」への信頼形成へと転換されており、 透明性と個別化がそろえば、従来の獣医師役割を代替・補完する製品・サービスへの 強い受容が生まれる可能性を示す。'
  },
  'ICL-5': {
    label: '知っている・やりたい・しかし続かない行動ギャップ',
    thickness: '厚い',
    n: 6, t2: 8,
    desc: '飼い主たちは健康管理の重要性を理解し、やろうとする意思を持っているが、 日常のルーティンに組み込む「仕組み」がなければ継続できない。 エクササイズは「思い出した時だけ」になり、記録ツールはUIが悪くても使い続けるという 強い継続意欲を示しながら、その仕組みが最適化されていない現状がある。 重要なのは「知識・動機の不足」ではなく「実行の仕組み化」であり、 チェックリスト・リマインダー・直感的な記録ツールという外的足場が 行動継続の決定的な要件となっている。'
  },
  'ICL-6': {
    label: '食事はケアを超えたペットとの関係性の表現',
    thickness: '厚い',
    n: 7, t2: 11,
    desc: '食事管理への高い関心は、栄養バランスへの不安だけでなく、 「ペットと同じものを食べたい」「喜ぶ顔が見たい」という情緒的動機によって強く支えられている。 料理教室への参加・資格取得という学習投資も、知識習得の枠を超えた 「家族の一員として一緒に食事するという関係性の実践」として機能している。 一方で、この情緒的動機は「罪悪感（同じものばかり）」とも表裏一体であり、 実際には多くの対処を実施しているにもかかわらず、「十分にできていない」という 自己評価が残存するという特有の難しさを持つ。'
  },
  'ICL-7': {
    label: '理想の食事製品が市場に存在しない',
    thickness: '厚い',
    n: 5, t2: 11,
    desc: '飼い主たちは「添加物が少なく」「栄養バランスが良く」「食いつきが良く」「継続可能な価格」 という複数条件を同時に満たす製品を求めているが、現在の市場にそれが存在しない。 この未解決状態が、市販ドライフードをベースに手作り食・トッピングで補完する 「ハイブリッド対処」への収束を促している。 重要なのは、この対処が「満足した解」ではなく「次善策」であり、 探索行動が継続するという点である。 機能性（関節ケア等）が明確なら価格は許容し、利便性（開封即使用等）が 改善されれば栄養補完への投資も増える可能性が示されており、 製品設計の条件が具体的に見えてきている。'
  },
  'ICL-8': {
    label: '喪失・後悔体験が後悔の先払い構造を形成する',
    thickness: '中',
    n: 5, t2: 8,
    desc: '先代犬のがん死・若い犬の喪失・散歩動画での初めての気づきという「間に合わなかった」体験が、 現在の愛犬に対する予防的な健康管理行動の最も強力な動機として機能している。 定期検診・体重管理・記録ツール導入などの行動が「今度は絶対に同じ後悔をしない」という 後悔の先払いとして実行されている。 この動機は「価値観として重要だから行動する」（ICL-2の反応的モードの対極）という 強固な行動エンジンであり、喪失経験者には予防的サービスへの受容性が高い。 ただし、喪失体験の感情的プロセスは語られにくく、次のヒアリングでの深掘りが必要。'
  },
};

const ICL_CARDS = {
  'ICL-1': ['INS-P002-005', 'INS-P004-003', 'INS-P005-002', 'INS-P009-004', 'INS-PAT-015', 'INS-PAT-016', 'INS-PAT-017', 'INS-MOT-004', 'INS-MOT-019', 'INS-ABS-P004-002'],
  'ICL-2': ['INS-P004-002', 'INS-P014-001', 'INS-P014-005', 'INS-PAT-002', 'INS-PAT-014', 'INS-MOT-005', 'INS-MOT-006', 'INS-MOT-018', 'INS-ABS-P012-002'],
  'ICL-3': ['INS-P002-003', 'INS-P002-004', 'INS-P005-005', 'INS-P006-002', 'INS-PAT-003', 'INS-PAT-011', 'INS-PAT-020', 'INS-MOT-001', 'INS-MOT-002', 'INS-MOT-014', 'INS-MOT-022', 'INS-ABS-P002-001'],
  'ICL-4': ['INS-P002-002', 'INS-P004-004', 'INS-P006-003', 'INS-P014-003', 'INS-P014-006', 'INS-P014-007', 'INS-PAT-012', 'INS-PAT-013', 'INS-PAT-025', 'INS-MOT-015', 'INS-MOT-016', 'INS-MOT-028', 'INS-ABS-P014-001'],
  'ICL-5': ['INS-P004-001', 'INS-P004-005', 'INS-P010-004', 'INS-P013-004', 'INS-PAT-021', 'INS-PAT-022', 'INS-PAT-026', 'INS-MOT-003', 'INS-MOT-023', 'INS-MOT-024', 'INS-ABS-P004-004'],
  'ICL-6': ['INS-P003-001', 'INS-P009-001', 'INS-P009-002', 'INS-P010-001', 'INS-P010-002', 'INS-P010-004', 'INS-P011-003', 'INS-P012-001', 'INS-PAT-008', 'INS-PAT-009', 'INS-PAT-010', 'INS-MOT-012', 'INS-MOT-029'],
  'ICL-7': ['INS-P005-001', 'INS-P005-003', 'INS-P005-004', 'INS-P011-001', 'INS-P011-002', 'INS-P012-002', 'INS-P012-006', 'INS-PAT-006', 'INS-PAT-007', 'INS-MOT-010', 'INS-MOT-011', 'INS-MOT-013', 'INS-ABS-P012-001'],
  'ICL-8': ['INS-P009-004', 'INS-P014-002', 'INS-P002-001', 'INS-PAT-018', 'INS-PAT-019', 'INS-MOT-007', 'INS-MOT-009', 'INS-MOT-020', 'INS-MOT-027', 'INS-ABS-P009-006', 'INS-ABS-P001-001'],
};

const INSIGHT_CARDS = {
  'INS-ABS-P004-001': { text: '年末の急性症状時（嘔吐・下痢・痙攣）における飼い主の心理的反応が言語化されていない。症状発生時の恐怖感、パニック、対処への判断速度などの心理的プロセスが述べられていない', tier: 'T3', persons: ['P-004'] },
  'INS-ABS-P004-002': { text: '複数のサプリメント・食事補助を効果に疑問を感じながら継続していることへの『心理的負荷感』が述べられていない。判断停止状態で続けることのストレス、疲弊感、罪悪感が言及されていない', tier: 'T3', persons: ['P-004'] },
  'INS-ABS-P004-003': { text: '年末の急性症状後、獣医との『定期的なフォローアップ検査』が行われているかどうか言及されていない。症状発生後のリスク管理において、どの程度の医学的モニタリングが実施されているかが不明', tier: 'T3', persons: ['P-004'] },
  'INS-ABS-P004-004': { text: '対処の実施について『日誌をつけているか』『記録を残しているか』という『行動の可視化・トレース』が述べられていない。効果の不確実性を述べながら、データに基づいた判断を行うための『記録習慣』が言及されていない', tier: 'T3', persons: ['P-004'] },
  'INS-ABS-P004-005': { text: '家族内での健康管理の役割分担、他の家族成員の『見立て』『判断』『意見』が言及されていない。飼い主自身の判断のみで対処が行われており、家族間の意思疎通や意見の相違が述べられていない', tier: 'T3', persons: ['P-004'] },
  'INS-ABS-P004-006': { text: '複数の専門家（整体師・獣医師・トレーナー）間での『情報連携』『意見の統合』がどのように行われているかが述べられていない。各専門家の独立した指導を受けているが、それらの統合的な判断を誰が行っているかが不明', tier: 'T3', persons: ['P-004'] },
  'INS-ABS-P004-007': { text: '『思い出した時にたまに実施』というエクササイズの『実際の実施頻度』『具体的なきっかけ』が数値化されていない。推奨された『毎日』と実際の実行度のギャップが定量的に示されていない', tier: 'T3', persons: ['P-004'] },
  'INS-ABS-P004-008': { text: '複数のサプリメント・食事補助について『開始した時期』『現在までの継続期間』『今後どうするつもりか』という時系列的な『意思決定の履歴と未来計画』が述べられていない', tier: 'T3', persons: ['P-004'] },
  'INS-ABS-P004-009': { text: '整体師から指摘された『前のめり姿勢・ガニ股・筋力低下』という複数の課題について『今後どのような改善を目指すのか』『改善の目標・期限』が述べられていない。現在の継続的な改善の見通しが不明', tier: 'T3', persons: ['P-004'] },
  'INS-ABS-P004-010': { text: '複数のサプリメント・食事補助（納豆・豆乳ヨーグルト・ビフィズス菌・関節サプリ）にかかる月額コストが述べられていない。経済的な負担感、費用対効果の検討が言及されていない', tier: 'T3', persons: ['P-004'] },
  'INS-ABS-P005-001': { text: 'ヘルニアリスク（ダックスフンド特有）への『恐怖感』『不安感』『喪失への予期不安』が言語化されていない。予防的対処を多層的に実行していることから推測される心理的負荷が述べられていない', tier: 'T3', persons: ['P-005'] },
  'INS-ABS-P005-002': { text: 'アレルギー対応食のローテーション使用（複数ブランドの頻繁な切り替え）による『心理的負荷感』『選定の疲弊感』が言及されていない。最適なフード探索のプロセスにおける『決定疲弊』が述べられていない', tier: 'T3', persons: ['P-005'] },
  'INS-ABS-P005-003': { text: '『月1回獣医で体重測定』と述べられているが、自宅での『日常的な体重管理』『体重変化の記録』が言及されていない。体重管理の『実施頻度と方法』が不完全に述べられている', tier: 'T3', persons: ['P-005'] },
  'INS-ABS-P005-004': { text: 'アレルギーテスト後の『再テスト』『定期的なアレルギー検査』が実施されているかどうか言及されていない。アレルギーの『確認と定期モニタリング』が述べられていない', tier: 'T3', persons: ['P-005'] },
  'INS-ABS-P005-005': { text: 'ヘルニア対策として『定期的な医学的検査』（脊椎エコー、脊椎MRI、神経学的検査など）が実施されているかどうかが述べられていない。『早期発見』への価値観は述べられているが、具体的な医学的スクリーニング方法が不明', tier: 'T3', persons: ['P-005'] },
  'INS-ABS-P005-006': { text: 'アレルギー対応に関して『ブリーダー・販売元』『他のダックスフンド飼い主』などの『同じ犬種の経験者との情報共有』が言及されていない。アレルギー対応食の選定が飼い主単独の判断で行われており、専門的情報源以外の『ピア情報』が述べられていない', tier: 'T3', persons: ['P-005'] },
  'INS-ABS-P005-007': { text: '複数のフードをローテーション使用する際の『ローテーション周期』が述べられていない。『どの程度の期間でブランドを切り替えるのか』という時間軸が不明', tier: 'T3', persons: ['P-005'] },
  'INS-ABS-P005-008': { text: 'ヘルニア対策サプリメント（グルコサミン+イミダゾールペプチド）について『1年継続』と述べられているが、『その後の継続予定』『効果判定のタイミング』が述べられていない。継続の根拠と判断のタイミングが不明', tier: 'T3', persons: ['P-005'] },
  'INS-ABS-P005-009': { text: '複数ブランドのローテーション食とヘルニア対策サプリメント（グルコサミン+イミダゾールペプチド）にかかる月額コストが述べられていない。二重課題（アレルギー対応+ヘルニア対策）による経済的負担が言及されていない', tier: 'T3', persons: ['P-005'] },
  'INS-ABS-P006-001': { text: 'シニア犬の加齢に伴う『喪失感』『別れへの心理的準備』『死別への不安』が述べられていない。『長生きを支援したい』という価値観の背景にある『失いたくない』という感情が言語化されていない', tier: 'T3', persons: ['P-006'] },
  'INS-ABS-P006-002': { text: '食事管理と体重管理、異常早期発見に向けた『日常的な観察の心理的負荷』が述べられていない。『毎日の観察』『異常判定』という判断を繰り返す中での『判定基準の不確実性によるストレス』が言及されていない', tier: 'T3', persons: ['P-006'] },
  'INS-ABS-P006-003': { text: '『散歩はほとんど外に出ず』と述べられているが、『具体的な散歩頻度』『1回の散歩時間』『外に出ない理由の詳細』が述べられていない。運動管理の『実施内容と判断根拠』が不完全', tier: 'T3', persons: ['P-006'] },
  'INS-ABS-P006-004': { text: '『便の色・硬さをチェックして体調不良の可能性を判断』と述べられているが、その『チェック結果を記録しているか』『どの程度の便の変化を異常と判定するか』の基準が述べられていない。日常的な異常判定が『習慣』に留まり、『記録』に至っていない', tier: 'T3', persons: ['P-006'] },
  'INS-ABS-P006-005': { text: '『トリミング施設での一体型サービス（病院・トリミング・ホテル）』への信頼に基づいた健康管理が述べられているが、『トリミング施設以外の医療機関（他の動物病院）の利用の有無』『セカンドオピニオンの取得』が言及されていない。健康管理が単一の施設に依存しており、複数医療源による検証体制が述べられていない', tier: 'T3', persons: ['P-006'] },
  'INS-ABS-P006-006': { text: '『牛乳を給与して水分補給』と述べられているが、『いつから牛乳給与を開始したか』『どの程度の量を与えているか』『今後も継続するのか』という時系列が述べられていない。給与の判定根拠と継続予定が不明', tier: 'T3', persons: ['P-006'] },
  'INS-ABS-P006-007': { text: '『ドッグドック』（定期検診）の『実施頻度』『検査内容』『検査結果の活用方法』が述べられていない。『長生き支援』『早期発見』への価値観と、実際の医学的検査の内容・頻度とのつながりが不明', tier: 'T3', persons: ['P-006'] },
  'INS-ABS-P006-008': { text: '『現在のシニア犬の年齢』『シニア判定のきっかけ』『飼育期間と共生年数』という『時系列的な背景』が述べられていない。シニア段階の開始がいつであり、今後どの程度の期間の付き合いを想定しているかが不明', tier: 'T3', persons: ['P-006'] },
  'INS-ABS-P006-009': { text: '『トリミング施設での一体型サービス』『ドッグドック（定期検診）』『室内環境改造（マット敷設）』にかかる月額・年間コストが述べられていない。シニア犬の健康管理にかかる経済的負担が言及されていない', tier: 'T3', persons: ['P-006'] },
  'INS-MOT-001': { text: '3歳の愛犬が一日中寝ていても「これでいいのか」と判断できない理由は、愛犬の異常を見逃したくない恐怖（CL-E）と、そもそも「正常」がどこにあるか分からない不確実性（CL-J）が同時に作動しているため。判断できないことを「困っている」と表現しているが、その裏には「何かを見落としているのではないか」という不安が動機として機能している。', tier: 'T2', persons: ['P-002'] },
  'INS-MOT-002': { text: '「他の犬のように散歩・おやつで喜ばないのは個性か、病気のサインか」という問いの動機は、愛犬の状態を『異常』と判定することへの迷い。喜ばない＝性格と受け入れたいが、それが「苦しさを隠している」（CL-E）可能性を排除できないため行動が止まる。飼い主として「分かってあげられていない」という罪悪感が不作為の根底にある。', tier: 'T2', persons: ['P-002'] },
  'INS-MOT-003': { text: '毎日エクササイズを推奨されたがたまにしか実施できない理由は、「やるべきと分かっている」という知識と「日常に組み込めない」という実行コストの乖離にある。関節ケアへの不安（CL-A）は動機として存在するが、その不安が日常的な習慣化を促すほどの強度・即時性を持てていない。「思い出した時」という実行パターンは、リマインダーが外から来ないと行動できないという依存構造を示す。', tier: 'T2', persons: ['P-004'] },
  'INS-MOT-004': { text: '納豆・豆乳ヨーグルト・ビフィズス菌を「効果があるのか疑問」と思いながら継続している動機は、「やめることへの恐れ」。消化器症状（CL-G）が再発するリスクに対し、効果が不明でも「何もしない」よりはマシという消去法的な不安駆動行動。効果の可視化手段がないため、疑問を持ちながらも継続を止める合理的根拠も得られない状態。', tier: 'T2', persons: ['P-004'] },
  'INS-MOT-005': { text: '関節ケアサプリを「症状がないため」与えていない動機の本質は、「見えないリスクへの投資は正当化しにくい」という行動経済学的なバイアス。P-014は月4万円の健康投資を行っており、金銭的余裕が理由ではない。「症状がある＝対処する」という反応的判断モードが染み付いており、無症状時の予防投資を「無駄かもしれない」と感じるフレームが支配している。', tier: 'T2', persons: ['P-014'] },
  'INS-MOT-006': { text: 'フローリング対策・ベッド用階段・低いソファの設置という環境改造行動の動機は、「後悔したくない」という損失回避。関節疾患は一度発症したら取り返しがつかないという不可逆性の認識が、コストをかけた予防行動を正当化している。ダックスフンドやコーギー系という犬種リスクの知識が、この行動を「義務」として内面化させている。', tier: 'T2', persons: ['P-002', 'P-005'] },
  'INS-MOT-007': { text: '「関節ケアとがん予防」を健康管理の最重視項目に位置づける動機は、先代犬のがん経験（CL-F）から来た「予防できたはずの後悔」の再現防止。次の犬では同じ喪失を繰り返さないという強い意思が、優先順位の明確化に表れている。関節とがんは早期発見・予防が可能であるという信念が、この優先順位を支持している。', tier: 'T2', persons: ['P-014'] },
  'INS-MOT-008': { text: '体重管理を「最重視」し間食を厳格に制限する動機は、過去に体重増加→血尿・皮膚荒れという疾患直結の失敗体験が刷り込んだ「体重変化＝健康状態のシグナル」という強力な学習。この因果体験があるため、体重管理は義務ではなく「疾患を防ぐ最も信頼できる手段」として内面化されている。', tier: 'T2', persons: ['P-001'] },
  'INS-MOT-009': { text: '食欲の有無を「異常のサイン」として毎月体重測定するモニタリング行動の動機は、「犬は痛みを言葉で伝えられない」（CL-E）という構造的制約への代償行動。言葉に代わる客観的指標として体重・食欲変化を使うことで、「気づかなかった」という後悔を防ごうとしている。', tier: 'T2', persons: ['P-006'] },
  'INS-MOT-010': { text: '「手作り食だけでは栄養不足」「アレルギーのある犬で食事管理に苦心」という課題を持ちながら行動し続ける動機は、市販フードへの不完全な信頼（添加物不安）と手作り食への不完全な自信（栄養知識の限界）の間で「最善を尽くしたい」という責任感。ペットの健康に直結する食事は「やり切れていない感」が常に残る領域であり、探索行動を止められない。', tier: 'T2', persons: ['P-003', 'P-005'] },
  'INS-MOT-011': { text: '「理想のウェットフード（総合栄養食・食いつき良好・継続可能価格）が見つからない」という課題が解決されない動機の裏には、「食いつかせてあげたい（喜ぶ顔が見たい）」という感情的な報酬と、「栄養的に間違ったことをしたくない」という責任感の二重拘束がある。どちらかを諦めることへの抵抗が探索を長期化させている。', tier: 'T2', persons: ['P-012'] },
  'INS-MOT-012': { text: '手作り食の実践（「魔女飯」「ペット食育士資格取得」「料理教室参加」）と「犬と同じものを食べたい」という願望の動機は、ペットを「家族として同じ食卓を囲む存在」として扱いたいというアイデンティティの表明。栄養管理の手段としての手作り食を超えた、「飼い主としての在り方」の実践という性格を持つ。', tier: 'T3', persons: ['P-003', 'P-010'] },
  'INS-MOT-013': { text: '「人間が食べられる食材でワンちゃん用の食事を作ることに魅力を感じる」という動機の核心は「食材の透明性と安心感」。ペット専用フード成分の不透明性（添加物・原材料の不安）に対し、自分が食べられるものを使うことで「安全かどうか」という確認コストを省略できる。', tier: 'T3', persons: ['P-010'] },
  'INS-MOT-014': { text: '「散歩動画で初めて右後ろ足の異常に気づいた」「犬は痛みや苦しさを言葉で伝えられないため早期発見が重要」という発話の動機は、「ちゃんと見ていた/見ている」という自己認識と「気づけていない/気づけない」という現実の間のギャップへの対処。日常的な観察への自信が崩れた経験（P-002）と、崩れる前から構造的問題を知っている状態（P-006）で、共通して「外部的な確認手段」への需要が生まれている。', tier: 'T2', persons: ['P-002', 'P-006'] },
  'INS-MOT-015': { text: '先代犬の告知遅延という具体的な裏切り体験から獣医不信が形成された動機は「二度と同じ目に遭わせたくない」という保護本能。「第三者機関から客観的資料に基づいた判断」を求める動機は、信頼できる個人（医師）の不在を「システム・透明性・エビデンス」という構造的代替物で補完しようとする理性的な対処戦略。', tier: 'T2', persons: ['P-014'] },
  'INS-MOT-016': { text: '獣医を「対症療法的で明確な回答が得られない」と評価しブリーダーを最も信頼する動機は、「根拠のある予防情報」への渇望。獣医は症状が出てから関わるが、ブリーダーは「その犬種の生涯の健康パターン」を知っている存在として機能する。具体的・予防的・犬種特化した情報を持つ人物への信頼が形成されている。', tier: 'T2', persons: ['P-001'] },
  'INS-MOT-017': { text: '下痢・血便・夜間排便という症状が続きながら減薬を試みる動機は「ステロイド依存から脱却したい」という長期的な健康観。薬を使い続けることへの抵抗感と「食事で治せるかもしれない」という希望が、困難な食事管理を継続させている。症状のコントロール不能という現実の中で「自分ができることをやっている」という能動的対処感を維持するための行動でもある。', tier: 'T2', persons: ['P-013'] },
  'INS-MOT-018': { text: '年末の嘔吐・下痢・後ろ足の震えという急性症状発生後も「原因が分からない」まま生活を続ける動機の裏には「また起きるかもしれない」という慢性的な背景不安が存在する。原因が特定できないことで、再発防止策が立てられず、対処行動が「消去法的継続」に留まる。', tier: 'T3', persons: ['P-004'] },
  'INS-MOT-019': { text: '「涙やけ対策として食べ物を与えているが効果が分からない」「関節サプリが必要か、効いているのかも不明」という状態で継続する動機は、「効果がないと証明されていない」という消極的な正当化。効果の可視化手段がない状況では「やめる根拠」も得られず、惰性的な継続が発生する。この不確実性そのものが飼い主の心理的負荷になっている。', tier: 'T2', persons: ['P-002', 'P-004'] },
  'INS-MOT-020': { text: '定期検診・ドッグドック・健康チェック習慣化の動機は「喪失体験からの学習」と「長く一緒にいたい」という二層構造。P-009にとって定期検診は「若い犬をがんで亡くした後悔」の直接的な防止策。P-006にとっては「家族のつながりを重視する」価値観から来る積極的な長生き支援。どちらも「予防によって結末を変えられる」という能動的な信念が行動を支えている。', tier: 'T2', persons: ['P-009', 'P-006'] },
  'INS-MOT-021': { text: 'Microsoft Formsを使って排便状態を記録し獣医師との相談に活用する動機は「専門家との対話の質を自分でコントロールしたい」という能動性。慢性疾患を抱える飼い主として、「記録がなければ伝えられない」という実感から記録ツール導入に至った。記録は単なる習慣ではなく「減薬タイミングの判断材料」という具体的な機能を持つ。', tier: 'T2', persons: ['P-013'] },
  'INS-MOT-022': { text: '「散歩への前向き度と天気・体調の相関関係を知りたい」「絶対値より変化を重視する」という動機は、「正常がわからない状況での判断困難」への適応戦略。絶対的な基準値がなくても「変化のパターン」を把握することで、「今日はいつもと違う」という異常検知を可能にしようとしている。比較軸を「他の犬との比較」から「その子の過去との比較」に切り替えた、個体差への知的な対応。', tier: 'T2', persons: ['P-002', 'P-001'] },
  'INS-MOT-023': { text: '「日常生活への取り入れやすさ・金銭的合理性・過度な負担がないこと」を行動変容の条件として明示する動機は、健康管理をライフスタイルの延長線上に置きたいという現実的な自己認識。「すべきこと」と「できること」の境界を自分で管理しようとしており、「チェックリスト」という形式への希求は「自分に何が求められているか可視化したい」という認知負荷の軽減ニーズ。', tier: 'T2', persons: ['P-001'] },
  'INS-MOT-024': { text: '使い続けているMicrosoft Formsの記録ツールに「UIの改善やより使いやすいアプリを望む」動機の根底は「継続したいが阻害要因がある」という意思。摩擦の多いツールを使い続けている事実は強い継続意欲を示すが、摩擦自体が長期的な継続リスクになっている。利便性の向上は継続確率を高めるだけでなく、記録品質（頻度・詳細度）にも影響する。', tier: 'T3', persons: ['P-013'] },
  'INS-MOT-025': { text: '蓚酸カルシウム値が高くなった後の専用フード変更・定期血液検査による経過観察という行動の動機は「数値管理が可能な疾患に対する主体的コントロール感の維持」。シニア期の健康問題は「防げないもの」への認識が広がる中で、検査値という客観的指標を持つことで「管理できている」という安心を得ている。', tier: 'T2', persons: ['P-006'] },
  'INS-MOT-026': { text: '心臓病による塩分制限の必要性（P-010）・複数の高齢犬の年齢別管理の必要性（P-009）という「複数の課題の同時管理」の動機は「誰かに管理を委ねたい、でも自分が一番よく分かっている」という葛藤。医療的知識の専門性と、個体のことを一番知っているのは飼い主自身という主体性の両立が求められる中で、疲弊が蓄積しやすい構造にある。', tier: 'T3', persons: ['P-010', 'P-009'] },
  'INS-MOT-027': { text: '「喪失体験・後悔体験」が健康管理行動のもっとも強力な動機として横断的に機能している。先代犬のがん死（P-014）、若い犬のがん死（P-009）、散歩動画で初めて知る足の異常（P-002）は、いずれも「間に合わなかった」「気づかなかった」という後悔を核にして、定期検診・環境改造・可視化ツールへの強い需要を生み出している。このパターンは、現在の愛犬に対する予防行動を「後悔の先払い」として動機づける。', tier: 'T3', persons: ['P-014', 'P-009', 'P-002'] },
  'INS-MOT-028': { text: '獣医への不信（強度は異なる）が共通して「情報の質と透明性」への需要を生み出している横断的動機パターン。P-001はブリーダー信頼、P-004はデータベース根拠のあるAI信頼、P-014は第三者機関・製造工程透明性を求める。いずれも「誰かへの全面的な委託」ではなく「根拠が見える形での自己判断」を実現しようとしている。この動機パターンは「透明性のある情報インフラ」という価値提案の需要を示す。', tier: 'T3', persons: ['P-001', 'P-004', 'P-014'] },
  'INS-MOT-029': { text: '手作り食・ヒューマングレード食・「喜ぶ顔が見たい」という発話群の横断的動機は「ペットとの情緒的なつながりの確認」。食事という行為を「ケア」から「コミュニケーション」として再定義している飼い主層の存在が見える。食べてくれること・喜ぶことが飼い主にとっての「愛されている証拠」として機能しており、食事の満足は飼い主自身の満足でもある。', tier: 'T3', persons: ['P-003', 'P-009', 'P-010', 'P-012'] },
  'INS-P002-001': { text: '関節ケアへの関心度は高く、既に環境改造（絨毯・階段）を実施しているにもかかわらず、 ペット専用フローリング材という重要な製品の存在を後から知り、導入を検討している。 「やっている」という行動と「知識不足による後悔」が共存している矛盾。', tier: 'T2', persons: ['P-002'] },
  'INS-P002-002': { text: 'P-002は「アクションとセットでの情報提供」を求めているのに対し、 獣医師の診察では「歩き方を詳しく見てもらえない」という実際の体験がある。 理想（情報+アクション）と現実（不十分な診断）の乖離。', tier: 'T2', persons: ['P-002'] },
  'INS-P002-003': { text: 'P-002は日常的に「朝の散歩と観察」を通じた健康チェックを実施していると述べているのに対し、 実際には散歩動画で初めて「右後ろ足をかばっている」ことに気づくという経験をしている。 「観察している」という自信と「観察が不十分だった」という現実の矛盾。', tier: 'T2', persons: ['P-002'] },
  'INS-P002-004': { text: 'P-002が抱える判断困難が、個体差＋性格特性という二重構造になっている矛盾。 「正常」が分からず、かつ「異常のサイン」も見えにくい二つの問題が重なっている。', tier: 'T2', persons: ['P-002'] },
  'INS-P002-005': { text: '涙やけに対して「効くと言われる食べ物」を継続的に与えているにもかかわらず、 その効果を全く測定・確認できていない状態が続いている。 「やっている」と「分からない」が並存する不安定な状態。', tier: 'T2', persons: ['P-002'] },
  'INS-P003-001': { text: '『栄養バランスのため赤・白・黄・緑の食材をミックスして手作り食を与えている』（カード002）と『手作り食だけでは栄養、特にタンパク質が不足する懸念があるため市販ドライフードと組み合わせている』（カード003）という二つの発話は、手作り食の栄養充足性に対する確信の不完全さを示唆している。工夫にもかかわらず、懸念が払拭されていない', tier: 'T2', persons: ['P-003'] },
  'INS-P003-002': { text: '『添加物が少ないものを選ぶ基準を持っている』（カード004、信憑性A）と『添加物に対して漠然とした不安を持っている』（カード005、信憑性B）は一見矛盾しているように見えるが、実際には不安が選択行動を動機づけている一貫した因果関係である。漠然とした不安が具体的な購買基準に転換されている', tier: 'T2', persons: ['P-003'] },
  'INS-P003-003': { text: '食事形態がドライフード単食→ウェットフード混合→手作り食へと段階的に進化している。初期段階での『ドライフード単食では食べない』という課題が、徐々に『市販フードと手作り食の併用』『魔女飯の実践』『料理教室参加』へと発展している。これは矛盾ではなく、解決から探索への段階的な行動進化を示す', tier: 'T2', persons: ['P-003'] },
  'INS-P003-004': { text: '『手作り食だけでは栄養不足（特にタンパク質）の懸念』と『脱臼予防のためコラーゲンサプリ使用』は、異なる栄養懸念と対応を示しているが矛盾していない。前者は主食レベルの懸念、後者は機能性栄養投資である。飼い主は複数のレベルでの栄養管理を同時実行している', tier: 'T1', persons: ['P-003'] },
  'INS-P003-005': { text: '『毎日夕方30分〜1時間の散歩実施』と『朝夕2回・各30gの給餌』は、運動量と食事量が定量化されて管理されている状態を示す。チワワの小型犬の健康管理として、これらは整合的である', tier: 'T1', persons: ['P-003'] },
  'INS-P004-001': { text: '言っていることとやっていることの矛盾：関節健康の重要性を理解し、整体師から推奨されたエクササイズの重要性を認識しているにもかかわらず、実際には『思い出した時にたまに実施』という行動に留まっている。その結果、前のめり姿勢・ガニ股などの複数の姿勢問題が未解決のまま残存', tier: 'T2', persons: ['P-004'] },
  'INS-P004-002': { text: '同一テーマ内の態度矛盾：年末の急性症状（嘔吐・下痢）が発生して『何か対処しなければ』という動機づけがあり、納豆・豆乳ヨーグルト・ビフィズス菌などの対処を開始している。一方で『完全に安心できない』『効果に疑問』という心理状態で、頭と行動が一致していない。症状の発生と対処の開始という『反応的対処』であり、原因が特定されていないため『予防的対処』に転換できていない', tier: 'T2', persons: ['P-004'] },
  'INS-P004-003': { text: '言っていることと行動の矛盾：『納豆・豆乳ヨーグルト・ビフィズス菌が本当に効果あるのか疑問』『劇的改善がない』『毎日与えるべきか迷っている』と複数カードで効果疑問を表明している一方で、実施を継続している。『疑問を持ちながら続ける』という判断停止状態であり、継続の根拠が『悪化していないから』という消去法に依存している。これは能動的な健康管理というより受動的な『症状回避』に過ぎない', tier: 'T2', persons: ['P-004'] },
  'INS-P004-004': { text: '専門家信頼の領域化と実際の症状のクロスドメイン化による機能停止：P-004-010・P-004-011で『姿勢・歩き方はトレーナー、健康全般は獣医師』と領域を明確に分けることが理想とされている。しかし整体師から指摘された『前のめり姿勢と筋力弱化』は、消化器問題（腸内ガス溜まり）との関連が疑われる場合、どちらの専門家に相談するか判断がつかず、結果的に対処が進まない可能性がある', tier: 'T3', persons: ['P-004'] },
  'INS-P004-005': { text: '価値観と行動の微細な矛盾：P-004-006で『専門家から「やっていることが合っている」と言われると安心につながり、現状が大丈夫と確認できたと感じる』と述べており、検証・確認を強く求めている。一方P-004-002では『推奨されたエクササイズを思い出した時にたまに実施』と、推奨内容の実行に失敗している。つまり『専門家の指導を受けることへの満足』と『実際の行動実行』が分離している。安心を得ることが目的化し、行動の継続実行は後退している可能性', tier: 'T3', persons: ['P-004'] },
  'INS-P005-001': { text: '食事への関心度と食事管理の実践ギャップ。P-005はフード選定にアレルギー回避・グレインフリー・シングルプロテインという厳格な基準を持ち、複数ブランドをローテーション使用するほど関心が高いのに、健康における食事の重要度は『4割程度』と評価している。ヘルニア対策、散歩、定期健診など他要因を重視しており、食事を相対的に位置づけている。', tier: 'T2', persons: ['P-005'] },
  'INS-P005-002': { text: 'ヘルニア対策への実行度と効果認識のズレ。P-005はグルコサミンとイミダゾールペプチドのサプリメントを1年以上継続使用し、抱き方工夫、環境改造など複数の予防対処を実行しているが、同時に『健康における食事の重要度は4割』と述べており、サプリメント効果への確実性を感じていない可能性。多数の対処を行っているのに対して、根本的な不確実性が残存', tier: 'T2', persons: ['P-005'] },
  'INS-P005-003': { text: 'ウェットフード非使用と栄養補完への関心の矛盾。P-005はウェットフードを『扱いにくさ、価格の高さ』を理由に基本的に使用していないのに、トッピング製品に対しては『栄養素の不足を補える形で提供されるなら魅力的』と評価している。つまり、利便性が改善されれば栄養補完への投資に積極的になる可能性を示唆している。', tier: 'T2', persons: ['P-005'] },
  'INS-P005-004': { text: 'トッピング製品への条件付き受容。P-005はトッピングタイプ製品に『関心を示す』一方で、『単なる味変のためのトッピングでは必要性を感じない』と明確に拒否している。つまり、機能性（特に関節ケア）が前提条件となっており、嗜好性向上のみの製品には価値を認めていない。P-005の購買判断基準は機能性重視である', tier: 'T2', persons: ['P-005'] },
  'INS-P005-005': { text: '健康判断指標の実効性限界。P-005は『食欲、排泄物の状態、行動の変化』を健康判断基準として確立しており、実際にアレルギーの発見をこれらの指標で行っているが、この指標は『目に見える変化』に依存している。ヘルニアのような内部疾患では同じ指標では発見困難の可能性が高く、外部指標への依存が持つ限界が示唆されている', tier: 'T2', persons: ['P-005'] },
  'INS-P009-001': { text: 'ペットを家族として考えてヒューマングレード食を与えたいという価値観に対し、実際の行動は限定的。6匹中1匹には国産牛肉のみという個別対応をしているが、他の5匹は基本的に同じドライフード。トッピングという部分的な対応で、統一的なヒューマングレード食の実装には至っていない。', tier: 'T2', persons: ['P-009'] },
  'INS-P009-002': { text: '高齢犬（10歳超チン）に対して肉の油を落とすため茹でる、野菜を柔らかく煮るという細かい食事配慮をしている一方で、当の高齢犬は『国産牛肉しか食べない』という非常に限定的な食材選好を持っている。飼い主の配慮と実際の食事内容のギャップ。飼い主の工夫が対象犬の嗜好によって制限されている構造的な困難。', tier: 'T2', persons: ['P-009'] },
  'INS-P009-003': { text: '複数の高齢犬（シーズー・チン・イギリス犬は10歳以上、計6匹）を飼育していながら、個別対応が限定的。高齢犬（特にチン）には個別給与という対応をしているが、他の5匹は『基本的に同じドライフード』で統一。複数の高齢犬・多犬種飼育という複雑な状況に対して、対応の個別度に差がある。継続・習慣化の負荷が暗示されている(メモ: 『複雑な健康管理』『対応の手間』)。', tier: 'T2', persons: ['P-009'] },
  'INS-P009-004': { text: '若い犬がガンで亡くなった喪失経験から定期検診を開始したにもかかわらず、別の健康リスク(フローリングによる関節損傷)については『対処法が限定的』(カーペット敷設のみ)で、根本的な解決には至っていない。予防行動への目覚めはあるが、実装される対処の質や包括性にはバラツキがある。予防意識と実装のギャップ。', tier: 'T2', persons: ['P-009'] },
  'INS-P010-001': { text: '塩分制限の必要性と『同じものを食べたい』という願望が相反している', tier: 'T2', persons: ['P-010'] },
  'INS-P010-002': { text: '安全食材への強い関心を表明しながら、実際の食事管理はシンプルなささみトッピングで完結している（選択と実践のギャップ）', tier: 'T2', persons: ['P-010'] },
  'INS-P010-003': { text: '『機能性が必須条件』と明言しながら、実際の購買判断基準は『食いつきの良さ』である', tier: 'T2', persons: ['P-010'] },
  'INS-P010-004': { text: '食事管理への学習投資（資格取得・料理教室）と実際の食事実践の間に実装ギャップがある', tier: 'T2', persons: ['P-010'] },
  'INS-P010-005': { text: '複数の加齢課題（認知症・白内障）への不安を抱えながら、実際のケア対処（P-010-007の歯磨きなど）は課題の進行予防と関連性が低い', tier: 'T2', persons: ['P-010'] },
  'INS-P011-001': { text: 'コスト意識と実際の購買行動が不一致。『安すぎる商品は栄養面で不安』と述べながら、フード選択の優先順位に『コスト』を含めず、高級ブランド（ニュートロ）への変更を検討している。コストは『ある程度考慮』するはずなのに、実際の行動では品質・食いつき・粒サイズの方が優先されている', tier: 'T2', persons: ['P-011'] },
  'INS-P011-002': { text: '食欲の個体特性の理解に矛盾。『食べ物への興味が全般的にあまりない（珍しい）』という自己認識と『チキン系に良く反応』『チュールに非常に反応が良い』という高い食いつき事例が共存。実は『食欲が低い』のではなく『食材・形態による嗜好の差が大きい』可能性が高いが、飼い主はこれを『珍しい個体差』と解釈', tier: 'T2', persons: ['P-011'] },
  'INS-P011-003': { text: '手作りフードの障壁と行動変容のトリガーが不一致。手作りしない理由は『手間・量・栄養バランスの難しさ』という構造的な課題を挙げているのに対し、行動変容のきっかけは『犬が喜んで食べる』という食いつきに限定。栄養バランスの不安は解決されないまま、感情的な報酬（『喜ぶ顔を見たい』）によってのみ動機づけられる可能性', tier: 'T2', persons: ['P-011'] },
  'INS-P011-004': { text: 'デジタル情報収集と購買の一貫性の不明確さ。ChatGPTやSNS・ネットで積極的に情報収集しながらも、『初めて試す商品は実店舗で現物を見て選びたい』という行動。デジタル情報に基づいた選択候補があっても、最終判定には必ず視覚的確認を挟む。情報収集と購買意思決定の関係が明確でない可能性', tier: 'T2', persons: ['P-011'] },
  'INS-P012-001': { text: '【言っていることとやっていることの矛盾】 「同じドライフードばかり与えているという罪悪感」を感じているにもかかわらず、 実際には複数の対処（トッピング・手作り食・手作りおやつ）を積極的に実行している。 罪悪感と行動が合致していない。', tier: 'T2', persons: ['P-012'] },
  'INS-P012-002': { text: '【課題と価値観の矛盾】 「理想のウェットフード（総合栄養食・食いつき良好・継続可能価格）が見つからない」という現在の課題がありながら、 新規提案（機能性ウェットトッピング）に好意的で、高い価格帯でも許容できるという態度を示している。 「見つからない」という課題の実質は「既存市場で理想の製品がない」のであって、 新しい選択肢には積極的に投資する姿勢がある。', tier: 'T2', persons: ['P-012'] },
  'INS-P012-003': { text: '【同一テーマでの対処スケーラビリティの矛盾】 「手作りおやつは2週間に1回程度」という頻度に対して、 「手作り食（ささみ・さつまいも・かぼちゃ）は時々ドライフードに混ぜる」という定性的な実施。 手作りへのモチベーションはあるが、習慣化・継続性の面で両者のレベルが異なっており、 スケーラビリティに制約がある可能性がある。', tier: 'T3', persons: ['P-012'] },
  'INS-P012-004': { text: '【価値観の一貫性確認（矛盾なし）】 「食いつきの良さを最重視。犬が喜ぶ顔を見たい」という感情的価値観と 「安価なフードには見向きもしない。グルメなペットの傾向」という選別的価値観が 完全に一致している。ペットの嗜好を尊重する姿勢と品質選別が統合されている。', tier: 'T3', persons: ['P-012'] },
  'INS-P012-005': { text: '【対処有無の不均衡】 ヘルニア（既往リスク）には積極的に環境整備で対応しているのに対し、 季節変わり目の胃腸不調は「未対処」のまま。 同じ健康リスクであってもリスク顕在化の有無（既往 vs 症状）によって対処の優先度に大きな差がある。', tier: 'T2', persons: ['P-012'] },
  'INS-P012-006': { text: '【購買意思決定プロセスの矛盾】 「新しいフードは試食パックで試してから購入する」という慎重なプロセスを実践しているにもかかわらず、 「理想のウェットフード（総合栄養食・食いつき良好・継続可能価格）が見つからない」という課題がある。 試用プロセスは実装されているが、その後の「継続使用」や「定期購入」への移行が起こっていない。 試用後に購入決定に至らない理由（「継続可能価格」か「食いつき」か「栄養バランス」か）が不明確。', tier: 'T2', persons: ['P-012'] },
  'INS-P013-001': { text: '減薬困難と食欲増加への対応策のジレンマ：ステロイド副作用により食欲が増しており、減薬を試みているが食事との兼ね合いが難しい状況にもかかわらず、おやつを継続的に給与している。この矛盾は、短期的な満足度（おやつ給与）と中期的な健康目標（減薬・食事管理）の優先度が整理されていない可能性を示唆している。', tier: 'T2', persons: ['P-013'] },
  'INS-P013-002': { text: '健康指標としての『便の状態』の位置づけと実際の対処行動がリンクしていない：P-013-006で『便の状態を最大の健康指標』と明確に位置づけており、P-013-004で記録を獣医師相談に活用しているにもかかわらず、P-013-010で『下痢が続くと元気がなくしょぼんとする傾向』を観察した際の対処行動が明記されていない。指標の重視と対処の実装にギャップがある可能性。', tier: 'T2', persons: ['P-013'] },
  'INS-P013-003': { text: 'フード選定への関心度のゆらぎ：P-013-008では『過去2年間で複数のフードを試して合うものを探し続けている』という能動的で継続的な探索態度が表現されているのに対し、P-013-009では『ビューティープロの胃腸ケア用フードを使用』という記録のみで、その選定理由や関心度が記述されていない。同一テーマ（フード選定）における態度の記録レベルにばらつきがある。', tier: 'T2', persons: ['P-013'] },
  'INS-P013-004': { text: '健康管理ツールへの満足度は『妥協』であり、改善希望が明確：P-013-004で『Microsoft Formsを使って記録を獣医師相談に活用』という対処行動を続けているが、満足度は『妥協』となっており、P-013-005で『UIの改善やより使いやすいアプリを望んでいる』という改善ニーズが表現されている。矛盾ではなく、一貫性のある課題を示唆。', tier: 'T2', persons: ['P-013'] },
  'INS-P014-001': { text: '関節ケアを『最重視』と言いながら、症状がないために関節ケアサプリの給与行動に至っていない。価値観と実際の行動優先度にズレがある', tier: 'T2', persons: ['P-014'] },
  'INS-P014-002': { text: '膝蓋骨脱臼リスクについて、ブリーダーからは『大丈夫』と言われている一方で、運動時のジャンプ制限で予防的行動を取っている。情報源間の矛盾への対処が不確実', tier: 'T2', persons: ['P-014'] },
  'INS-P014-003': { text: '獣医療システムに対して『失敗しても医者は損しない実験台扱い』と根本的な不信を抱きながら、同時に『第三者機関から与えられた客観的資料をもとに判断したい』と科学的根拠への依存を示している。不信の対象と解決策の間に矛盾がある', tier: 'T2', persons: ['P-014'] },
  'INS-P014-004': { text: '給餌量の個別最適化を強く求めながら、月4万円の既存投資（複数の食材・サプリ）を継続している。現在の方法への不満と継続行動の矛盾', tier: 'T2', persons: ['P-014'] },
  'INS-P014-005': { text: '関節ケアサプリには行動移行できず優先度が下がっているが、『関節ケア成分入りフード』『個体別アドバイス』という提示方法が変わると『気持ちが大きく傾く』『絶対行動する』と態度が劇的に変わる。同じニーズでも提示方法により行動転換する', tier: 'T2', persons: ['P-014'] },
  'INS-P014-006': { text: '獣医師に対しては根本的な不信を抱きながら、製造工程が見える民間の製品・サービスには『いいな』と思うとすぐ購入する。信頼の形成ロジックの違いが明確に分かれている', tier: 'T2', persons: ['P-014'] },
  'INS-P014-007': { text: '獣医師『どの先生を信じていいんだよ』と判断基準が曖昧で困っているが、『個体に合わせたアドバイスがあれば絶対行動する』『アプリ利用ハードルが全くない』と、提供形式が個別化・デジタル化していれば強い決定力を示す。判断の困難性と実行力のギャップ', tier: 'T2', persons: ['P-014'] },
  'INS-P014-008': { text: '高額な健康投資（月4万円）を継続し、可視化機能には『お金払ってもやりたい』と支払意欲を示し、サブスク形式のフードを『簡単に続けられる』と評価している。P-014は『支払い意欲が高い』『継続志向が強い』『効果の可視化を重視する』という一貫した特性を持っている', tier: 'T1', persons: ['P-014'] },
  'INS-PAT-001': { text: '関節リスクへの対処が『環境改造（物理的バリア設置）』から始まり、情報の欠落や対処の限界に直面するというステップ構造。絨毯・マット・階段・カーペットなどの環境整備を実行した後、『これで本当に十分か』という確信の欠如が残存する', tier: 'T2', persons: ['P-002', 'P-005', 'P-012', 'P-006'] },
  'INS-PAT-002': { text: '関節ケアへの高い関心・動機づけと、実際の行動優先度が症状の有無で決まるという『症状駆動型優先度設定』の構造。症状がない段階では、理解・懸念はあっても具体的な予防行動に踏み出せない', tier: 'T2', persons: ['P-004', 'P-005', 'P-009', 'P-014'] },
  'INS-PAT-003': { text: '関節・骨格問題の発見が『外部ツールや第三者の視点』によって初めて可能になるという発見困難の構造。日常的な観察では気づけず、動画・専門家・施術などの介入があって初めて異常が顕在化する', tier: 'T2', persons: ['P-002', 'P-009', 'P-005'] },
  'INS-PAT-004': { text: '体重管理行動が『過去の失敗・問題発生』をトリガーとして開始・強化され、その後に数値化・定量管理の習慣が確立するという学習誘発型モニタリングの構造。失敗経験が明確な管理基準と行動変容の直接的な動機づけになっている', tier: 'T2', persons: ['P-001', 'P-006', 'P-003', 'P-005'] },
  'INS-PAT-005': { text: '食事量・体重管理を健康全体の中の『最優先・最基本指標』として位置づけ、他の健康管理行動の基盤として機能させる構造。単独の管理行動ではなく、他の健康問題への入口として扱われている', tier: 'T2', persons: ['P-001', 'P-002', 'P-005', 'P-006', 'P-014'] },
  'INS-PAT-006': { text: '食事内容への不安が『漠然とした不安→具体的な選別基準の確立→行動化』というプロセスで機能するが、理想を満たす製品が市場にないため不安が払拭されないまま残存するという未解決サイクル。対処行動を実施しているにもかかわらず、不安の根本解決が困難', tier: 'T2', persons: ['P-003', 'P-005', 'P-011', 'P-012'] },
  'INS-PAT-007': { text: '市販フードの栄養バランスへの懸念を、市販フードを基盤としながらトッピング・手作り食を補完的に加えるという『ハイブリッド対処』で解決しようとする構造。市販フード完全代替でも添加物完全回避でもなく、現実的な折衷策を選択', tier: 'T2', persons: ['P-003', 'P-005', 'P-011', 'P-012'] },
  'INS-PAT-008': { text: '手作り食への関心が『ペットを家族・同等の存在として扱いたい』という価値観に根ざし、それが料理教室参加・資格取得などの学習投資へと昇華するという価値観駆動型学習拡大の構造。食事管理が問題解決を超えた自己表現・関係性構築の行為として機能している', tier: 'T2', persons: ['P-003', 'P-010', 'P-009'] },
  'INS-PAT-009': { text: '手作り食への高い関心・学習投資と、実際の実践レベルのギャップ。知識習得や関心は深いが、実装は『ドライフード＋トッピング』という入門的なレベルに留まり、手作り食への移行障壁（手間・栄養計算・継続性）が解消されていない', tier: 'T2', persons: ['P-010', 'P-003', 'P-011'] },
  'INS-PAT-010': { text: 'トッピング・手作り食の実践が、栄養補完への不安ではなく『喜ぶ顔が見たい』『同じものを食べたい』という感情的動機から持続されるという感情報酬駆動型の継続構造。機能性よりも関係性の強化が継続の主要因', tier: 'T2', persons: ['P-009', 'P-012', 'P-011'] },
  'INS-PAT-011': { text: '日常的な観察・ケアを実施していると認識しているが、ペットの性格特性（おとなしい・痛みを隠す）により異常が顕在化しにくいため、観察者の自信と実際の発見能力の間にギャップが生じるという構造。両名とも『気づかなかった』経験と、それを補う外部手段（動画・指標化）を求めている', tier: 'T3', persons: ['P-002', 'P-006'] },
  'INS-PAT-012': { text: '獣医への不信・不満を持ちながら、代替として求める情報源の質が『第三者性・科学的根拠・透明性』という客観性基準で定義されるという構造。単に『獣医以外』ではなく、判断の根拠となる情報の質を求めている', tier: 'T2', persons: ['P-001', 'P-004', 'P-014', 'P-011'] },
  'INS-PAT-013': { text: '従来の獣医診察では得られなかった情報・視点を、動画解析・デジタルツールという新しい手段が提供できるという体験により、専門家への不信がデジタルサービスへの強い期待へと転換するという代替信頼の形成', tier: 'T3', persons: ['P-002', 'P-014'] },
  'INS-PAT-014': { text: '消化器症状の発生後、原因が特定できないまま対処を開始・継続するという『原因不明の対処継続』構造。症状は改善されないか曖昧な状態が続き、何が効いているのか・何が悪化要因なのかが判断できない状態が長期化する', tier: 'T2', persons: ['P-004', 'P-013', 'P-012'] },
  'INS-PAT-015': { text: '消化器ケアの対処が『悪化していないから続ける』という消去法的根拠で継続される構造。積極的な効果確認なしに継続し、やめることも変えることもできないジレンマ状態', tier: 'T3', persons: ['P-004', 'P-013'] },
  'INS-PAT-016': { text: 'ケア・対処行動を実施しながら、その効果が確認できないため『やっている感の空回り』が継続するという効果不可視の構造。効果測定手段の欠如が、行動の継続・変更・中断の判断基準を喪失させている', tier: 'T2', persons: ['P-002', 'P-004', 'P-014'] },
  'INS-PAT-017': { text: '専門家による『今やっていることは正しい』という確認・承認が、効果不確実性を解消する主要な手段として求められるという構造。客観的エビデンスよりも、信頼できる専門家の承認が行動継続の心理的根拠として機能している', tier: 'T2', persons: ['P-004', 'P-002', 'P-014'] },
  'INS-PAT-018': { text: '定期検診・予防的健康管理の習慣が、過去のペット喪失経験や重篤疾患発症という危機経験によってトリガーされるという『事後予防への転換』パターン。危機以前には予防的管理がなく、喪失・疾患発症後に初めて予防行動が体系化される', tier: 'T2', persons: ['P-009', 'P-006', 'P-005'] },
  'INS-PAT-019': { text: '日常的な排便・食欲・体重などの指標を健康判断の主要センサーとして活用し、それを獣医師との相談に持ち込む、あるいは異常のシグナルとして扱うという『日常観察の指標化・構造化』パターン', tier: 'T2', persons: ['P-013', 'P-006', 'P-003', 'P-005'] },
  'INS-PAT-020': { text: '健康状態の『正常』判定困難が、絶対値基準ではなく個体の時系列変化を追跡することで対処しようとする構造。『この子に合った正常値』への探求が共通している', tier: 'T3', persons: ['P-001', 'P-002'] },
  'INS-PAT-021': { text: '健康管理行動の継続困難が、知識・動機の欠如ではなく、日常生活への組み込みやすさ・リマインダー・チェックリストなど『実行支援の仕組み』の欠如から生じるという構造。やりたい・やるべきだと分かっているが続かないという行動実行ギャップ', tier: 'T2', persons: ['P-001', 'P-004', 'P-013'] },
  'INS-PAT-022': { text: '推奨された健康管理行動を実行しながらも、外部の『仕組み・ツール・記録システム』がなければ継続できないという外的足場依存の構造。自律的な継続ではなく、外部補助によって初めて行動が維持される', tier: 'T2', persons: ['P-004', 'P-013', 'P-001'] },
  'INS-PAT-023': { text: '加齢とともに複数の慢性疾患・リスクが同時進行し、疾患別の専用フード・管理方法の切り替えが必要になるという『多疾患同時管理の負荷増大』パターン。各疾患への対処が個別に行われ、統合的な管理が困難になっている', tier: 'T2', persons: ['P-006', 'P-010', 'P-009'] },
  'INS-PAT-024': { text: '複数頭・複数疾患の管理において、理想の個別化対応と実際の運用の間でトレードオフが発生し、一部の個体への対応に偏りが生じるという『個別化の限界』パターン。最も重篤な個体・症状への対処が優先され、他への対応が相対的に低くなる', tier: 'T3', persons: ['P-009', 'P-006'] },
  'INS-PAT-025': { text: '信頼できる情報・製品への判断基準として、専門家・製造者・第三者機関などのソース属性を重視し、製品選択や情報採用の最終判断を『誰が言っているか・どこが作っているか』で行うという情報源属性優先の意思決定構造', tier: 'T2', persons: ['P-001', 'P-003', 'P-011', 'P-012', 'P-014'] },
  'INS-PAT-026': { text: '健康管理行動を記録・可視化する強い動機があるにもかかわらず、既存ツールでは不十分（使いにくい・個体別分析ができない・相関が見えない）という利用ギャップ。記録行動を実践しているが、そのデータが意思決定に直結していない', tier: 'T2', persons: ['P-002', 'P-013', 'P-001'] },
};

// ========== UI ==========

let currentFilter = 'all';
let selectedId = null;

function qClass(q) {
  if (q === '右上') return 'q-tr';
  if (q === '左上') return 'q-tl';
  return 'q-bl';
}

function scoreClass(v) {
  if (v === '高') return 'high';
  if (v === '中') return 'mid';
  return '';
}

function renderGrid() {
  const grid = document.getElementById('clusterGrid');
  grid.innerHTML = CLUSTERS.map(c => {
    const needsMore = c.n <= 3;
    const show = currentFilter === 'all' || (currentFilter === '要追加' && needsMore);
    const sel = c.id === selectedId;
    return `
      <div class="cl-card ${sel ? 'selected' : ''} ${!show ? 'dim' : ''}"
           onclick="selectCluster('${c.id}')">
        <div class="cl-card-head">
          <span class="cl-id">${c.id}</span>
          ${needsMore ? '<span class="needs-more-badge">追加ヒアリング推奨</span>' : ''}
        </div>
        <div class="cl-name">${c.label}</div>
        <div class="cl-stat">${c.n}名 / 12名</div>
        <div class="cl-icl-tags">${c.icl.map(i => `<span class="icl-tag">${i}</span>`).join('')}</div>
      </div>`;
  }).join('');
}

function selectCluster(id) {
  selectedId = id;
  renderGrid();
  renderDetail(id);
}

function renderDetail(id) {
  const c = CLUSTERS.find(x => x.id === id);
  const hmws = HMW_DATA.filter(h => h.cluster === id);
  const pane = document.getElementById('rightPane');

  const iclHtml = c.icl.map(iid => {
    const icl = ICL[iid];
    if (!icl) return '';
    const cardIds = ICL_CARDS[iid] || [];
    const cardsHtml = cardIds.map(cid => {
      const card = INSIGHT_CARDS[cid];
      if (!card) return '';
      const isMissing = card.text.includes('存在しないID') || card.text.includes('未収録');
      if (isMissing) return '';
      const sourceIds = CARD_SOURCES[cid] || [];
      const utterHtml = sourceIds.map(sid => {
        const q = UTTERANCE_QUOTES[sid];
        return q ? `<div class="utter-quote"><span class="utter-id">${sid}</span><span class="utter-text">${q}</span></div>` : '';
      }).filter(Boolean).join('');
      return `<div class="evidence-card">
        <div class="ev-head">
          <span class="ev-id">${cid}</span>
          <span class="ev-tier ${card.tier === 'T2' ? 't2' : 't3'}">${card.tier}</span>
          <span class="ev-persons">${card.persons.join(' · ')}</span>
        </div>
        <div class="ev-text">${card.text}</div>
        ${utterHtml ? `<div class="utter-list">${utterHtml}</div>` : ''}
      </div>`;
    }).filter(Boolean).join('');
    const visibleCount = cardIds.filter(cid => {
      const card = INSIGHT_CARDS[cid];
      return card && !card.text.includes('存在しないID') && !card.text.includes('未収録');
    }).length;
    return `
      <div class="insight-card">
        <div class="icl-header">
          <span class="icl-id-badge">${iid}</span>
          <span class="icl-thickness">根拠：${icl.thickness} | ${icl.n}名 / T2×${icl.t2}枚</span>
        </div>
        <div class="icl-label">${icl.label}</div>
        <div class="icl-desc">${icl.desc}</div>
        ${cardsHtml ? `<button class="cards-toggle" onclick="toggleCards(this)">▶ 根拠カード ${visibleCount}件を見る</button>
        <div class="cards-inner" style="display:none">${cardsHtml}</div>` : ''}
      </div>`;
  }).join('');

  const quotesHtml = c.quotes.map(q => {
    const pidMatch = q.attr.match(/P-(\d+)/);
    const pid = pidMatch ? 'P-' + pidMatch[1].padStart(3,'0') : null;
    const attrHtml = pid
      ? `<a href="participants.html?p=${pid}">${q.attr}</a>`
      : q.attr;
    return `<div class="quote-item">
      <div class="quote-text">「${q.text}」</div>
      <div class="quote-attr">${attrHtml}</div>
    </div>`;
  }).join('');

  const bps = BP_DATA.filter(b => b.cluster === id);
  const bpHtml = bps.length ? bps.map(b => `
    <div class="bp-item">
      <div class="bp-head">
        <span class="bp-id">${b.id}</span>
        <span class="bp-name">${b.name}</span>
        <span class="bp-n">${b.n}名</span>
      </div>
      <div class="bp-jtbd">「${b.jtbd}」</div>
    </div>`).join('') : '';

  const themeInsight = THEME_INSIGHT[id];

  const hmwHtml = hmws.length ? hmws.map(h => `
    <div class="hmw-item">
      <div class="hmw-item-head">
        <span class="hmw-num">${h.id}</span>
        <span class="tier-badge ${h.tier === 'T2' ? 't2' : 't3'}">${h.tier}</span>
        <span class="hmw-n">${h.n}名</span>
      </div>
      <div class="hmw-text">${h.text}</div>
    </div>`).join('') : '<div style="font-size:12px;color:#aaa;">このクラスタ単独のHMWはありません</div>';

  const needsMore = c.n <= 3;
  pane.innerHTML = `
    <div class="detail-header">
      <div class="detail-id-row">
        <span class="detail-id">${c.id}</span>
        ${needsMore ? '<span class="needs-more-badge">追加ヒアリング推奨</span>' : ''}
      </div>
      <div class="detail-name">${c.label}</div>
      <div class="detail-stat">${c.n}名 / 12名</div>
      <div class="score-row">
        <span class="score-chip">確認：${c.n}名 / ${c.freq}%</span>
        <span class="score-chip ${scoreClass(c.scores.depth)}">課題の深さ：${c.scores.depth}</span>
        <span class="score-chip ${scoreClass(c.scores.unmet)}">未充足度：${c.scores.unmet}</span>
      </div>
    </div>

    ${themeInsight ? `<div style="background:#FDECEA;border-left:3px solid #C8102E;padding:8px 12px;border-radius:0 6px 6px 0;font-size:12px;color:#7B241C;margin-bottom:16px;line-height:1.6;">${themeInsight}</div>` : ''}

    <div class="section-block">
      <div class="section-title">代表発話</div>
      ${quotesHtml}
    </div>

    <div class="section-block">
      <div class="section-title">インサイト</div>
      ${iclHtml}
    </div>

    ${bpHtml ? `<div class="section-block">
      <div class="section-title">行動パターン / JTBD</div>
      ${bpHtml}
    </div>` : ''}

    <div class="section-block">
      <div class="section-title">HMW候補</div>
      ${hmwHtml}
    </div>
  `;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-bar .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function toggleCards(btn) {
  const inner = btn.nextElementSibling;
  const open = inner.style.display !== 'none';
  inner.style.display = open ? 'none' : 'flex';
  btn.textContent = open
    ? btn.textContent.replace('▼', '▶')
    : btn.textContent.replace('▶', '▼');
}

renderGrid();
</script>
